<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נשקייה וציוד | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776870001/Gemini_Generated_Image_jbr8f5jbr8f5jbr8_burebz.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; 
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .item-card { transition: all 0.3s ease; border: 1px solid rgba(59, 130, 246, 0.1); }
        .item-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); background: rgba(30, 41, 59, 0.95); box-shadow: 0 0 25px rgba(59, 130, 246, 0.2); }
        .neon-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .price-tag { background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.5); padding: 2px 10px; border-radius: 8px; font-weight: 800; color: #60a5fa; }
        .locked { filter: grayscale(1) opacity(0.6); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-800 max-w-7xl mx-auto">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="glass p-2 px-4 rounded-full text-slate-400 hover:text-white transition-all text-xs border border-slate-700">◄ חזרה לחמ"ל</a>
            <h1 class="text-4xl font-black italic tracking-tighter neon-text text-white">נשקייה <span class="text-blue-500">ARMORY</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="glass px-5 py-2.5 rounded-full text-sm border border-slate-700 shadow-lg flex items-center gap-2">
                <span class="text-3xl">💰</span>
                <span id="player-coins" class="font-bold text-white text-lg">-</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="armory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const WEAPONS = [
            { id: 'pistol_nemesis', name: 'אקדח פעימה "נמסיס"', atk: 25, price: 0, minLvl: 1, desc: 'נשק בסיסי לציידים מתחילים. אמין ומהיר.', icon: '🔫' },
            { id: 'katana_thermal', name: 'להב קטאנה טרמי', atk: 45, price: 250, minLvl: 1, desc: 'להב חם המסוגל לחתוך שריון של מפלצות.', icon: '⚔️' },
            { id: 'fire_sword', name: 'חרב אש', atk: 90, price: 750, minLvl: 3, desc: 'חרב אש אימתנית הדורשת מיומנות לוחם.', icon: '🔥' }
        ];

        let playerData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "players", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    playerData = docSnap.data();
                    document.getElementById('player-coins').innerText = playerData.coins.toLocaleString();
                    renderArmory();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        function renderArmory() {
            const grid = document.getElementById('armory-grid');
            const equipped = playerData.equippedWeapon || '';
            const userLvl = playerData.level || 1;

            grid.innerHTML = WEAPONS.map(w => {
                const isOwned = equipped === w.id;
                const isLocked = userLvl < w.minLvl;
                
                return `
                    <div class="glass p-8 rounded-[2.5rem] item-card flex flex-col gap-5 border border-slate-800 ${isLocked ? 'locked' : ''}">
                        <div class="flex justify-between items-center">
                            <div class="price-tag">${w.price === 0 ? 'חינם' : w.price + ' 💰'}</div>
                            <span class="text-5xl drop-shadow-lg">${w.icon}</span>
                        </div>
                        <div class="mt-2">
                            <h3 class="text-2xl font-black mb-1.5 text-white">${w.name}</h3>
                            <p class="text-slate-400 text-xs font-bold">נזק: ${w.atk} ATK | רמה: ${w.minLvl}+</p>
                            <p class="text-slate-500 text-xs mt-2">${w.desc}</p>
                        </div>
                        <div class="mt-auto pt-5">
                            ${isOwned ? `
                                <div class="flex flex-col gap-2">
                                    <button class="w-full bg-green-600/50 text-white py-3 rounded-xl font-black cursor-default border border-green-500/50">מצויד</button>
                                    ${w.price > 0 ? `<button onclick="window.sellWeapon('${w.id}', ${w.price})" class="text-red-400 text-xs font-bold hover:underline">מכור נשק (החזר ${Math.floor(w.price / 2)})</button>` : ''}
                                </div>
                            ` : `
                                <button onclick="window.buyWeapon('${w.id}', '${w.name}', ${w.price}, ${w.minLvl})" 
                                    ${isLocked ? 'disabled' : ''}
                                    class="w-full ${isLocked ? 'bg-slate-800 text-slate-500' : 'bg-blue-600 hover:bg-blue-500'} text-white py-3 rounded-xl font-black shadow-lg transition-all active:scale-95">
                                    ${isLocked ? `נעול (רמה ${w.minLvl})` : 'רכוש והצטייד'}
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.buyWeapon = async (id, name, price, minLvl) => {
            if (playerData.level < minLvl) return alert("הרמה שלך נמוכה מדי!");
            if (playerData.coins < price) return alert("אין לך מספיק זוזים!");
            
            if (playerData.equippedWeapon && playerData.equippedWeapon !== '' && playerData.equippedWeapon !== 'pistol_nemesis') {
                alert("עליך למכור את הנשק הנוכחי שלך לפני שתוכל להצטייד בחדש!");
                return;
            }

            if (confirm(`לרכוש את ${name} ב-${price} זוזים?`)) {
                try {
                    const playerRef = doc(db, "players", auth.currentUser.uid);
                    await updateDoc(playerRef, {
                        coins: playerData.coins - price,
                        equippedWeapon: id,
                        attack: (playerData.baseAttack || 10) + WEAPONS.find(w => w.id === id).atk
                    });
                    location.reload();
                } catch (e) { console.error(e); }
            }
        };

        window.sellWeapon = async (id, originalPrice) => {
            const sellValue = Math.floor(originalPrice / 2);
            if (!confirm(`למכור את הנשק תמורת ${sellValue} זוזים?`)) return;

            try {
                const playerRef = doc(db, "players", auth.currentUser.uid);
                await updateDoc(playerRef, {
                    coins: playerData.coins + sellValue,
                    equippedWeapon: 'pistol_nemesis', // מחזיר לנשק הבסיסי החינמי
                    attack: (playerData.baseAttack || 10) + 25 // מחזיר לכוח של הנמסיס
                });
                location.reload();
            } catch (e) { console.error(e); }
        };

    </script>
</body>
</html>
