<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נשקייה וציוד | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
                              url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Assistant', sans-serif; 
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .item-card { transition: all 0.3s ease; border: 1px solid rgba(59, 130, 246, 0.1); }
        .item-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); background: rgba(30, 41, 59, 0.9); }
        .neon-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-800 max-w-6xl mx-auto">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="text-slate-400 hover:text-white transition-colors">◄ חזרה לחמ"ל</a>
            <h1 class="text-4xl font-black italic tracking-tighter">נשקייה <span class="text-blue-500">ARMORY</span></h1>
        </div>
        <div class="flex gap-4">
            <div class="glass px-4 py-2 rounded-xl text-sm border border-slate-700">
                <span class="text-slate-500 ml-2">זוזים:</span>
                <span id="player-coins" class="font-bold text-white">-</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="flex gap-4 mb-8 overflow-x-auto pb-2">
            <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-sm shadow-lg shadow-blue-900/40">הכל</button>
            <button class="glass text-slate-400 px-6 py-2 rounded-full font-bold text-sm hover:text-white transition-all">נשק חם</button>
            <button class="glass text-slate-400 px-6 py-2 rounded-full font-bold text-sm hover:text-white transition-all">נשק קר</button>
            <button class="glass text-slate-400 px-6 py-2 rounded-full font-bold text-sm hover:text-white transition-all">טכנולוגיה</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="glass p-6 rounded-[2rem] item-card flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <span class="bg-blue-900/40 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/30 uppercase tracking-widest">מצויד</span>
                    <span class="text-3xl">🔫</span>
                </div>
                <div>
                    <h3 class="text-xl font-black mb-1">אקדח פעימה "נמסיס"</h3>
                    <p class="text-slate-500 text-xs">נשק בסיסי לציידים מתחילים. אמין ומהיר.</p>
                </div>
                <div class="flex justify-between items-center mt-2 border-t border-slate-800 pt-4">
                    <div class="text-sm">
                        <span class="text-slate-500">נזק:</span>
                        <span class="text-blue-400 font-bold">25 ATK</span>
                    </div>
                    <button class="text-[10px] font-bold uppercase text-slate-500 hover:text-white transition-colors">פרטים נוספים</button>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem] item-card flex flex-col gap-4 opacity-60">
                <div class="flex justify-between items-start">
                    <span class="bg-slate-800 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-full border border-slate-700 uppercase tracking-widest">במלאי</span>
                    <span class="text-3xl">⚔️</span>
                </div>
                <div>
                    <h3 class="text-xl font-black mb-1">להב קטאנה טרמי</h3>
                    <p class="text-slate-500 text-xs">להב חם המסוגל לחתוך שריון של מפלצות רמה 2.</p>
                </div>
                <div class="flex justify-between items-center mt-2 border-t border-slate-800 pt-4">
                    <div class="text-sm">
                        <span class="text-slate-500">נזק:</span>
                        <span class="text-blue-400 font-bold">45 ATK</span>
                    </div>
                    <button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black hover:bg-blue-500 transition-all">צייד (Equip)</button>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem] item-card flex flex-col gap-4">
                <div class="flex justify-between items-start">
                    <span class="bg-slate-800 text-slate-500 text-[10px] font-bold px-3 py-1 rounded-full border border-slate-700 uppercase tracking-widest">5 יחידות</span>
                    <span class="text-3xl">💊</span>
                </div>
                <div>
                    <h3 class="text-xl font-black mb-1">מזרק ננו-בוסט</h3>
                    <p class="text-slate-500 text-xs">מרפא 30% חיים באופן מיידי במהלך קרב.</p>
                </div>
                <div class="flex justify-between items-center mt-2 border-t border-slate-800 pt-4">
                    <div class="text-sm">
                        <span class="text-slate-500">שימוש:</span>
                        <span class="text-green-400 font-bold">RECOVERY</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "players", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    document.getElementById('player-coins').innerText = docSnap.data().coins;
                }
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
