<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בחירת דמות | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .character-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .character-card:hover { transform: scale(1.05); border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .selected { border: 3px solid #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; }
        .stat-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        .stat-fill { height: 100%; background: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">בחר את הסוכן שלך</h1>
        <p class="text-slate-400 text-sm mt-2 font-bold uppercase tracking-widest">Agent Selection Protocol</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl">
        
        <div onclick="selectHero('warrior')" id="card-warrior" class="character-card glass p-6 rounded-[2.5rem] border border-slate-800 flex flex-col items-center text-center">
            <div class="w-40 h-40 bg-slate-950 rounded-full mb-4 overflow-hidden border-2 border-slate-800 shadow-inner">
                <img src="https://raw.githubusercontent.com/ramirotem01/pcs365/main/assets/warrior.png" id="img-warrior" class="w-full h-full object-cover opacity-60">
            </div>
            <h2 class="text-2xl font-black italic mb-1 uppercase">מחסל הזאבים</h2>
            <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest mb-6">עוצמה גבוהה</p>
            
            <div class="w-full space-y-4 text-right text-xs">
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">עוצמה</span><span class="text-blue-400">95%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[95%] shadow-[0_0_10px_#3b82f6]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">ספיגה</span><span class="text-blue-400">60%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[60%] shadow-[0_0_10px_#3b82f6]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">מהירות</span><span class="text-slate-500">20%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[20%] bg-slate-700"></div></div>
                </div>
            </div>
        </div>

        <div onclick="selectHero('rogue')" id="card-rogue" class="character-card glass p-6 rounded-[2.5rem] border border-slate-800 flex flex-col items-center text-center">
            <div class="w-40 h-40 bg-slate-950 rounded-full mb-4 overflow-hidden border-2 border-slate-800 shadow-inner">
                <img src="placeholder_female.jpg" id="img-rogue" class="w-full h-full object-cover opacity-60">
            </div>
            <h2 class="text-2xl font-black italic mb-1 uppercase">מפרקת הערפדים</h2>
            <p class="text-pink-500 text-[10px] font-bold uppercase tracking-widest mb-6">סיבולת וריפוי</p>
            
            <div class="w-full space-y-4 text-right text-xs">
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">עוצמה</span><span class="text-pink-500">60%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[60%] bg-pink-500 shadow-[0_0_10px_#ec4899]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">ספיגה</span><span class="text-pink-500">90%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[90%] bg-pink-500 shadow-[0_0_10px_#ec4899]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">מהירות</span><span class="text-pink-500">50%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[50%] bg-pink-500 shadow-[0_0_10px_#ec4899]"></div></div>
                </div>
            </div>
        </div>

        <div onclick="selectHero('monk')" id="card-monk" class="character-card glass p-6 rounded-[2.5rem] border border-slate-800 flex flex-col items-center text-center">
            <div class="w-40 h-40 bg-slate-950 rounded-full mb-4 overflow-hidden border-2 border-slate-800 shadow-inner">
                <img src="placeholder_monk.jpg" id="img-monk" class="w-full h-full object-cover opacity-60">
            </div>
            <h2 class="text-2xl font-black italic mb-1 uppercase">קרן אור</h2>
            <p class="text-yellow-400 text-[10px] font-bold uppercase tracking-widest mb-6">זריזות מוחלטת</p>
            
            <div class="w-full space-y-4 text-right text-xs">
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">עוצמה</span><span class="text-yellow-400">50%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[50%] bg-yellow-400 shadow-[0_0_10px_#eab308]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">ספיגה</span><span class="text-yellow-400">70%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[70%] bg-yellow-400 shadow-[0_0_10px_#eab308]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="font-bold">מהירות</span><span class="text-yellow-400">95%</span></div>
                    <div class="stat-bar"><div class="stat-fill w-[95%] bg-yellow-400 shadow-[0_0_10px_#eab308]"></div></div>
                </div>
            </div>
        </div>

    </div>

    <button id="confirm-btn" disabled class="mt-12 bg-blue-600 px-16 py-4 rounded-2xl font-black text-white uppercase tracking-[0.2em] opacity-20 cursor-not-allowed transition-all italic text-sm">
        אישור בחירת סוכן
    </button>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let selectedId = null;
        const confirmBtn = document.getElementById('confirm-btn');

        // ערכים מעודכנים בתיאום לבקשת האיזון
        const heroes = {
            'warrior': { heroName: 'מחסל הזאבים', atk: 1.3, def: 0.6, eva: 0.05, spd: 0.2 },
            'rogue': { heroName: 'מפרקת הערפדים', atk: 1.0, def: 1.3, eva: 0.15, spd: 0.5 },
            'monk': { heroName: 'קרן אור', atk: 0.8, def: 1.1, eva: 0.40, spd: 0.95 }
        };

        window.selectHero = function(id) {
            selectedId = id;
            document.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');
            
            confirmBtn.disabled = false;
            confirmBtn.classList.remove('opacity-20', 'cursor-not-allowed');
            confirmBtn.classList.add('hover:bg-blue-500', 'shadow-[0_0_20px_rgba(59,130,246,0.5)]');
        }

        confirmBtn.onclick = async () => {
            const user = auth.currentUser;
            if (!user || !selectedId) return;

            confirmBtn.innerText = "מעבד נתונים...";
            confirmBtn.disabled = true;

            try {
                const heroData = heroes[selectedId];
                await updateDoc(doc(db, "players", user.uid), {
                    heroClass: selectedId,
                    heroName: heroData.heroName,
                    stats: {
                        atkMod: heroData.atk,
                        defMod: heroData.def,
                        evaMod: heroData.eva,
                        speed: heroData.spd
                    },
                    hasPickedHero: true
                });
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error("Save error:", error);
                alert("תקלה בחיבור למסד הנתונים.");
                confirmBtn.innerText = "אישור בחירת סוכן";
                confirmBtn.disabled = false;
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
