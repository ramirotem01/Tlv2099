<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זירת הציידים | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .player-card { transition: all 0.3s ease; border: 1px solid rgba(59, 130, 246, 0.1); }
        .player-card:hover { border-color: rgba(59, 130, 246, 0.5); background: rgba(30, 41, 59, 0.7); transform: translateY(-3px); }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .energy-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
            <div>
                <h1 class="text-5xl font-black italic tracking-tighter neon-text uppercase">Scoreboard</h1>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-[0.2em]">ציידים זמינים (100% ENERGY + 24H PROTECTED)</p>
            </div>
            
            <div class="flex w-full md:w-auto gap-2">
                <div class="relative flex-1 md:w-64">
                    <input type="text" id="search-input" placeholder="חפש כינוי..." 
                           class="w-full bg-slate-950/80 border border-slate-800 p-3 px-5 rounded-2xl outline-none focus:border-blue-500 transition-all text-sm font-bold">
                </div>
                <a href="dashboard.html" class="glass p-3 px-6 rounded-2xl font-bold text-xs hover:bg-slate-800 transition-all flex items-center">חזרה לחמ"ל 🛰️</a>
            </div>
        </header>

        <div id="loading-state" class="text-center py-20">
            <div class="animate-spin text-4xl mb-4">🌀</div>
            <p class="text-slate-400 font-bold italic">סורק תדרים לאיתור מטרות...</p>
        </div>

        <div id="no-players-msg" class="text-center py-16 glass rounded-[3rem] hidden border-dashed border-2 border-blue-500/20">
            <p class="text-white text-xl font-bold italic mb-2">אין ציידים זמינים כרגע.</p>
            <p class="text-slate-500 text-sm">כל הציידים ברמה שלך נמצאים ב-Cooldown או תחת הגנת 24 שעות.</p>
        </div>

        <div id="players-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let myData = null;
        let allPlayers = [];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            const mySnap = await getDoc(doc(db, "players", user.uid));
            if (mySnap.exists()) {
                myData = mySnap.data();
                loadHunters();
            }
        });

        async function loadHunters() {
            const loading = document.getElementById('loading-state');
            
            try {
                const q = query(
                    collection(db, "players"), 
                    where("energy", "==", 100)
                );
                
                const querySnapshot = await getDocs(q);
                allPlayers = [];
                
                const now = new Date().getTime();
                const protectionWindow = 24 * 60 * 60 * 1000; 

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    
                    const isNotMe = id !== auth.currentUser.uid;
                    const levelDiff = Math.abs((data.level || 0) - (myData.level || 0));
                    const isPersonalCooldown = data.lastFoughtBy === auth.currentUser.uid;

                    let isUnderGlobalProtection = false;
                    if (data.lastAmbushDate) {
                        const lastAmbushTime = data.lastAmbushDate.seconds ? 
                                             data.lastAmbushDate.seconds * 1000 : 
                                             new Date(data.lastAmbushDate).getTime();
                        
                        if (now - lastAmbushTime < protectionWindow) {
                            isUnderGlobalProtection = true;
                        }
                    }

                    if (isNotMe && levelDiff <= 5 && !isPersonalCooldown && !isUnderGlobalProtection) {
                        allPlayers.push({ id, ...data });
                    }
                });

                allPlayers.sort((a, b) => (b.xp || 0) - (a.xp || 0));

                renderPlayers(allPlayers);
                loading.classList.add('hidden');
            } catch (err) {
                console.error("Scan Error:", err);
                loading.innerHTML = `<p class="text-red-500">שגיאה במערכת: ${err.message}</p>`;
            }
        }

        function renderPlayers(players) {
            const container = document.getElementById('players-list');
            const noMsg = document.getElementById('no-players-msg');
            
            container.innerHTML = '';
            if (players.length === 0) {
                container.classList.add('hidden');
                noMsg.classList.remove('hidden');
                return;
            }

            noMsg.classList.add('hidden');
            container.classList.remove('hidden');

            players.forEach(p => {
                const card = document.createElement('div');
                card.className = "glass p-5 rounded-[2rem] player-card flex flex-col items-center text-center gap-3";
                card.innerHTML = `
                    <div class="relative w-20 h-20 bg-slate-950 rounded-full border-2 border-blue-500 overflow-hidden shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                        <img src="${p.heroImage || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-blue-500/20 to-transparent"></div>
                    </div>
                    <div>
                        <h3 class="font-black text-lg italic neon-text uppercase tracking-tight">${p.username || 'Ghost Hunter'}</h3>
                        <div class="flex gap-2 justify-center mt-1">
                            <span class="text-[9px] bg-blue-600 text-white px-2 py-0.5 rounded-lg font-black italic">LVL ${p.level || 1}</span>
                            <span class="text-[9px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-lg font-black energy-pulse">100% READY</span>
                        </div>
                    </div>
                    <div class="w-full h-[1px] bg-slate-800 my-1"></div>
                    <button onclick="challengePlayer('${p.id}', '${p.username}', ${p.level}, ${p.coins || 0}, '${p.heroImage || ''}')" 
                        class="w-full bg-blue-600 hover:bg-red-600 text-white py-3 rounded-2xl font-black text-[10px] transition-all uppercase tracking-widest">
                        התחל דו-קרב ⚔️
                    </button>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allPlayers.filter(p => (p.username || "").toLowerCase().includes(val));
            renderPlayers(filtered);
        });

        window.challengePlayer = function(id, name, level, coins, img) {
            const crowdBonus = 50 + (level * 20);
            const potentialLoot = Math.floor(coins * 0.10) + crowdBonus;

            localStorage.setItem('currentBattle', JSON.stringify({
                name: name, 
                img: img, 
                level: level, 
                reward: potentialLoot,
                isPvP: true, // הוספת השדה לזיהוי צייד מול מפלצת
                opponentId: id, 
                originalCoins: coins
            }));

            window.location.href = 'combat.html';
        };
    </script>
</body>
</html>
