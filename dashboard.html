<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Assistant', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hp-bar { transition: width 0.5s ease-in-out; }
        .status-pill { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 id="player-name" class="text-3xl font-black italic italic tracking-tighter">טוען נתונים...</h1>
                <div class="flex gap-2 mt-1">
                    <span id="player-level" class="status-pill bg-blue-600 px-2 py-0.5 rounded text-white uppercase">LVL --</span>
                    <span class="status-pill bg-slate-800 px-2 py-0.5 rounded text-slate-400 uppercase tracking-widest">SQUAD: ALPHA</span>
                </div>
            </div>
            <div class="text-left">
                <div id="player-coins" class="text-2xl font-black text-yellow-400">0 <span class="text-xs"> זוזים</span></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="glass p-6 rounded-[2rem] border-r-4 border-green-500">
                <div class="flex justify-between items-end mb-3">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">מצב ויטאלי (HP)</span>
                    <span id="hp-recovery-status" class="text-[9px] text-green-400 animate-pulse font-bold tracking-tighter italic"></span>
                </div>
                <div class="w-full bg-slate-950 h-4 rounded-full border border-slate-800 p-1 overflow-hidden">
                    <div id="hp-bar-inner" class="hp-bar bg-green-500 h-full rounded-full shadow-[0_0_15px_rgba(34,197,94,0.4)]" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-2 font-black italic">
                    <span id="hp-text" class="text-2xl">--/--</span>
                    <span id="hp-percent" class="text-slate-600">--%</span>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem] border-r-4 border-blue-500">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic block mb-3">אנרגיה טקטית</span>
                <div class="w-full bg-slate-950 h-4 rounded-full border border-slate-800 p-1 overflow-hidden">
                    <div id="energy-bar-inner" class="bg-blue-500 h-full rounded-full shadow-[0_0_15px_rgba(59,130,246,0.4)]" style="width: 0%"></div>
                </div>
                <div class="flex justify-between mt-2 font-black italic text-2xl">
                    <span id="energy-text">--/--</span>
                </div>
            </div>
        </div>

        <nav class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <a href="map.html" class="glass p-8 rounded-[2rem] text-center hover:bg-slate-800 transition-all border border-slate-700/50 group">
                <div class="text-4xl mb-2 group-hover:scale-110 transition-transform">🗺️</div>
                <span class="font-black italic uppercase text-xs tracking-widest">מפה טקטית</span>
            </a>
            <a href="shop.html" class="glass p-8 rounded-[2rem] text-center hover:bg-slate-800 transition-all border border-slate-700/50 group">
                <div class="text-4xl mb-2 group-hover:scale-110 transition-transform">🛒</div>
                <span class="font-black italic uppercase text-xs tracking-widest">שדרוג נשק</span>
            </a>
            <a href="tasks.html" class="glass p-8 rounded-[2rem] text-center hover:bg-slate-800 transition-all border border-slate-700/50 group">
                <div class="text-4xl mb-2 group-hover:scale-110 transition-transform">📋</div>
                <span class="font-black italic uppercase text-xs tracking-widest">משימות</span>
            </a>
            <button onclick="logout()" class="glass p-8 rounded-[2rem] text-center hover:bg-red-950/30 transition-all border border-red-900/20 group">
                <div class="text-4xl mb-2 group-hover:rotate-12 transition-transform">🔌</div>
                <span class="font-black italic uppercase text-xs tracking-widest text-red-500">ניתוק</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let playerRef;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                playerRef = doc(db, "players", user.uid);
                const snap = await getDoc(playerRef);
                
                if (snap.exists()) {
                    let data = snap.data();
                    processRecovery(data);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        function processRecovery(data) {
            const now = Date.now();
            const lastUpdate = data.lastHpUpdate ? data.lastHpUpdate.toMillis() : now;
            const hoursPassed = (now - lastUpdate) / (1000 * 60 * 60);
            
            // הגדרת קצב ריפוי: בסיס 10 נקודות בשעה + בדיקת ציוד
            let recoveryRate = 10;
            if (data.inventory && data.inventory.includes('nano_bed')) recoveryRate += 10; // דוגמה לבונוס ציוד
            
            const recoveredAmount = hoursPassed * recoveryRate;
            let newHp = Math.min(data.maxHp || 100, (data.hp || 100) + recoveredAmount);
            
            // עדכון הממשק
            updateUI(data, Math.floor(newHp));

            // אם התווסף HP משמעותי, נעדכן את ה-DB
            if (Math.floor(newHp) > Math.floor(data.hp)) {
                updateDoc(playerRef, {
                    hp: Math.floor(newHp),
                    lastHpUpdate: serverTimestamp()
                });
            }
            
            if (newHp < data.maxHp) {
                document.getElementById('hp-recovery-status').innerText = `REGENERATING: +${recoveryRate}/HR`;
            }
        }

        function updateUI(data, currentHp) {
            document.getElementById('player-name').innerText = data.displayName || "AGENT";
            document.getElementById('player-level').innerText = `LVL ${data.level || 1}`;
            document.getElementById('player-coins').innerHTML = `${data.coins || 0} <span class="text-xs"> זוזים</span>`;
            
            // HP UI
            const hpPerc = (currentHp / (data.maxHp || 100)) * 100;
            document.getElementById('hp-bar-inner').style.width = hpPerc + "%";
            document.getElementById('hp-text').innerText = `${currentHp}/${data.maxHp || 100}`;
            document.getElementById('hp-percent').innerText = Math.floor(hpPerc) + "%";
            
            // Energy UI
            const energyPerc = ((data.energy || 100) / 100) * 100;
            document.getElementById('energy-bar-inner').style.width = energyPerc + "%";
            document.getElementById('energy-text').innerText = `${data.energy || 0}/100`;
        }

        window.logout = () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        };
    </script>
</body>
</html>
