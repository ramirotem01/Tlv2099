<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל מבצעי | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776869126/TLVDESH_lkyxtd.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Assistant', sans-serif; 
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .neon-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .neon-border { 
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .nav-node {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(59, 130, 246, 0.6);
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 20;
        }
        .nav-node:hover { transform: scale(1.2); background: #3b82f6; box-shadow: 0 0 40px #3b82f6; }
        
        .nav-node.has-unread {
            background: rgba(220, 38, 38, 0.8);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
            animation: pulse-red 1s infinite;
            border-color: #fca5a5;
        }

        .nav-node::after {
            content: attr(data-label);
            position: absolute;
            bottom: -35px;
            white-space: nowrap;
            background: black;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border: 1px solid #3b82f6;
        }
        .nav-node:hover::after { opacity: 1; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }
            50% { transform: scale(1.15); box-shadow: 0 0 30px rgba(220, 38, 38, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); }
        }

        .xp-bar-container { height: 6px; width: 100%; background: rgba(0,0,0,0.4); border-radius: 10px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); border-radius: 10px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen relative p-6 md:p-10 text-right">

    <a href="map.html" class="nav-node" style="top: 40%; left: 20%;" data-label="מפה טקטית (לחימה)">🗺️</a>
    <a href="shop.html" class="nav-node" style="top: 65%; left: 50%;" data-label="המעבדה">🧪</a>
    <a href="inventory.html" class="nav-node" style="top: 30%; left: 80%;" data-label="נשקייה וציוד">⚔️</a>
    <a href="score.html" class="nav-node" style="top: 15%; left: 45%;" data-label="קרב ציידים (PvP)">🏆</a>
    <a href="Winner.html" class="nav-node" style="top: 15%; left: 25%; background: rgba(16, 185, 129, 0.6);" data-label="היכל התהילה">🎖️</a>
    <a href="message.html" id="msg-node" class="nav-node" style="top: 50%; left: 85%;" data-label="תיבת הודעות">📩</a>

    <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-800 relative z-10">
        <div class="flex items-center gap-4">
            <h1 class="text-4xl font-black text-white italic tracking-tighter neon-text">TLV2099</h1>
            <span class="text-slate-500 font-bold">| חמ"ל מבצעי</span>
        </div>
        <div class="flex items-center gap-4 glass p-2.5 px-5 rounded-full neon-border shadow-lg">
            <span id="player-username" class="font-bold text-blue-400 font-mono tracking-tighter italic uppercase">טוען...</span>
            <span class="text-slate-600">|</span>
            <button id="logout-btn" class="text-xs text-slate-500 hover:text-white transition-colors font-bold uppercase">התנתק</button>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8 max-w-7xl mx-auto relative z-10">
        <div class="glass p-6 rounded-3xl flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest italic">רמת סוכן</div>
            <div id="stat-level" class="text-5xl font-extrabold text-blue-500 tracking-tighter">-</div>
            <div class="xp-bar-container">
                <div id="xp-bar-fill" class="xp-bar-fill" style="width: 0%"></div>
            </div>
            <div id="xp-text" class="text-[8px] text-slate-500 mt-1 font-bold font-mono">XP: 0 / 0</div>
        </div>

        <div class="glass p-6 rounded-3xl flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest italic">כוח (ATK)</div>
            <div id="stat-power" class="text-5xl font-extrabold text-red-500 tracking-tighter">0</div>
        </div>

        <div class="glass p-6 rounded-3xl flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest italic">זוזים</div>
            <div id="stat-coins" class="text-5xl font-extrabold text-white tracking-tighter">-</div>
        </div>

        <div class="glass p-6 rounded-3xl flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest italic">אנרגיה (HP)</div>
            <div id="stat-energy-text" class="text-5xl font-extrabold text-green-400 tracking-tighter">-%</div>
            <div id="recovery-indicator" class="text-[8px] text-green-500/50 font-bold animate-pulse mt-1 font-mono uppercase"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mb-10 relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-[2.5rem] border border-slate-800 relative overflow-hidden">
            <div class="flex items-center justify-between mb-6 px-2">
                <h3 class="font-black text-xs uppercase tracking-[0.3em] text-slate-500 italic">ציוד לחימה נוכחי</h3>
                <div class="h-px flex-1 bg-slate-800 mx-6 opacity-30"></div>
            </div>
            <div id="inventory-list" class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
                <div class="text-slate-600 text-xs italic">סורק ציוד...</div>
            </div>
        </div>

        <div class="glass p-6 rounded-[2.5rem] border border-slate-800 relative overflow-hidden">
            <div class="flex items-center justify-between mb-6 px-2">
                <h3 class="font-black text-xs uppercase tracking-[0.3em] text-blue-500 italic">תרמיל שיקויים</h3>
                <div class="h-px flex-1 bg-blue-900/30 mx-6 opacity-30"></div>
            </div>
            <div id="potions-list" class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
                <div class="text-slate-600 text-xs italic">בודק תרמיל...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, addDoc, serverTimestamp, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const itemStats = {
            'pistol_nemesis': { name: 'אקדח פעימה', atk: 25, icon: '🔫' },
            'katana_thermal': { name: 'קטאנה טרמית', atk: 45, icon: '⚔️' },
            'nano_boost': { name: 'ננו-בוסט', atk: 0, icon: '💊' },
            'nano_bed': { name: 'מיטת ריפוי', atk: 0, icon: '🛌' }
        };

        const potionStats = {
            'health_large': { name: 'חיים גדול', icon: '🧪', color: 'text-green-400' },
            'health_small': { name: 'חיים קטן', icon: '🧪', color: 'text-green-500' },
            'atk_small': { name: 'כוח קטן', icon: '🍷', color: 'text-red-400' },
            'atk_large': { name: 'כוח גדול', icon: '🍷', color: 'text-red-600' },
            'def_small': { name: 'ספיגה קטן', icon: '🍶', color: 'text-blue-400' },
            'def_large': { name: 'ספיגה גדול', icon: '🍶', color: 'text-blue-600' }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "players", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    let data = docSnap.data();
                    await checkForOfflineAmbush(user.uid, data);
                    checkUnreadMessages(user.uid);
                    const leveledUpData = await checkLevelUp(docRef, data);
                    processEnergyRecovery(docRef, leveledUpData || data);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function checkForOfflineAmbush(userId, userData) {
            const now = Date.now();
            const lastAmbush = userData.lastAmbushDate ? userData.lastAmbushDate.toMillis() : 0;
            const cooldown = 4 * 60 * 60 * 1000;
            if ((userData.energy || 0) >= 100 && (now - lastAmbush > cooldown)) {
                if (Math.random() < 0.25) { await executeMonsterAmbush(userId, userData); }
            }
        }

        async function executeMonsterAmbush(userId, userData) {
            const power = userData.power || 10;
            const level = userData.level || 1;
            const monsterPower = (Math.random() * 15) + (level * 4);
            const winChance = (power / (power + monsterPower)) + 0.1;
            const didWin = Math.random() < winChance;
            let damage = !didWin ? Math.floor(Math.random() * 25) + 15 : 0;
            const loot = didWin ? Math.floor(Math.random() * 40) + 10 : 0;

            await updateDoc(doc(db, "players", userId), {
                energy: Math.max(0, (userData.energy || 100) - damage),
                coins: Math.max(0, (userData.coins || 0) + loot),
                lastAmbushDate: serverTimestamp()
            });
        }

        async function checkUnreadMessages(userId) {
            const q = query(collection(db, "notifications"), where("targetUserId", "==", userId), where("isRead", "==", false), limit(1));
            const querySnapshot = await getDocs(q);
            const msgNode = document.getElementById('msg-node');
            if (!querySnapshot.empty) msgNode.classList.add('has-unread');
            else msgNode.classList.remove('has-unread');
        }

        async function checkLevelUp(docRef, data) {
            const currentLevel = data.level || 1;
            const currentXP = data.xp || 0;
            const xpNeeded = currentLevel * 10;
            if (currentXP >= xpNeeded) {
                const newLevel = currentLevel + 1;
                const updatedFields = { level: newLevel, xp: currentXP - xpNeeded, energy: 100 };
                await updateDoc(docRef, updatedFields);
                return { ...data, ...updatedFields };
            }
            return null;
        }

        function processEnergyRecovery(docRef, data) {
            const now = Date.now();
            const lastUpdate = data.lastHpUpdate ? data.lastHpUpdate.toMillis() : now;
            const hoursPassed = (now - lastUpdate) / (1000 * 60 * 60);
            let recoveryRate = (data.inventory && data.inventory.includes('nano_bed')) ? 40 : 20;
            const recovered = hoursPassed * recoveryRate;
            let currentEnergy = Math.min(100, (data.energy || 0) + recovered);
            updateDashboardUI(data, Math.floor(currentEnergy));
            if (Math.floor(currentEnergy) > (data.energy || 0)) {
                updateDoc(docRef, { energy: Math.floor(currentEnergy), lastHpUpdate: serverTimestamp() });
            }
            if (currentEnergy < 100) document.getElementById('recovery-indicator').innerText = `+${recoveryRate}%/HR REGEN`;
        }

        function updateDashboardUI(data, currentEnergy) {
            document.getElementById('player-username').innerText = data.username || "UNKNOWN";
            document.getElementById('stat-level').innerText = data.level || 1;
            document.getElementById('stat-coins').innerText = (data.coins || 0).toLocaleString();
            document.getElementById('stat-energy-text').innerText = currentEnergy + "%";
            
            const xpNeeded = (data.level || 1) * 10;
            const xpPercent = Math.min(100, ((data.xp || 0) / xpNeeded) * 100);
            document.getElementById('xp-bar-fill').style.width = xpPercent + "%";
            document.getElementById('xp-text').innerText = `XP: ${data.xp || 0} / ${xpNeeded}`;

            // עדכון רשימת ציוד
            let totalAtk = 0;
            const inventoryContainer = document.getElementById('inventory-list');
            inventoryContainer.innerHTML = '';
            const inventory = data.inventory || [];
            if (inventory.length === 0) inventoryContainer.innerHTML = '<div class="text-slate-600 text-[10px] italic">אין ציוד חמוש</div>';
            inventory.forEach(itemId => {
                if (itemStats[itemId]) {
                    totalAtk += itemStats[itemId].atk;
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "bg-slate-900/40 p-4 rounded-2xl border border-slate-800 flex flex-col items-center min-w-[100px]";
                    itemDiv.innerHTML = `<span class="text-3xl mb-2">${itemStats[itemId].icon}</span><span class="text-[9px] font-bold text-slate-400 uppercase">${itemStats[itemId].name}</span>`;
                    inventoryContainer.appendChild(itemDiv);
                }
            });
            document.getElementById('stat-power').innerText = totalAtk;

            // עדכון רשימת שיקויים
            const potionsContainer = document.getElementById('potions-list');
            potionsContainer.innerHTML = '';
            const potions = data.potions || [];
            if (potions.length === 0) potionsContainer.innerHTML = '<div class="text-slate-600 text-[10px] italic">התרמיל ריק</div>';
            potions.forEach(pId => {
                if (potionStats[pId]) {
                    const pDiv = document.createElement('div');
                    pDiv.className = "bg-blue-900/10 p-4 rounded-2xl border border-blue-900/20 flex flex-col items-center min-w-[100px]";
                    pDiv.innerHTML = `
                        <span class="text-3xl mb-2 filter drop-shadow-md">${potionStats[pId].icon}</span>
                        <span class="text-[9px] font-bold ${potionStats[pId].color} uppercase">${potionStats[pId].name}</span>
                    `;
                    potionsContainer.appendChild(pDiv);
                }
            });
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = 'index.html'; });
        });
    </script>
</body>
</html>
