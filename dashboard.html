<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל מבצעי | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776869126/TLVDESH_lkyxtd.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-repeat: no-repeat; color: white; font-family: 'Assistant', sans-serif; overflow-x: hidden;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        
        /* Node Styling */
        .nav-node { position: absolute; width: 44px; height: 44px; background: rgba(59, 130, 246, 0.6); border: 2px solid white; border-radius: 50%; cursor: pointer; box-shadow: 0 0 20px rgba(59, 130, 246, 0.8); animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; z-index: 5; text-decoration: none; }
        .nav-node:hover { transform: scale(1.2); background: #3b82f6; box-shadow: 0 0 40px #3b82f6; z-index: 50; }
        
        .node-gold { background: rgba(234, 179, 8, 0.6); box-shadow: 0 0 20px rgba(234, 179, 8, 0.8); border-color: #fef08a; animation: pulse-gold 2s infinite; }
        .nav-node.has-unread { background: rgba(220, 38, 38, 0.8); box-shadow: 0 0 20px rgba(220, 38, 38, 0.8); animation: pulse-red 1s infinite; border-color: #fca5a5; }
        
        .nav-node::after { content: attr(data-label); position: absolute; bottom: -35px; white-space: nowrap; background: black; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; opacity: 0; pointer-events: none; transition: opacity 0.3s; border: 1px solid #3b82f6; }
        .nav-node:hover::after { opacity: 1; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes pulse-gold { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        
        .xp-bar-container { height: 4px; width: 60px; background: rgba(0,0,0,0.4); border-radius: 10px; margin-top: 4px; }
        .xp-bar-fill { height: 100%; background: #3b82f6; border-radius: 10px; transition: width 1s ease; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Stats Compact Row */
        .stat-card-mini { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.5rem 1rem; min-width: 80px; }
    </style>
</head>
<body class="min-h-screen relative text-right flex flex-col">

    <a href="map.html" class="nav-node" style="top: 40%; left: 15%;" data-label="מפה טקטית (לחימה)">🗺️</a>
    <a href="shop.html" class="nav-node" style="top: 60%; left: 45%;" data-label="המעבדה">🧪</a>
    <a href="inventory.html" class="nav-node" style="top: 35%; left: 75%;" data-label="נשקייה וציוד">⚔️</a>
    <a href="score.html" class="nav-node" style="top: 25%; left: 35%;" data-label="קרב ציידים (PvP)">🏆</a>
    <a href="Winner.html" class="nav-node" style="top: 20%; left: 15%; background: rgba(16, 185, 129, 0.6);" data-label="היכל התהילה">🎖️</a>
    <a href="message.html" id="msg-node" class="nav-node" style="top: 55%; left: 80%;" data-label="תיבת הודעות">📩</a>
    <a href="bitcoin.html" class="nav-node node-gold" style="top: 45%; left: 55%;" data-label="מסע אל הביטקויין">₿</a>

    <header class="p-6 relative z-10">
        <div class="flex justify-between items-center mb-4 pb-4 border-b border-slate-800">
            <div class="flex items-center gap-4">
                <h1 class="text-3xl font-black text-white italic tracking-tighter neon-text">TLV2099</h1>
                <span class="text-slate-500 font-bold text-sm hidden md:block">| חמ"ל מבצעי</span>
            </div>
            <div class="flex items-center gap-3 glass p-2 px-4 rounded-full neon-border scale-90 md:scale-100">
                <span id="player-username" class="font-bold text-blue-400 font-mono text-sm uppercase">טוען...</span>
                <button id="logout-btn" class="text-[10px] text-slate-500 hover:text-white transition-colors font-bold uppercase">X</button>
            </div>
        </div>

        <div class="flex flex-wrap gap-2 justify-center md:justify-start">
            <div class="glass stat-card-mini rounded-2xl border border-slate-800">
                <span class="text-[8px] uppercase text-slate-500 font-bold tracking-widest italic">רמה</span>
                <span id="stat-level" class="text-xl font-black text-blue-500">-</span>
                <div class="xp-bar-container"><div id="xp-bar-fill" class="xp-bar-fill"></div></div>
            </div>
            <div class="glass stat-card-mini rounded-2xl border border-slate-800">
                <span class="text-[8px] uppercase text-slate-500 font-bold tracking-widest italic">כוח</span>
                <span id="stat-power" class="text-xl font-black text-red-500">0</span>
            </div>
            <div class="glass stat-card-mini rounded-2xl border border-slate-800">
                <span class="text-[8px] uppercase text-slate-500 font-bold tracking-widest italic">זוזים</span>
                <span id="stat-coins" class="text-xl font-black text-white">-</span>
            </div>
            <div class="glass stat-card-mini rounded-2xl border border-slate-800">
                <span class="text-[8px] uppercase text-slate-500 font-bold tracking-widest italic">אנרגיה</span>
                <span id="stat-energy-text" class="text-xl font-black text-green-400">-%</span>
            </div>
        </div>
    </header>

    <div class="flex-grow"></div>

    <div class="p-6 relative z-10 w-full max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="glass p-4 rounded-3xl border border-slate-800">
            <div class="flex items-center gap-3 mb-3">
                <h3 class="font-black text-[9px] uppercase tracking-widest text-slate-500 italic">ציוד לחימה</h3>
                <div class="h-px flex-1 bg-slate-800 opacity-30"></div>
            </div>
            <div id="inventory-list" class="flex gap-3 overflow-x-auto pb-1 scrollbar-hide">
                <div class="text-slate-600 text-[10px] italic">סורק...</div>
            </div>
        </div>

        <div class="glass p-4 rounded-3xl border border-slate-800">
            <div class="flex items-center gap-3 mb-3">
                <h3 class="font-black text-[9px] uppercase tracking-widest text-blue-500 italic">שיקויים</h3>
                <div class="h-px flex-1 bg-blue-900/30 opacity-30"></div>
            </div>
            <div id="potions-list" class="flex gap-3 overflow-x-auto pb-1 scrollbar-hide">
                <div class="text-slate-600 text-[10px] italic">בודק...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, serverTimestamp, collection, query, where, getDocs, limit, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const itemStats = {
            'pistol_nemesis': { name: 'נמסיס', atk: 25, icon: '🔫' },
            'katana_thermal': { name: 'קטאנה', atk: 45, icon: '⚔️' },
            'fire_sword': { name: 'חרב אש', atk: 90, icon: '🔥' },
            'nano_boost': { name: 'בוסט', atk: 0, icon: '💊' },
            'nano_bed': { name: 'מיטה', atk: 0, icon: '🛌' }
        };

        const potionStats = {
            'health_large': { name: 'HP גד', icon: '🧪', color: 'text-green-400' },
            'health_small': { name: 'HP קט', icon: '🧪', color: 'text-green-500' },
            'atk_small': { name: 'ATK קט', icon: '🍷', color: 'text-red-400' },
            'atk_large': { name: 'ATK גד', icon: '🍷', color: 'text-red-600' },
            'def_small': { name: 'DEF קט', icon: '🍶', color: 'text-blue-400' },
            'def_large': { name: 'DEF גד', icon: '🍶', color: 'text-blue-600' },
            'speed_small': { name: 'SPD קט', icon: '⚡', color: 'text-yellow-400' },
            'speed_large': { name: 'SPD גד', icon: '⚡', color: 'text-yellow-600' }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "players", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    let data = docSnap.data();
                    await checkForOfflineAmbush(user.uid, data);
                    checkUnreadMessages(user.uid);
                    const leveledUpData = await checkLevelUp(docRef, data);
                    processEnergyRecovery(docRef, leveledUpData || data);
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        async function checkForOfflineAmbush(userId, userData) {
            const now = Date.now();
            const lastAmbush = userData.lastAmbushDate ? userData.lastAmbushDate.toMillis() : 0;
            const cooldown = 4 * 60 * 60 * 1000;
            if ((userData.energy || 0) >= 100 && (now - lastAmbush > cooldown)) {
                if (Math.random() < 0.25) { await executeMonsterAmbush(userId, userData); }
            }
        }

        async function executeMonsterAmbush(userId, userData) {
            const level = userData.level || 1;
            const monsterPower = (Math.random() * 15) + (level * 4);
            const winChance = ((userData.attack || 10) / ((userData.attack || 10) + monsterPower)) + 0.1;
            const didWin = Math.random() < winChance;
            let damage = !didWin ? Math.floor(Math.random() * 25) + 15 : 0;
            let loot = didWin ? Math.floor(Math.random() * 40) + 10 : 0;
            await updateDoc(doc(db, "players", userId), {
                energy: Math.max(0, (userData.energy || 100) - damage),
                coins: Math.max(0, (userData.coins || 0) + loot),
                lastAmbushDate: serverTimestamp()
            });
        }

        async function checkUnreadMessages(userId) {
            const q = query(collection(db, "notifications"), where("targetUserId", "==", userId), where("isRead", "==", false), limit(1));
            const querySnapshot = await getDocs(q);
            const msgNode = document.getElementById('msg-node');
            if (!querySnapshot.empty) msgNode.classList.add('has-unread');
            else msgNode.classList.remove('has-unread');
        }

        async function checkLevelUp(docRef, data) {
            const currentLevel = data.level || 1;
            const xpNeeded = currentLevel * 10;
            if ((data.xp || 0) >= xpNeeded) {
                const newLevel = currentLevel + 1;
                const updatedFields = { level: newLevel, xp: (data.xp || 0) - xpNeeded, energy: 100 };
                await updateDoc(docRef, updatedFields);
                await addDoc(collection(db, "notifications"), {
                    targetUserId: auth.currentUser.uid,
                    title: "עלית רמה! 🚀",
                    message: `הגעת לרמה ${newLevel}. האנרגיה התמלאה.`,
                    type: "level_up",
                    isRead: false,
                    timestamp: serverTimestamp()
                });
                return { ...data, ...updatedFields };
            }
            return null;
        }

        function processEnergyRecovery(docRef, data) {
            const now = Date.now();
            const lastUpdate = data.lastHpUpdate ? data.lastHpUpdate.toMillis() : now;
            const hoursPassed = (now - lastUpdate) / (1000 * 60 * 60);
            let recoveryRate = (data.inventory && data.inventory.includes('nano_bed')) ? 40 : 20;
            let currentEnergy = Math.min(100, (data.energy || 0) + (hoursPassed * recoveryRate));
            updateDashboardUI(data, Math.floor(currentEnergy));
            if (Math.floor(currentEnergy) > (data.energy || 0)) {
                updateDoc(docRef, { energy: Math.floor(currentEnergy), lastHpUpdate: serverTimestamp() });
            }
        }

        function updateDashboardUI(data, currentEnergy) {
            document.getElementById('player-username').innerText = data.username || "UNKNOWN";
            document.getElementById('stat-level').innerText = data.level || 1;
            document.getElementById('stat-coins').innerText = (data.coins || 0).toLocaleString();
            document.getElementById('stat-energy-text').innerText = currentEnergy + "%";
            
            const xpPercent = Math.min(100, ((data.xp || 0) / ((data.level || 1) * 10)) * 100);
            document.getElementById('xp-bar-fill').style.width = xpPercent + "%";

            let totalAtk = data.baseAttack || 10; 
            const inventoryContainer = document.getElementById('inventory-list');
            inventoryContainer.innerHTML = '';
            
            const equippedId = data.equippedWeapon;
            const inv = data.inventory || [];
            
            [equippedId, ...inv.filter(id => id !== equippedId)].forEach(itemId => {
                if (itemStats[itemId]) {
                    const weapon = itemStats[itemId];
                    if (itemId === equippedId || inv.includes(itemId)) {
                         totalAtk += weapon.atk;
                         const isEq = itemId === equippedId;
                         const itemDiv = document.createElement('div');
                         itemDiv.className = `${isEq ? 'bg-blue-900/30 border-blue-500/50' : 'bg-slate-900/40 border-slate-800'} p-2 px-4 rounded-xl border flex flex-col items-center min-w-[70px]`;
                         itemDiv.innerHTML = `<span class="text-xl mb-1">${weapon.icon}</span><span class="text-[7px] font-black text-slate-400 uppercase">${weapon.name}</span>`;
                         inventoryContainer.appendChild(itemDiv);
                    }
                }
            });

            document.getElementById('stat-power').innerText = totalAtk;

            const pots = document.getElementById('potions-list');
            pots.innerHTML = '';
            (data.potions || []).forEach(pId => {
                if (potionStats[pId]) {
                    const pDiv = document.createElement('div');
                    pDiv.className = "bg-blue-900/10 p-2 px-4 rounded-xl border border-blue-900/20 flex flex-col items-center min-w-[70px]";
                    pDiv.innerHTML = `<span class="text-xl mb-1">${potionStats[pId].icon}</span><span class="text-[7px] font-bold ${potionStats[pId].color} uppercase">${potionStats[pId].name}</span>`;
                    pots.appendChild(pDiv);
                }
            });
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = 'index.html'; });
        });
    </script>
</body>
</html>
