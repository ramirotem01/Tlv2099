<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חמ"ל מבצעי | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                              url('https://res.cloudinary.com/dxygefiai/image/upload/v1776869126/TLVDESH_lkyxtd.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            font-family: 'Assistant', sans-serif; 
        }
        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .neon-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .neon-border { 
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-3px); border-color: rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <header class="flex justify-between items-center mb-10 pb-6 border-b border-slate-800">
        <div class="flex items-center gap-4">
            <h1 class="text-4xl font-black text-white italic tracking-tighter neon-text">TLV2099</h1>
            <span class="text-slate-500 font-bold">| חמ"ל מבצעי</span>
        </div>
        <div class="flex items-center gap-4 glass p-2.5 px-5 rounded-full neon-border shadow-lg">
            <span id="player-username" class="font-bold text-blue-400">טוען...</span>
            <span class="text-slate-600">|</span>
            <button id="logout-btn" class="text-xs text-slate-500 hover:text-white transition-colors">התנתק</button>
        </div>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8 max-w-7xl mx-auto">
        <div class="glass p-6 rounded-3xl stat-card flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest">רמה</div>
            <div id="stat-level" class="text-5xl font-extrabold text-blue-500 tracking-tighter">-</div>
        </div>
        <div class="glass p-6 rounded-3xl stat-card flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest">נקודות כוח (ATK)</div>
            <div id="stat-power" class="text-5xl font-extrabold text-red-500 tracking-tighter">0</div>
        </div>
        <div class="glass p-6 rounded-3xl stat-card flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest">זוזים</div>
            <div id="stat-coins" class="text-5xl font-extrabold text-white tracking-tighter">-</div>
        </div>
        <div class="glass p-6 rounded-3xl stat-card flex flex-col items-center text-center shadow-lg border border-slate-800">
            <div class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest">סטטוס אנרגיה</div>
            <div id="stat-energy-text" class="text-5xl font-extrabold text-green-400 tracking-tighter">-%</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mb-10">
        <div class="glass p-6 rounded-[2.5rem] border border-slate-800 relative overflow-hidden">
            <div class="flex items-center justify-between mb-6">
                <h3 class="font-black text-xs uppercase tracking-[0.3em] text-slate-500">ציוד לחימה נוכחי (Loadout)</h3>
                <div class="h-px flex-1 bg-slate-800 mx-6"></div>
            </div>
            <div id="inventory-list" class="flex gap-4 overflow-x-auto pb-2">
                <div class="text-slate-600 text-xs italic">טוען ציוד...</div>
            </div>
        </div>
    </div>

    <div class="max-w-2xl mx-auto space-y-6">
        <a href="map.html" class="block w-full glass hover:bg-slate-900/80 p-7 rounded-3xl flex items-center justify-between border border-blue-900/40 shadow-lg shadow-blue-950/20 active:scale-95 transition-all group">
            <div class="flex flex-col gap-1">
                <span class="text-2xl font-black text-white">צא לציד מפלצות</span>
                <span class="text-sm text-slate-400">פתח את המפה הטקטית של תל אביב</span>
            </div>
            <span class="text-5xl text-blue-600 group-hover:scale-110 transition-transform">🗺️</span>
        </a>
        <a href="inventory.html" class="block w-full glass hover:bg-slate-900/80 p-7 rounded-3xl flex items-center justify-between border border-slate-800 shadow-lg active:scale-95 transition-all group">
            <div class="flex flex-col gap-1">
                <span class="text-2xl font-black text-white">נשקייה וציוד</span>
                <span class="text-sm text-slate-400">נהל את מלאי הנשקים והשדרוגים</span>
            </div>
            <span class="text-5xl text-blue-600 group-hover:scale-110 transition-transform">⚔️</span>
        </a>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // הגדרת ערכי הכוח של הפריטים (כדי לחשב ATK)
        const itemStats = {
            'pistol_nemesis': { name: 'אקדח פעימה', atk: 25, icon: '🔫' },
            'katana_thermal': { name: 'קטאנה טרמית', atk: 45, icon: '⚔️' },
            'nano_boost': { name: 'ננו-בוסט', atk: 0, icon: '💊' }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, "players", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const inventory = data.inventory || [];
                    
                    // עדכון טקסטים בסיסיים
                    document.getElementById('player-username').innerText = data.username;
                    document.getElementById('stat-level').innerText = data.level;
                    document.getElementById('stat-coins').innerText = data.coins;
                    document.getElementById('stat-energy-text').innerText = data.energy + "%";

                    // חישוב כוח התקפה ותצוגת ציוד
                    let totalAtk = 0;
                    const inventoryContainer = document.getElementById('inventory-list');
                    inventoryContainer.innerHTML = ''; // ניקוי הטוען

                    if (inventory.length === 0) {
                        inventoryContainer.innerHTML = '<div class="text-slate-600 text-xs italic">אין ציוד זמין. בקר בנשקייה.</div>';
                    }

                    inventory.forEach(itemId => {
                        if (itemStats[itemId]) {
                            totalAtk += itemStats[itemId].atk;
                            
                            // יצירת אלמנט ויזואלי לכל נשק ב-Loadout
                            const itemDiv = document.createElement('div');
                            itemDiv.className = "bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex flex-col items-center min-w-[100px]";
                            itemDiv.innerHTML = `
                                <span class="text-3xl mb-2">${itemStats[itemId].icon}</span>
                                <span class="text-[10px] font-bold text-slate-400 text-center">${itemStats[itemId].name}</span>
                            `;
                            inventoryContainer.appendChild(itemDiv);
                        }
                    });

                    document.getElementById('stat-power').innerText = totalAtk;

                }
            } else {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = 'index.html'; });
        });
    </script>
</body>
</html>
