<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BITCOIN BREACH | PCS365</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; color: white; font-family: 'Assistant', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { 
            border: 4px solid #1e293b; 
            /* הרקע מוגדר כאן ונשאר קבוע */
            background: url('https://res.cloudinary.com/dxygefiai/image/upload/v1777130914/%D7%91%D7%99%D7%98%D7%A7%D7%95%D7%95%D7%99%D7%9F_rm4xa9.png') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 50px rgba(0,0,0,0.9) inset;
        }
        .neon-text { text-shadow: 0 0 15px #3b82f6; }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

<div id="game-container">
    <div class="mb-4 text-center">
        <h1 id="status-text" class="text-4xl font-black italic tracking-tighter neon-text text-blue-500 uppercase">The Bitcoin Breach: Hard Mode</h1>
        <p class="text-slate-400 text-sm font-bold">חמק ממערכות ההגנה הדינמיות והגע לליבה</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
    import { auth, db } from '../firebase-config.js'; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900;
    canvas.height = 550;

    let gameActive = true;
    let currentUser = null;

    const player = { x: 30, y: 30, size: 16, speed: 4.5 };
    const goal = { x: 830, y: 470, size: 45 };
    
    // מערך מכשולים מורכב יותר
    const obstacles = [
        // לייזרים אנכיים מהירים
        { x: 150, y: 0, w: 8, h: 300, sy: 5 },
        { x: 300, y: 250, w: 8, h: 300, sy: -6 },
        { x: 450, y: 0, w: 8, h: 350, sy: 7 },
        { x: 600, y: 200, w: 8, h: 350, sy: -5 },
        { x: 750, y: 0, w: 8, h: 250, sy: 8 },
        
        // לייזרים אופקיים "חונקים"
        { x: 0, y: 120, w: 250, h: 8, sx: 4 },
        { x: 500, y: 380, w: 300, h: 8, sx: -5 },
        
        // לייזר פועם (משנה גודל)
        { x: 350, y: 150, w: 100, h: 100, pulse: 0, baseSize: 100 }
    ];

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    async function handleWin() {
        if (!gameActive) return;
        gameActive = false;
        document.getElementById('status-text').innerText = "DATABASE BREACHED!";
        
        if (currentUser) {
            try {
                const docRef = doc(db, "players", currentUser.uid);
                await updateDoc(docRef, {
                    currentQuestStatus: 'completed',
                    coins: increment(50)
                });
                alert("המשימה הושלמה! הדרגה עודכנה במערכת.");
                window.location.href = '../dashboard.html';
            } catch (e) {
                console.error(e);
                window.location.href = '../dashboard.html';
            }
        }
    }

    function update() {
        if (!gameActive) return;

        // תנועת שחקן
        if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= player.speed;
        if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.size) player.y += player.speed;
        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.size) player.x += player.speed;

        obstacles.forEach(ob => {
            // תנועה אנכית
            if (ob.sy) {
                ob.y += ob.sy;
                if (ob.y + ob.h > canvas.height || ob.y < 0) ob.sy *= -1;
            }
            // תנועה אופקית
            if (ob.sx) {
                ob.x += ob.sx;
                if (ob.x + ob.w > canvas.width || ob.x < 0) ob.sx *= -1;
            }
            // אפקט פעימה (קושי נוסף)
            if (ob.pulse !== undefined) {
                ob.pulse += 0.05;
                ob.w = ob.baseSize + Math.sin(ob.pulse) * 50;
                ob.h = ob.baseSize + Math.cos(ob.pulse) * 50;
            }

            // בדיקת התנגשות
            if (player.x < ob.x + ob.w && player.x + player.size > ob.x &&
                player.y < ob.y + ob.h && player.y + player.size > ob.y) {
                player.x = 30; player.y = 30; // מוות
            }
        });

        if (player.x < goal.x + goal.size && player.x + player.size > goal.x &&
            player.y < goal.y + goal.size && player.y + player.size > goal.y) {
            handleWin();
        }
    }

    function draw() {
        // מנקים את הקנבס כדי לראות את תמונת הרקע של ה-CSS
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // שכבת כהות עדינה מאוד כדי להבליט את האלמנטים
        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // המטרה
        ctx.shadowBlur = 30; ctx.shadowColor = '#facc15';
        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        ctx.arc(goal.x + 22, goal.y + 22, 22, 0, Math.PI*2);
        ctx.fill();

        // לייזרים - אדום בוהק
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
        ctx.fillStyle = '#ff1111';
        obstacles.forEach(ob => {
            ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
        });

        // שחקן - כחול ניאון
        ctx.shadowBlur = 20; ctx.shadowColor = '#00d2ff';
        ctx.fillStyle = '#00d2ff';
        ctx.fillRect(player.x, player.y, player.size, player.size);
        
        ctx.shadowBlur = 0;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loop();
        } else {
            window.location.href = '../index.html';
        }
    });
</script>
</body>
</html>
