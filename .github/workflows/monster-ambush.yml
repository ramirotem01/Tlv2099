name: Offline Monster Ambush

on:
  schedule:
    - cron: '0 */8 * * *' # רץ כל 8 שעות
  workflow_dispatch: # הרצה ידנית לבדיקה

jobs:
  ambush:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install firebase-admin

      - name: Run Ambush Script
        env:
          # כאן יש להזין את ה-JSON של ה-Service Account ב-GitHub Secrets
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node ambush_logic.js
