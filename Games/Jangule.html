<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Jungle Quest - PCS365</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;800&display=swap');
        body { margin:0; overflow:hidden; background:#064e3b; font-family: 'Assistant', sans-serif; }
        canvas { display:block; margin:auto; border-bottom: 8px solid #365314; }
        .jungle-font { font-weight: 800; text-shadow: 2px 2px 0px #14532d; }
        
        #overlay {
            position:absolute;
            inset:0;
            display:none;
            background:rgba(6, 78, 59, 0.9);
            backdrop-filter: blur(8px);
            justify-content:center;
            align-items:center;
            flex-direction:column;
            z-index: 50;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center h-screen">

<div class="absolute top-5 flex justify-between w-full px-10 pointer-events-none">
    <h1 class="text-4xl text-white jungle-font">🌴 JUNGLE QUEST</h1>
    <div class="bg-black/40 p-3 rounded-xl border border-green-400">
        <p class="text-yellow-400 font-bold text-xl" id="coinCounter">🪙 מטבעות: 0 / 15</p>
    </div>
</div>

<canvas id="gameCanvas" width="900" height="450"></canvas>

<div id="overlay">
    <div class="bg-white p-10 rounded-3xl text-center shadow-2xl">
        <h2 class="text-6xl text-green-600 font-black mb-4">אללוף הג'ונגל! 🏆</h2>
        <p class="text-2xl text-slate-700 mb-6">אספת את כל המטבעות ושרדת את המסלול!</p>
        <div class="text-4xl animate-bounce">💰 +50</div>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game Constants
const TARGET_COINS = 15;
const GROUND_Y = 350;

let gameActive = true;
let winTriggered = false;
let currentUser = null;
let loopStarted = false;

// 🏃 Player
const player = {
    x: 100,
    y: GROUND_Y,
    w: 45,
    h: 55,
    dy: 0,
    gravity: 0.7,
    jump: -15,
    onGround: true,
    rotation: 0
};

let distance = 0;
let collectedCoins = 0;
const obstacles = [];
const coins = [];
const clouds = Array.from({length: 5}, () => ({ x: Math.random()*900, y: Math.random()*150, s: Math.random()+0.5 }));

// Controls
window.addEventListener("keydown", e => {
    if ((e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") && player.onGround) {
        player.dy = player.jump;
        player.onGround = false;
    }
});

async function handleWin() {
    if (winTriggered) return;
    winTriggered = true;
    gameActive = false;

    document.getElementById("overlay").style.display = "flex";

    try {
        const ref = doc(db, "players", currentUser.uid);
        await updateDoc(ref, {
            currentQuestStatus: "completed",
            coins: increment(50)
        });
        console.log("Win Recorded in DB");
    } catch (e) {
        console.error("Firebase Error:", e);
    }

    setTimeout(() => {
        window.location.href = "../dashboard.html";
    }, 3000);
}

function update() {
    if (!gameActive) return;

    distance++;
    
    // Physics
    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        player.dy = 0;
        player.onGround = true;
        player.rotation = 0;
    } else {
        player.rotation += 0.1; // Rotate in mid-air
    }

    // Spawn Obstacles (Bush/Spikes)
    if (Math.random() < 0.015) {
        obstacles.push({ x: canvas.width, y: GROUND_Y + 10, w: 40, h: 40, type: '🌵' });
    }

    // Spawn Coins
    if (Math.random() < 0.02) {
        coins.push({ x: canvas.width, y: GROUND_Y - 50 - Math.random() * 100, r: 12 });
    }

    // Movement
    obstacles.forEach((o, index) => {
        o.x -= (6 + (distance/1000)); // Speed increases slightly
        
        // Collision with Obstacle -> Reset
        if (player.x < o.x + o.w - 10 && player.x + player.w > o.x + 10 &&
            player.y < o.y + o.h && player.y + player.size > o.y) {
            resetPlayer();
        }
    });

    coins.forEach((c, index) => {
        c.x -= 6;
        if (player.x < c.x + 15 && player.x + player.w > c.x - 15 &&
            player.y < c.y + 15 && player.y + player.h > c.y - 15) {
            coins.splice(index, 1);
            collectedCoins++;
            document.getElementById("coinCounter").innerText = `🪙 מטבעות: ${collectedCoins} / ${TARGET_COINS}`;
        }
    });

    clouds.forEach(cl => {
        cl.x -= cl.s;
        if (cl.x < -100) cl.x = canvas.width + 100;
    });

    // Cleanup
    if (obstacles.length && obstacles[0].x < -50) obstacles.shift();
    if (coins.length && coins[0].x < -50) coins.shift();

    // Win Check
    if (collectedCoins >= TARGET_COINS) {
        handleWin();
    }
}

function resetPlayer() {
    distance = 0;
    collectedCoins = 0;
    obstacles.length = 0;
    coins.length = 0;
    player.y = GROUND_Y;
    document.getElementById("coinCounter").innerText = `🪙 מטבעות: 0 / ${TARGET_COINS}`;
}

function draw() {
    // Clear & Background Gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, "#0ea5e9"); // Sky
    grad.addColorStop(1, "#064e3b"); // Jungle dark
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Clouds
    ctx.font = "40px Arial";
    clouds.forEach(cl => ctx.fillText("☁️", cl.x, cl.y));

    // Ground
    ctx.fillStyle = "#3f6212";
    ctx.fillRect(0, GROUND_Y + 40, canvas.width, 100);

    // Draw Obstacles
    ctx.font = "40px Arial";
    obstacles.forEach(o => {
        ctx.fillText("🌵", o.x, o.y + 30);
    });

    // Draw Coins
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#facc15";
    ctx.fillStyle = "#facc15";
    coins.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#a16207";
        ctx.fillText("⭐", c.x - 10, c.y + 10);
        ctx.fillStyle = "#facc15";
    });
    ctx.shadowBlur = 0;

    // Draw Player (The Runner)
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    ctx.rotate(player.rotation);
    ctx.font = "50px Arial";
    ctx.fillText("🏃", -25, 25);
    ctx.restore();

    // Environment decoration
    ctx.fillText("🌴", 20, GROUND_Y + 40);
    ctx.fillText("🌳", 800, GROUND_Y + 40);
}

function loop() {
    if (!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user => {
    if (!user) {
        window.location.href = "../index.html";
        return;
    }
    currentUser = user;
    if (!loopStarted) {
        loopStarted = true;
        loop();
    }
});
</script>

</body>
</html>
