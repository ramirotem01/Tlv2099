<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Jungle Quest - Fair Play Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;800&display=swap');
        body { margin:0; overflow:hidden; background:#064e3b; font-family: 'Assistant', sans-serif; }
        canvas { display:block; margin:auto; border-bottom: 8px solid #365314; }
        .jungle-font { font-weight: 800; text-shadow: 2px 2px 0px #14532d; }
        
        #overlay {
            position:absolute;
            inset:0;
            display:none;
            background:rgba(6, 78, 59, 0.95);
            backdrop-filter: blur(10px);
            justify-content:center;
            align-items:center;
            flex-direction:column;
            z-index: 50;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center h-screen">

<div class="absolute top-5 flex justify-between w-full px-10 pointer-events-none">
    <h1 class="text-4xl text-white jungle-font">🌴 JUNGLE QUEST - EASY ELEPHANTS</h1>
    <div class="bg-black/40 p-3 rounded-xl border border-yellow-500 shadow-[0_0_15px_rgba(250,204,21,0.3)]">
        <p class="text-yellow-400 font-bold text-2xl" id="coinCounter">🪙 מטבעות: 0 / 50</p>
    </div>
</div>

<canvas id="gameCanvas" width="1000" height="500"></canvas>

<div id="overlay">
    <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400">
        <h2 class="text-7xl text-green-600 font-black mb-4">כל הכבוד! 👑</h2>
        <p class="text-2xl text-slate-700 mb-8 font-bold">הצלחת לעבור את הג'ונגל בסטייל.</p>
        <div class="text-5xl animate-bounce">💰 +50 COINS</div>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const TARGET_COINS = 50;
const GROUND_Y = 400;

let gameActive = true;
let winTriggered = false;
let currentUser = null;
let loopStarted = false;
let animationFrameId = null;

const player = {
    x: 800, 
    y: GROUND_Y,
    w: 50,
    h: 60,
    dy: 0,
    gravity: 0.8,
    jump: -17,
    onGround: true,
    rotation: 0
};

let collectedCoins = 0;
const obstacles = [];
const coins = [];
const clouds = Array.from({length: 6}, () => ({ x: Math.random()*1000, y: Math.random()*180, s: Math.random()*0.5 + 0.2 }));

window.addEventListener("keydown", e => {
    if (!gameActive) return;
    if ((e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") && player.onGround) {
        player.dy = player.jump;
        player.onGround = false;
    }
});

async function handleWin() {
    if (winTriggered) return;
    winTriggered = true;
    gameActive = false;
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    document.getElementById("overlay").style.display = "flex";

    try {
        const ref = doc(db, "players", currentUser.uid);
        await updateDoc(ref, {
            currentQuestStatus: "completed",
            coins: increment(50)
        });
    } catch (e) {
        console.error("Firebase Error:", e);
    }

    setTimeout(() => {
        window.location.href = "../dashboard.html";
    }, 3500);
}

function update() {
    if (!gameActive) return;

    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        player.dy = 0;
        player.onGround = true;
        player.rotation = 0;
    } else {
        player.rotation -= 0.1;
    }

    // יצירת חיות - סיכוי הופעה נמוך וחלוקה הוגנת
    if (Math.random() < 0.007) {
        let type;
        const rand = Math.random();
        
        if (rand > 0.8) { // 20% סיכוי בלבד לפיל
            type = {icon: '🐘', size: 32}; // מוקטן מ-45 ל-32
        } else { // 80% סיכוי לחזיר (קל יותר)
            type = {icon: '🐗', size: 28};
        }

        obstacles.push({ 
            x: -100, 
            y: GROUND_Y + 25, 
            w: type.size, 
            h: type.size, 
            icon: type.icon, 
            speed: 6.5 
        });
    }

    // ציפורים - נדירות וקטנות
    if (Math.random() < 0.004) {
        obstacles.push({ 
            x: -100, 
            y: GROUND_Y - 110, 
            w: 25, 
            h: 25, 
            icon: '🦜', 
            speed: 8 
        });
    }

    if (Math.random() < 0.03) {
        coins.push({ x: -100, y: GROUND_Y - 60 - Math.random() * 150, r: 14 });
    }

    obstacles.forEach((o, index) => {
        o.x += o.speed;
        
        // Hitbox סופר סלחני כדי למנוע תסכול
        if (player.x < o.x + o.w - 12 && player.x + player.w > o.x + 12 &&
            player.y < o.y + o.h - 12 && player.y + player.h > o.y + 12) {
            resetGame();
        }
    });

    coins.forEach((c, index) => {
        c.x += 7;
        if (player.x < c.x + 20 && player.x + player.w > c.x - 20 &&
            player.y < c.y + 20 && player.y + player.h > c.y - 20) {
            coins.splice(index, 1);
            collectedCoins++;
            document.getElementById("coinCounter").innerText = `🪙 מטבעות: ${collectedCoins} / ${TARGET_COINS}`;
            if (collectedCoins >= TARGET_COINS) handleWin();
        }
    });

    clouds.forEach(cl => {
        cl.x += cl.s;
        if (cl.x > canvas.width + 150) cl.x = -150;
    });

    if (obstacles.length && obstacles[0].x > canvas.width + 100) obstacles.shift();
    if (coins.length && coins[0].x > canvas.width + 100) coins.shift();
}

function resetGame() {
    collectedCoins = 0;
    obstacles.length = 0;
    coins.length = 0;
    player.y = GROUND_Y;
    player.x = 800;
    document.getElementById("coinCounter").innerText = `🪙 מטבעות: 0 / ${TARGET_COINS}`;
}

function draw() {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, "#075985"); 
    skyGrad.addColorStop(1, "#064e3b");
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = "50px Arial";
    clouds.forEach(cl => ctx.fillText("☁️", cl.x, cl.y));

    ctx.fillStyle = "#1a2e05";
    ctx.fillRect(0, GROUND_Y + 50, canvas.width, 100);

    obstacles.forEach(o => {
        ctx.save();
        ctx.translate(o.x + o.w/2, o.y + o.h/2);
        ctx.scale(-1, 1); 
        ctx.font = `${o.w}px Arial`;
        ctx.fillText(o.icon, -o.w/2, o.h/2);
        ctx.restore();
    });

    ctx.shadowBlur = 20;
    ctx.shadowColor = "#fbbf24";
    ctx.fillStyle = "#fbbf24";
    coins.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#78350f";
        ctx.font = "14px Arial";
        ctx.fillText("50", c.x - 8, c.y + 5);
        ctx.fillStyle = "#fbbf24";
    });
    ctx.shadowBlur = 0;

    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    ctx.rotate(player.rotation);
    ctx.font = "60px Arial";
    ctx.fillText("🏃", -30, 30);
    ctx.restore();

    ctx.font = "70px Arial";
    ctx.fillText("🌴", 900, GROUND_Y + 50);
    ctx.fillText("🌿", 50, GROUND_Y + 60);
}

function loop() {
    if (!gameActive) return;
    update();
    draw();
    animationFrameId = requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user => {
    if (!user) {
        window.location.href = "../index.html";
        return;
    }
    currentUser = user;
    if (!loopStarted) {
        loopStarted = true;
        loop();
    }
});
</script>

</body>
</html>
