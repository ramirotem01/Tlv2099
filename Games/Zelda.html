<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Neon Zelda Quest - PCS365 Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    body { margin:0; overflow:hidden; background:#020617; color:white; font-family: 'Orbitron', sans-serif; }
    canvas { display:block; margin:auto; border: 2px solid #334155; box-shadow: 0 0 50px rgba(0,255,255,0.1); background: #010409; }
    .neon-text { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
    #overlay {
        position:absolute; inset:0; display:none; background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(10px); justify-content:center; align-items:center;
        flex-direction:column; z-index: 100;
    }
    #ui-layer { position: absolute; top: 20px; width: 700px; display: flex; justify-content: space-between; pointer-events: none; }
</style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

<div id="ui-layer">
    <div class="bg-black/60 p-3 border border-cyan-500/30 rounded-lg">
        <div class="text-[10px] text-cyan-400 uppercase tracking-tighter">Crystals Collected</div>
        <div id="score" class="text-2xl font-black">0 / 10</div>
    </div>
    <div class="bg-black/60 p-3 border border-red-500/30 rounded-lg text-right">
        <div class="text-[10px] text-red-400 uppercase tracking-tighter">Status</div>
        <div class="text-sm font-bold text-white">RESET ON DEATH</div>
    </div>
</div>

<h1 class="text-3xl font-black neon-text mb-4 italic tracking-widest uppercase">Neon Zelda Quest</h1>

<div class="relative">
    <canvas id="gameCanvas" width="700" height="500"></canvas>
    <div id="overlay">
        <h2 class="text-6xl font-black text-green-400 mb-2 italic">QUEST COMPLETE</h2>
        <p class="text-white opacity-70 mb-6 uppercase tracking-widest">PCS365: Rewards Synced</p>
        <div class="px-6 py-2 border border-green-500 text-green-500 font-bold animate-pulse">+50 COINS</div>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- Assets Logic ---
const linkSVG = `<svg width="30" height="30" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <path fill="#2d5e1e" d="M4 1h8v2H4zm-1 2h10v3H3z"/>
    <path fill="#fbc599" d="M4 6h8v4H4zm1 1h1v1H5zm5 0h1v1h-1z"/>
    <path fill="#1e40af" d="M4 10h8v4H4z"/>
    <path fill="#6e3c11" d="M3 14h3v2H3zm7 0h3v2h-3z"/>
</svg>`;
const linkImg = new Image();
linkImg.src = 'data:image/svg+xml;base64,' + btoa(linkSVG);

let gameActive = true;
let winTriggered = false;
let currentUser = null;

const player = {
    x: 350, y: 250, size: 30, speed: 4,
    attacking: false, attackTimer: 0, dir: 'down'
};

const crystals = [];
function initCrystals() {
    crystals.length = 0;
    for(let i=0; i<10; i++) {
        crystals.push({ x: 50 + Math.random()*600, y: 50 + Math.random()*400, collected: false, w: 20, h: 20 });
    }
}
initCrystals();

const enemies = [];
function initEnemies() {
    enemies.length = 0;
    for(let i=0; i<6; i++) {
        enemies.push({
            x: Math.random()*650, y: Math.random()*450,
            size: 25, dx: (Math.random()-0.5)*3, dy: (Math.random()-0.5)*3,
            alive: true
        });
    }
}
initEnemies();

const keys = {};
window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if(e.code === "Space" && !player.attacking) {
        player.attacking = true;
        player.attackTimer = 15;
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function resetGame() {
    player.x = 350; player.y = 250;
    initCrystals();
    initEnemies();
    updateUI();
}

function updateUI() {
    const count = crystals.filter(c => c.collected).length;
    document.getElementById("score").innerText = `${count} / 10`;
}

async function handleWin() {
    if(winTriggered) return;
    winTriggered = true; gameActive = false;
    document.getElementById("overlay").style.display = "flex";
    try {
        const ref = doc(db, "players", currentUser.uid);
        await updateDoc(ref, { currentQuestStatus: "completed", coins: increment(50) });
    } catch(e) { console.error(e); }
    setTimeout(() => window.location.href = "../dashboard.html", 3000);
}

function update() {
    if(!gameActive) return;

    if(keys["ArrowUp"] || keys["KeyW"]) { player.y -= player.speed; player.dir = 'up'; }
    if(keys["ArrowDown"] || keys["KeyS"]) { player.y += player.speed; player.dir = 'down'; }
    if(keys["ArrowLeft"] || keys["KeyA"]) { player.x -= player.speed; player.dir = 'left'; }
    if(keys["ArrowRight"] || keys["KeyD"]) { player.x += player.speed; player.dir = 'right'; }

    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

    if(player.attackTimer > 0) player.attackTimer--;
    else player.attacking = false;

    enemies.forEach(e => {
        if(!e.alive) return;
        e.x += e.dx; e.y += e.dy;
        if(e.x < 0 || e.x > canvas.width - e.size) e.dx *= -1;
        if(e.y < 0 || e.y > canvas.height - e.size) e.dy *= -1;

        // Collision Enemy vs Player
        if(Math.abs(player.x - e.x) < 25 && Math.abs(player.y - e.y) < 25) {
            if(player.attacking) {
                e.alive = false;
            } else {
                resetGame(); // פסילה = איפוס מלא
            }
        }
    });

    crystals.forEach(c => {
        if(!c.collected && Math.abs(player.x - c.x) < 25 && Math.abs(player.y - c.y) < 25) {
            c.collected = true;
            updateUI();
        }
    });

    if(crystals.every(c => c.collected)) handleWin();
}

function draw() {
    ctx.fillStyle = "#010409";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw Crystals (Neon Green Gems)
    crystals.forEach(c => {
        if(!c.collected) {
            ctx.shadowBlur = 15; ctx.shadowColor = "#0f0";
            ctx.fillStyle = "#0f0";
            ctx.beginPath();
            ctx.moveTo(c.x, c.y - 10); ctx.lineTo(c.x + 8, c.y);
            ctx.lineTo(c.x, c.y + 10); ctx.lineTo(c.x - 8, c.y);
            ctx.closePath(); ctx.fill();
        }
    });

    // Draw Enemies (Glowing Red Spirits)
    enemies.forEach(e => {
        if(e.alive) {
            ctx.shadowBlur = 20; ctx.shadowColor = "#f00";
            ctx.fillStyle = "#f00";
            ctx.font = "24px Arial";
            ctx.fillText("💀", e.x, e.y + 20);
        }
    });
    ctx.shadowBlur = 0;

    // Draw Sword Effect
    if(player.attacking) {
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
        ctx.shadowBlur = 10; ctx.shadowColor = "#0ff";
        ctx.beginPath();
        if(player.dir === 'right') ctx.arc(player.x + 40, player.y + 15, 20, -1, 1);
        if(player.dir === 'left') ctx.arc(player.x - 10, player.y + 15, 20, 2, 4);
        if(player.dir === 'up') ctx.arc(player.x + 15, player.y - 10, 20, 3.5, 6);
        if(player.dir === 'down') ctx.arc(player.x + 15, player.y + 40, 20, 0.5, 2.5);
        ctx.stroke();
    }

    // Draw Player
    ctx.drawImage(linkImg, player.x, player.y, player.size, player.size);
}

function loop() {
    update(); draw();
    if(gameActive) requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user => {
    if(!user) return;
    currentUser = user;
    updateUI();
    loop();
});
</script>
</body>
</html>
