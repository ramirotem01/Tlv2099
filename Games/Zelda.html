<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Neon Zelda Quest - Combat Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    body { margin:0; overflow:hidden; background:#020617; color:white; font-family: 'Orbitron', sans-serif; }
    canvas { display:block; margin:auto; border: 2px solid #334155; box-shadow: 0 0 50px rgba(0,255,255,0.1); background: #010409; }
    .neon-text { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
    #overlay {
        position:absolute; inset:0; display:none; background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(10px); justify-content:center; align-items:center;
        flex-direction:column; z-index: 100;
    }
    #ui-layer { position: absolute; top: 20px; width: 700px; display: flex; gap: 15px; pointer-events: none; }
</style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

<div id="ui-layer">
    <div class="bg-black/60 p-3 border border-cyan-500/30 rounded-lg flex-1">
        <div class="text-[10px] text-cyan-400 uppercase tracking-tighter">Crystals</div>
        <div id="crystal-score" class="text-2xl font-black text-white">0 / 10</div>
    </div>
    <div class="bg-black/60 p-3 border border-red-500/30 rounded-lg flex-1">
        <div class="text-[10px] text-red-400 uppercase tracking-tighter">Enemies Slain</div>
        <div id="enemy-score" class="text-2xl font-black text-white">0 / 6</div>
    </div>
    <div class="bg-black/60 p-3 border border-yellow-500/30 rounded-lg text-right">
        <div class="text-[10px] text-yellow-400 uppercase tracking-tighter">Mission</div>
        <div id="mission-status" class="text-xs font-bold text-white uppercase italic">Clear the area!</div>
    </div>
</div>

<h1 class="text-3xl font-black neon-text mb-4 italic tracking-widest uppercase">Neon Zelda: Total War</h1>

<div class="relative">
    <canvas id="gameCanvas" width="700" height="500"></canvas>
    <div id="overlay">
        <h2 class="text-6xl font-black text-green-400 mb-2 italic">ARENA CLEARED</h2>
        <p class="text-white opacity-70 mb-6 uppercase tracking-widest">PCS365: All targets eliminated</p>
        <div class="px-6 py-2 border border-green-500 text-green-500 font-bold animate-pulse">+50 COINS</div>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const linkImg = new Image();
const linkSVG = `<svg width="30" height="30" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <path fill="#2d5e1e" d="M4 1h8v2H4zm-1 2h10v3H3z"/>
    <path fill="#fbc599" d="M4 6h8v4H4zm1 1h1v1H5zm5 0h1v1h-1z"/>
    <path fill="#1e40af" d="M4 10h8v4H4z"/>
    <path fill="#6e3c11" d="M3 14h3v2H3zm7 0h3v2h-3z"/>
</svg>`;
linkImg.src = 'data:image/svg+xml;base64,' + btoa(linkSVG);

let gameActive = true;
let winTriggered = false;
let currentUser = null;

const player = {
    x: 350, y: 250, size: 30, speed: 4.5,
    attacking: false, attackTimer: 0, dir: 'down'
};

const crystals = [];
const enemies = [];

function initLevel() {
    // אתחול קריסטלים
    crystals.length = 0;
    for(let i=0; i<10; i++) {
        crystals.push({ x: 50 + Math.random()*600, y: 50 + Math.random()*400, collected: false });
    }
    // אתחול אויבים
    enemies.length = 0;
    for(let i=0; i<6; i++) {
        enemies.push({
            x: Math.random()*600 + 50, y: Math.random()*400 + 50,
            size: 25, dx: (Math.random()-0.5)*4, dy: (Math.random()-0.5)*4,
            alive: true
        });
    }
}
initLevel();

const keys = {};
window.addEventListener("keydown", e => {
    keys[e.code] = true;
    if(e.code === "Space" && !player.attacking) {
        player.attacking = true;
        player.attackTimer = 12;
    }
});
window.addEventListener("keyup", e => keys[e.code] = false);

function updateUI() {
    const cCount = crystals.filter(c => c.collected).length;
    const eCount = enemies.filter(e => !e.alive).length;
    
    document.getElementById("crystal-score").innerText = `${cCount} / 10`;
    document.getElementById("enemy-score").innerText = `${eCount} / 6`;
    
    const status = document.getElementById("mission-status");
    if(cCount === 10 && eCount === 6) {
        status.innerText = "ALL GOALS MET!";
        status.className = "text-xs font-bold text-green-400 uppercase italic animate-bounce";
    } else {
        status.innerText = "Clear the area!";
    }
}

function resetGame() {
    player.x = 350; player.y = 250;
    initLevel();
    updateUI();
}

async function handleWin() {
    if(winTriggered) return;
    winTriggered = true; gameActive = false;
    document.getElementById("overlay").style.display = "flex";
    try {
        const ref = doc(db, "players", currentUser.uid);
        await updateDoc(ref, { currentQuestStatus: "completed", coins: increment(50) });
    } catch(e) { console.error(e); }
    setTimeout(() => window.location.href = "../dashboard.html", 3500);
}

function update() {
    if(!gameActive) return;

    if(keys["ArrowUp"] || keys["KeyW"]) { player.y -= player.speed; player.dir = 'up'; }
    if(keys["ArrowDown"] || keys["KeyS"]) { player.y += player.speed; player.dir = 'down'; }
    if(keys["ArrowLeft"] || keys["KeyA"]) { player.x -= player.speed; player.dir = 'left'; }
    if(keys["ArrowRight"] || keys["KeyD"]) { player.x += player.speed; player.dir = 'right'; }

    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

    if(player.attackTimer > 0) player.attackTimer--;
    else player.attacking = false;

    // לוגיקת אויבים
    enemies.forEach(e => {
        if(!e.alive) return;
        e.x += e.dx; e.y += e.dy;
        if(e.x < 0 || e.x > canvas.width - e.size) e.dx *= -1;
        if(e.y < 0 || e.y > canvas.height - e.size) e.dy *= -1;

        const dist = Math.hypot(player.x - e.x, player.y - e.y);
        if(dist < 28) {
            if(player.attacking) {
                e.alive = false;
                updateUI();
            } else {
                resetGame(); // פסילה = איפוס הכל
            }
        }
    });

    // לוגיקת קריסטלים
    crystals.forEach(c => {
        if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 25) {
            c.collected = true;
            updateUI();
        }
    });

    const allCrystals = crystals.every(c => c.collected);
    const allDead = enemies.every(e => !e.alive);
    if(allCrystals && allDead) handleWin();
}

function draw() {
    ctx.fillStyle = "#010409";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // קריסטלים
    crystals.forEach(c => {
        if(!c.collected) {
            ctx.shadowBlur = 15; ctx.shadowColor = "#0f0";
            ctx.fillStyle = "#0f0";
            ctx.beginPath();
            ctx.moveTo(c.x, c.y - 10); ctx.lineTo(c.x + 8, c.y);
            ctx.lineTo(c.x, c.y + 10); ctx.lineTo(c.x - 8, c.y);
            ctx.closePath(); ctx.fill();
        }
    });

    // אויבים
    enemies.forEach(e => {
        if(e.alive) {
            ctx.shadowBlur = 20; ctx.shadowColor = "#f00";
            ctx.font = "26px Arial";
            ctx.fillText("💀", e.x, e.y + 20);
        }
    });
    ctx.shadowBlur = 0;

    // חרב
    if(player.attacking) {
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 4;
        ctx.shadowBlur = 15; ctx.shadowColor = "#0ff";
        ctx.beginPath();
        const centerX = player.x + 15; const centerY = player.y + 15;
        if(player.dir === 'right') ctx.arc(centerX + 15, centerY, 25, -1, 1);
        if(player.dir === 'left') ctx.arc(centerX - 15, centerY, 25, 2, 4);
        if(player.dir === 'up') ctx.arc(centerX, centerY - 15, 25, 3.5, 6);
        if(player.dir === 'down') ctx.arc(centerX, centerY + 15, 25, 0.5, 2.5);
        ctx.stroke();
    }

    // שחקן
    ctx.shadowBlur = player.attacking ? 20 : 0;
    ctx.shadowColor = "#0ff";
    ctx.drawImage(linkImg, player.x, player.y, player.size, player.size);
    ctx.shadowBlur = 0;
}

function loop() {
    update(); draw();
    if(gameActive) requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user => {
    if(!user) return;
    currentUser = user;
    updateUI();
    loop();
});
</script>
</body>
</html>
