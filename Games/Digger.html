<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA DIGGER | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Assistant', sans-serif; overflow: hidden; }
        canvas { background: #0f172a; border: 4px solid #1e293b; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); touch-action: none; }
        .neon-text { text-shadow: 0 0 10px #3b82f6; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter neon-text text-blue-500 uppercase">Data Digger 2099</h1>
        <div id="score-display" class="text-2xl font-bold mt-2">שבבים: <span id="chips">0</span> / 50</div>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div class="mt-6 grid grid-cols-3 gap-4 md:hidden">
        <div></div><button onmousedown="move('up')" class="bg-slate-800 p-4 rounded-xl">UP</button><div></div>
        <button onmousedown="move('left')" class="bg-slate-800 p-4 rounded-xl">LEFT</button>
        <button onmousedown="move('down')" class="bg-slate-800 p-4 rounded-xl">DOWN</button>
        <button onmousedown="move('right')" class="bg-slate-800 p-4 rounded-xl">RIGHT</button>
    </div>

    <script type="module">
        // וודא שהנתיב כאן נכון - אם הקובץ בתיקיית Games, השתמש ב ../
        import { auth, db } from '../firebase-config.js'; 
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const chipsDisplay = document.getElementById('chips');

        const TILE_SIZE = 40;
        const ROWS = canvas.height / TILE_SIZE;
        const COLS = canvas.width / TILE_SIZE;

        let player = { x: 0, y: 0, chips: 0 };
        let grid = [];
        let gameActive = true;
        let currentUser = null;

        function initGrid() {
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    if (r === 0 && c === 0) grid[r][c] = 0; 
                    else grid[r][c] = Math.random() < 0.2 ? 2 : 1; // העליתי קצת את הסיכוי ליהלומים
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
                    } else if (grid[r][c] === 2) {
                        ctx.fillStyle = '#3b82f6';
                        ctx.beginPath();
                        ctx.arc(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, 8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            ctx.fillStyle = '#f87171';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ef4444';
            ctx.fillRect(player.x * TILE_SIZE + 5, player.y * TILE_SIZE + 5, TILE_SIZE - 10, TILE_SIZE - 10);
            ctx.shadowBlur = 0;
        }

        async function handleWin() {
            gameActive = false;
            if (currentUser) {
                try {
                    const docRef = doc(db, "players", currentUser.uid);
                    await updateDoc(docRef, {
                        currentQuestStatus: 'completed',
                        level: increment(1),
                        xp: 0,
                        coins: increment(500)
                    });
                    alert("המשימה הושלמה! חוזר לחמ\"ל...");
                    window.location.href = '../dashboard.html';
                } catch (e) {
                    console.error("Error updating DB:", e);
                }
            }
        }

        function move(dir) {
            if (!gameActive) return;
            let newX = player.x;
            let newY = player.y;

            if (dir === 'up') newY--;
            if (dir === 'down') newY++;
            if (dir === 'left') newX--;
            if (dir === 'right') newX++;

            if (newX >= 0 && newX < COLS && newY >= 0 && newY < ROWS) {
                if (grid[newY][newX] === 2) {
                    player.chips++;
                    chipsDisplay.innerText = player.chips;
                }
                grid[newY][newX] = 0;
                player.x = newX;
                player.y = newY;
                draw();
                if (player.chips >= 50) handleWin();
            }
        }

        // חשיפת הפונקציה לחלון הגלובלי כדי שהכפתורים יעבדו
        window.move = move;

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                initGrid();
                draw();
            } else {
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
