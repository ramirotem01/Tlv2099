<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA DIGGER | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Assistant', sans-serif; overflow: hidden; }
        canvas { background: #0f172a; border: 4px solid #1e293b; box-shadow: 0 0 30px rgba(59, 130, 246, 0.1); touch-action: none; }
        .neon-text { text-shadow: 0 0 10px #3b82f6; }
        .stat-box { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(5px); border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="mb-6 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter neon-text text-blue-500 uppercase">Data Digger 2099</h1>
        <p class="text-slate-400 text-sm mb-4">הערם על הווירוס ואסוף 50 שבבים</p>
        
        <div class="flex gap-4 justify-center">
            <div class="stat-box px-6 py-2 rounded-full font-bold text-xl text-blue-400">
                שבבים: <span id="chips">0</span> / 50
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div class="mt-8 grid grid-cols-3 gap-3 md:hidden">
        <div></div>
        <button onmousedown="move('up')" class="bg-slate-800 h-16 w-16 rounded-2xl flex items-center justify-center text-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0">⬆️</button>
        <div></div>
        <button onmousedown="move('left')" class="bg-slate-800 h-16 w-16 rounded-2xl flex items-center justify-center text-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0">⬅️</button>
        <button onmousedown="move('down')" class="bg-slate-800 h-16 w-16 rounded-2xl flex items-center justify-center text-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0">⬇️</button>
        <button onmousedown="move('right')" class="bg-slate-800 h-16 w-16 rounded-2xl flex items-center justify-center text-2xl border-b-4 border-slate-900 active:translate-y-1 active:border-b-0">➡️</button>
    </div>

    <script type="module">
        import { auth, db } from '../firebase-config.js'; 
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const chipsDisplay = document.getElementById('chips');

        const TILE_SIZE = 40;
        const ROWS = canvas.height / TILE_SIZE;
        const COLS = canvas.width / TILE_SIZE;

        let player = { x: 0, y: 0, chips: 0 };
        let enemy = { x: COLS - 1, y: ROWS - 1 }; 
        let grid = [];
        let gameActive = true;
        let currentUser = null;

        function initGrid() {
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    if ((r < 2 && c < 2) || (r > ROWS-3 && c > COLS-3)) {
                        grid[r][c] = 0; 
                    } else {
                        grid[r][c] = Math.random() < 0.45 ? 2 : 1;
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = '#1e293b'; 
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE - 1, TILE_SIZE - 1);
                    } else if (grid[r][c] === 2) {
                        ctx.fillStyle = '#3b82f6';
                        ctx.shadowBlur = 10; ctx.shadowColor = '#3b82f6';
                        ctx.beginPath();
                        ctx.arc(c * TILE_SIZE + TILE_SIZE/2, r * TILE_SIZE + TILE_SIZE/2, 8, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            ctx.font = "24px Arial";
            ctx.shadowBlur = 15; ctx.shadowColor = '#facc15';
            ctx.fillText("👾", enemy.x * TILE_SIZE + 8, enemy.y * TILE_SIZE + 30);
            
            ctx.fillStyle = '#f87171';
            ctx.shadowBlur = 15; ctx.shadowColor = '#ef4444';
            ctx.fillRect(player.x * TILE_SIZE + 6, player.y * TILE_SIZE + 6, TILE_SIZE - 12, TILE_SIZE - 12);
            ctx.shadowBlur = 0;
        }

        function moveEnemy() {
            // רמת קושי: המפלצת זזה רק ב-75% מהמקרים
            if (Math.random() > 0.75) return;

            // החלטה: האם לזוז לכיוון השחקן או רנדומלי?
            const moveRandomly = Math.random() < 0.3; // 30% סיכוי לתנועה רנדומלית

            if (moveRandomly) {
                const dirs = ['up', 'down', 'left', 'right'];
                const randomDir = dirs[Math.floor(Math.random() * dirs.length)];
                if (randomDir === 'up' && enemy.y > 0) enemy.y--;
                else if (randomDir === 'down' && enemy.y < ROWS - 1) enemy.y++;
                else if (randomDir === 'left' && enemy.x > 0) enemy.x--;
                else if (randomDir === 'right' && enemy.x < COLS - 1) enemy.x++;
            } else {
                // תנועה חכמה לכיוון השחקן
                if (Math.abs(player.x - enemy.x) > Math.abs(player.y - enemy.y)) {
                    if (enemy.x < player.x) enemy.x++;
                    else if (enemy.x > player.x) enemy.x--;
                } else {
                    if (enemy.y < player.y) enemy.y++;
                    else if (enemy.y > player.y) enemy.y--;
                }
            }

            if (enemy.x === player.x && enemy.y === player.y) {
                gameOver();
            }
        }

        function gameOver() {
            gameActive = false;
            alert("המערכת הושבתה על ידי הווירוס! נסה שוב.");
            location.reload(); 
        }

        async function handleWin() {
            gameActive = false;
            if (currentUser) {
                try {
                    const docRef = doc(db, "players", currentUser.uid);
                    await updateDoc(docRef, {
                        currentQuestStatus: 'completed',
                        level: increment(1),
                        xp: 0,
                        coins: increment(500)
                    });
                    alert("המשימה הושלמה! שבבי הנתונים חולצו בהצלחה.");
                    window.location.href = '../dashboard.html';
                } catch (e) { console.error(e); }
            }
        }

        function move(dir) {
            if (!gameActive) return;
            let newX = player.x;
            let newY = player.y;

            if (dir === 'up') newY--;
            if (dir === 'down') newY++;
            if (dir === 'left') newX--;
            if (dir === 'right') newX++;

            if (newX >= 0 && newX < COLS && newY >= 0 && newY < ROWS) {
                if (grid[newY][newX] === 2) {
                    player.chips++;
                    chipsDisplay.innerText = player.chips;
                }
                grid[newY][newX] = 0; 
                player.x = newX;
                player.y = newY;
                
                moveEnemy(); 
                draw();
                if (player.chips >= 50) handleWin();
            }
        }

        window.move = move;

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') move('up');
            if (e.key === 'ArrowDown') move('down');
            if (e.key === 'ArrowLeft') move('left');
            if (e.key === 'ArrowRight') move('right');
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                initGrid();
                draw();
            } else {
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
