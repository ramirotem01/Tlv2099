<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Neon Hunter PRO</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

body { margin:0; overflow:hidden; background:#020617; color:white; cursor:none; font-family: 'Orbitron', sans-serif; }
canvas { display:block; margin:auto; filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.2)); }
.neon-text { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff; }

#overlay {
  position:absolute;
  inset:0;
  display:none;
  background:rgba(2, 6, 23, 0.9);
  backdrop-filter: blur(8px);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index: 100;
}

.stats-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 255, 255, 0.1);
    border: 1px solid #0ff;
    padding: 10px 20px;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
}
</style>
</head>

<body class="flex flex-col items-center justify-center h-screen">

<div class="stats-panel">
    <p class="text-cyan-400 font-bold" id="scoreDisplay">SCORE: 0 / 20</p>
</div>

<h1 class="text-4xl neon-text mb-4 tracking-widest">NEON HUNTER</h1>

<canvas id="gameCanvas" width="850" height="550"></canvas>

<div id="overlay">
  <h2 id="overlayText" class="text-7xl neon-text mb-6"></h2>
  <p id="overlaySub" class="text-xl text-cyan-300"></p>
  <div class="mt-10 animate-pulse text-cyan-500">INITIALIZING DASHBOARD...</div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameActive = true;
let winTriggered = false;
let currentUser = null;
let loopStarted = false;

let score = 0;
const targetScore = 20;
let gridOffset = 0;

// 🚀 Player
const player = {
  x: canvas.width/2,
  y: canvas.height - 40,
  w: 50,
  h: 15,
  speed: 8
};

const mouse = { x:400, y:250 };
const monsters = [];
const grenades = [];
const particles = []; // אפקטים של פיצוץ

const keys = {};
window.addEventListener("keydown", e=>keys[e.code]=true);
window.addEventListener("keyup", e=>keys[e.code]=false);

canvas.addEventListener("mousemove", e=>{
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

canvas.addEventListener("click", () => shoot());

function createExplosion(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push({
            x, y,
            vx: (Math.random()-0.5)*10,
            vy: (Math.random()-0.5)*10,
            life: 20,
            color
        });
    }
}

function shoot(){
  if(!gameActive) return;
  
  // אפקט ירי בכוונת
  createExplosion(mouse.x, mouse.y, "#0ff");

  monsters.forEach(m=>{
    const dx = mouse.x - m.x;
    const dy = mouse.y - m.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < m.r + 10){
      m.dead = true;
      score++;
      createExplosion(m.x, m.y, "#f0f");
      document.getElementById("scoreDisplay").innerText = `SCORE: ${score} / 20`;
    }
  });
}

async function handleWin(){
  if(winTriggered) return;
  winTriggered = true;
  gameActive = false;
  showOverlay("SYSTEM CLEARED", "REWARD: 50 NEON COINS");

  try{
    const ref = doc(db,"players",currentUser.uid);
    await updateDoc(ref,{
      currentQuestStatus:"completed",
      coins: increment(50)
    });
  }catch(e){ console.error(e); }
  setTimeout(()=> window.location.href="../dashboard.html",3000);
}

function handleLose(){
  if(winTriggered) return;
  winTriggered = true;
  gameActive = false;
  showOverlay("SYSTEM FAILURE", "REBOOTING...");
  setTimeout(()=> location.reload(), 2500);
}

function showOverlay(title, sub){
  document.getElementById("overlay").style.display="flex";
  document.getElementById("overlayText").innerText=title;
  document.getElementById("overlaySub").innerText=sub;
}

function update(){
  if(!gameActive) return;

  gridOffset = (gridOffset + 1) % 40;

  if(keys["ArrowLeft"] || keys["KeyA"]) player.x -= player.speed;
  if(keys["ArrowRight"] || keys["KeyD"]) player.x += player.speed;
  player.x = Math.max(25, Math.min(canvas.width - 25, player.x));

  if(Math.random() < 0.04){
    monsters.push({
      x: Math.random()*canvas.width,
      y: Math.random()*350,
      r: 15 + Math.random()*10,
      pulse: 0,
      life: 120,
      dead: false
    });
  }

  if(Math.random() < 0.025){
    grenades.push({
      x: Math.random()*canvas.width,
      y: -20,
      speed: 4 + Math.random()*3
    });
  }

  monsters.forEach(m => { m.life--; m.pulse += 0.1; });
  for(let i=monsters.length-1; i>=0; i--){
    if(monsters[i].life <=0 || monsters[i].dead) monsters.splice(i,1);
  }

  grenades.forEach(g=>{
    g.y += g.speed;
    if(Math.abs(g.x - player.x) < 30 && g.y > player.y - 10) handleLose();
  });

  for(let i=grenades.length-1; i>=0; i--){
    if(grenades[i].y > canvas.height) grenades.splice(i,1);
  }

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  for(let i=particles.length-1; i>=0; i--) if(particles[i].life <=0) particles.splice(i,1);

  if(score >= targetScore) handleWin();
}

function draw(){
  // רקע גריד ניאון
  ctx.fillStyle = "#020617";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  ctx.strokeStyle = "rgba(0, 255, 255, 0.05)";
  ctx.lineWidth = 1;
  for(let x=0; x<canvas.width; x+=40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for(let y=gridOffset; y<canvas.height; y+=40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Player - חללית ניאון
  ctx.shadowBlur = 15;
  ctx.shadowColor = "#0f0";
  ctx.fillStyle = "#0f0";
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - 15);
  ctx.lineTo(player.x - 25, player.y + 10);
  ctx.lineTo(player.x + 25, player.y + 10);
  ctx.closePath();
  ctx.fill();

  // Monsters - עיני ניאון
  monsters.forEach(m=>{
    const s = Math.sin(m.pulse) * 5;
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#f0f";
    ctx.fillStyle = "#f0f";
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r + s, 0, Math.PI*2);
    ctx.fill();
    // עין פנימית
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(m.x, m.y, (m.r+s)/2, 0, Math.PI*2);
    ctx.fill();
  });

  // Grenades - פצצות אנרגיה
  ctx.shadowColor = "#ff0";
  grenades.forEach(g=>{
    ctx.fillStyle = "#ff0";
    ctx.beginPath();
    ctx.arc(g.x, g.y, 8, 0, Math.PI*2);
    ctx.fill();
    // הילה
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Particles
  particles.forEach(p => {
      ctx.shadowBlur = 5;
      ctx.shadowColor = p.color;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 3, 3);
  });

  // Crosshair - לייזר
  ctx.shadowBlur = 10;
  ctx.shadowColor = "#0ff";
  ctx.strokeStyle = "#0ff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 15, 0, Math.PI*2); // עיגול כוונת
  ctx.moveTo(mouse.x - 25, mouse.y); ctx.lineTo(mouse.x + 25, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - 25); ctx.lineTo(mouse.x, mouse.y + 25);
  ctx.stroke();
  
  ctx.shadowBlur = 0;
}

function loop(){
  if(!gameActive) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user=>{
  if(!user){ window.location.href="../index.html"; return; }
  currentUser = user;
  if(!loopStarted){ loopStarted = true; loop(); }
});
</script>

</body>
</html>
