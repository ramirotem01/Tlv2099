<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>PCS365 - Neon Mario Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    body { margin:0; overflow:hidden; background:#020617; color:white; font-family: 'Orbitron', sans-serif; }
    canvas { display:block; margin:auto; border-bottom: 2px solid #0ff; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }
    .neon-title { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
    #overlay {
        position:absolute; inset:0; display:none; background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(15px); justify-content:center; align-items:center;
        flex-direction:column; z-index: 100;
    }
    #game-ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
</style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

<div id="game-ui" class="bg-black/70 p-4 border border-cyan-500/50 rounded-xl backdrop-blur-md">
    <div class="text-cyan-400 text-[10px] tracking-widest mb-1 uppercase font-bold">Progress (Full Reset on Death)</div>
    <div id="coin-counter" class="text-3xl font-black text-white">0 / 30</div>
    <div id="status-msg" class="text-[10px] text-red-400 mt-1 uppercase animate-pulse">חובה לאסוף 30 שקים לסיום!</div>
</div>

<div class="mb-4 text-center">
    <h1 class="text-4xl font-black neon-title italic uppercase tracking-tighter">Cyber Mario</h1>
</div>

<div class="relative">
    <canvas id="gameCanvas" width="900" height="400"></canvas>
    <div id="overlay">
        <h2 class="text-6xl font-black text-green-400 mb-2 italic">MISSION SUCCESS</h2>
        <p class="text-white opacity-70 mb-8 uppercase tracking-widest">PCS365: הנתונים סונכרנו בהצלחה</p>
        <div class="px-6 py-2 border border-green-500 text-green-500 font-bold animate-pulse">+50 COINS</div>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const marioImg = new Image();
const marioSVG = `<svg width="32" height="42" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    <path fill="#e21b1b" d="M4 0h8v1H4zm-1 1h10v1H3zm2 8h6v1H5zm1 1h4v1H6z"/>
    <path fill="#fbc599" d="M3 3h10v1H3zm1 1h9v1H4zm0 1h8v1H4zm1 1h6v1H5z"/>
    <path fill="#6e3c11" d="M3 2h8v1H3zm0 3h2v1H3zm7 0h2v1h10zm-7 1h1v1H3zm6 0h1v1H9zm-5 1h1v1H4zm3 0h1v1H7z"/>
    <path fill="#1b46e2" d="M4 10h8v4H4zm-1 1h1v3H3zm9 0h1v3h-1z"/>
    <path fill="#6e3c11" d="M2 14h4v2H2zm8 0h4v2h-4z"/>
    <circle fill="yellow" cx="5.5" cy="11.5" r="0.5"/>
    <circle fill="yellow" cx="10.5" cy="11.5" r="0.5"/>
</svg>`;
marioImg.src = 'data:image/svg+xml;base64,' + btoa(marioSVG);

let gameActive = true;
let winTriggered = false;
let currentUser = null;
let scrollX = 0;
let facingRight = true;

const player = {
    x: 100, y: 300, w: 30, h: 40, dx: 0, dy: 0,
    speed: 5.5, jump: -15, gravity: 0.7, onGround: false
};

const levelEnd = 5000;
const winTarget = 30;

const platforms = [
    {x:0, y:350, w:5500, h:50, type: 'ground'},
    {x:300, y:260, w:150, h:15}, {x:600, y:180, w:150, h:15}, {x:950, y:250, w:200, h:15},
    {x:1300, y:180, w:150, h:15}, {x:1600, y:270, w:150, h:15}, {x:1900, y:160, w:200, h:15},
    {x:2300, y:250, w:150, h:15}, {x:2700, y:180, w:200, h:15}, {x:3100, y:260, w:150, h:15},
    {x:3500, y:170, w:200, h:15}, {x:3900, y:240, w:150, h:15}, {x:4300, y:180, w:300, h:15}
];

const monsters = [];
for(let i=1; i<=12; i++) monsters.push({ x: i * 450, y: 320, size: 30, dir: 1, range: 100, startX: i * 450 });

const moneyBags = [];
for(let i=0; i<45; i++) {
    moneyBags.push({ 
        x: 400 + (i * 105), 
        y: 100 + Math.random() * 200, 
        w: 24, h: 24, // הוספת מידות קבועות לזיהוי נגיעה
        collected: false 
    });
}

const keys = {};
window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);

function updateUI() {
    const collected = moneyBags.filter(b => b.collected).length;
    const counter = document.getElementById("coin-counter");
    const msg = document.getElementById("status-msg");
    counter.innerText = `${collected} / ${winTarget}`;
    
    if(collected >= winTarget) {
        msg.innerText = "השער פתוח! רוץ לסוף!";
        msg.className = "text-[10px] text-green-400 mt-1 uppercase font-bold";
    } else {
        msg.innerText = "חובה לאסוף 30 שקים לסיום!";
        msg.className = "text-[10px] text-red-400 mt-1 uppercase animate-pulse";
    }
}

function resetGame() {
    player.x = 100; player.y = 300; player.dy = 0; scrollX = 0;
    moneyBags.forEach(b => b.collected = false);
    updateUI();
}

async function handleWin(){
    if(winTriggered) return;
    winTriggered = true; gameActive = false;
    document.getElementById("overlay").style.display="flex";
    try {
        const ref = doc(db, "players", currentUser.uid);
        await updateDoc(ref, { currentQuestStatus: "completed", coins: increment(50) });
    } catch(e) { console.error(e); }
    setTimeout(() => window.location.href="../dashboard.html", 4000);
}

function update(){
    if(!gameActive) return;

    player.dx = 0;
    if(keys["ArrowRight"] || keys["KeyD"]) { player.dx = player.speed; facingRight = true; }
    if(keys["ArrowLeft"] || keys["KeyA"]) { player.dx = -player.speed; facingRight = false; }
    if((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && player.onGround){
        player.dy = player.jump; player.onGround = false;
    }

    player.dy += player.gravity;
    player.x += player.dx;
    player.y += player.dy;
    player.onGround = false;

    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x &&
           player.y + player.h < p.y + 15 && player.y + player.h + player.dy >= p.y){
            player.y = p.y - player.h; player.dy = 0; player.onGround = true;
        }
    });

    monsters.forEach(m => {
        m.x += m.dir * 3.5;
        if(Math.abs(m.x - m.startX) > m.range) m.dir *= -1;
        // נגיעה במפלצת
        if(player.x < m.x + m.size && player.x + player.w > m.x &&
           player.y < m.y + m.size && player.y + player.h > m.y) resetGame();
    });

    // --- תיקון זיהוי נגיעה בשקי כסף ---
    moneyBags.forEach(b => {
        if(!b.collected){
            // שימוש בבדיקת מלבן-מול-מלבן (AABB) לדיוק מקסימלי
            if(player.x < b.x + b.w && player.x + player.w > b.x &&
               player.y < b.y + b.h && player.y + player.h > b.y) {
                b.collected = true; 
                updateUI();
            }
        }
    });

    scrollX = player.x > 300 ? player.x - 300 : 0;
    if(player.y > canvas.height) resetGame();
    
    const collectedCount = moneyBags.filter(b => b.collected).length;
    if(player.x > levelEnd && collectedCount >= winTarget) handleWin();
    else if (player.x > levelEnd) player.x = levelEnd - 10;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    ctx.save();
    ctx.translate(-scrollX, 0);

    // Platforms
    platforms.forEach(p => {
        ctx.fillStyle = p.type === 'ground' ? "#0f172a" : "#1e40af";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#0ff"; ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.w, 2);
    });

    // Money Bags
    ctx.font = "24px Arial";
    moneyBags.forEach(b => { if(!b.collected) ctx.fillText("💰", b.x, b.y + 20); });

    // --- מפלצות עם נאון אדום זוהר ---
    const glowIntensity = Math.sin(Date.now() / 200) * 10 + 15; // אפקט פעימה
    ctx.font = "30px Arial";
    monsters.forEach(m => { 
        ctx.shadowBlur = glowIntensity; 
        ctx.shadowColor = "#ff0000";
        ctx.fillText("👾", m.x, m.y + m.size); 
    });
    ctx.shadowBlur = 0; // איפוס הילה לשאר האלמנטים

    // DRAW MARIO
    ctx.save();
    if (!facingRight) {
        ctx.scale(-1, 1);
        ctx.drawImage(marioImg, -player.x - player.w, player.y, player.w, player.h);
    } else {
        ctx.drawImage(marioImg, player.x, player.y, player.w, player.h);
    }
    ctx.restore();

    // Finish Gate
    const collected = moneyBags.filter(b => b.collected).length;
    ctx.fillStyle = collected >= winTarget ? "#39ff14" : "#ff0055";
    ctx.shadowBlur = 20; ctx.shadowColor = collected >= winTarget ? "#39ff14" : "#ff0055";
    ctx.fillRect(levelEnd + 100, 50, 20, 300);
    ctx.shadowBlur = 0;

    ctx.restore();
}

function loop(){
    if(!gameActive) return;
    update(); draw();
    requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user => {
    if(!user) return;
    currentUser = user;
    updateUI(); loop();
});
</script>
</body>
</html>
