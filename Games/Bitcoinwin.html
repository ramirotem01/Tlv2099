<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BITCOIN BREACH | PCS365</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; color: white; font-family: 'Assistant', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { 
            border: 4px solid #1e293b; 
            background: url('https://res.cloudinary.com/dxygefiai/image/upload/v1777130914/%D7%91%D7%99%D7%98%D7%A7%D7%95%D7%95%D7%99%D7%9F_rm4xa9.png') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 50px rgba(0,0,0,0.9) inset;
        }
        .neon-text { text-shadow: 0 0 15px #3b82f6; }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

<div id="game-container">
    <div class="mb-4 text-center">
        <h1 id="status-text" class="text-4xl font-black italic tracking-tighter neon-text text-blue-500 uppercase">Extreme Breach: Chaos Mode</h1>
        <p class="text-red-500 text-sm font-bold animate-pulse">זהירות: מערכת ההגנה השתגעה! לייזרים רנדומליים פעילים.</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
    import { auth, db } from '../firebase-config.js'; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900;
    canvas.height = 550;

    let gameActive = true;
    let currentUser = null;

    // שחקן מעט מהיר יותר כדי להתמודד עם הקושי
    const player = { x: 30, y: 30, size: 14, speed: 5.5 };
    const goal = { x: 830, y: 470, size: 45 };
    
    // יצירת מכשולים מאתגרים
    const obstacles = [
        // לייזרים אנכיים במהירות מטורפת
        { x: 120, y: 0, w: 10, h: 250, sy: 8 },
        { x: 280, y: 300, w: 10, h: 250, sy: -9 },
        { x: 440, y: 0, w: 10, h: 300, sy: 11 },
        { x: 600, y: 250, w: 10, h: 300, sy: -10 },
        { x: 760, y: 0, w: 10, h: 200, sy: 13 },
        
        // לייזרים אופקיים רחבים
        { x: 0, y: 180, w: 350, h: 10, sx: 6 },
        { x: 550, y: 350, w: 350, h: 10, sx: -7 },

        // --- לייזרים רנדומליים (Chaos Lasers) ---
        { x: 450, y: 275, w: 20, h: 20, sx: 5, sy: 5, isRandom: true, lastChange: 0 },
        { x: 200, y: 400, w: 15, h: 15, sx: -6, sy: 4, isRandom: true, lastChange: 0 },
        
        // לייזר פועם ענק במרכז
        { x: 400, y: 220, w: 80, h: 80, pulse: 0, baseSize: 70 }
    ];

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    async function handleWin() {
        if (!gameActive) return;
        gameActive = false;
        document.getElementById('status-text').innerText = "SYSTEM CRACKED!";
        
        if (currentUser) {
            try {
                const docRef = doc(db, "players", currentUser.uid);
                await updateDoc(docRef, {
                    currentQuestStatus: 'completed',
                    coins: increment(50)
                });
                alert("ניצחון מוחלט! המערכת נפרצה. חוזר למפקדה...");
                window.location.href = '../dashboard.html';
            } catch (e) {
                console.error(e);
                window.location.href = '../dashboard.html';
            }
        }
    }

    function update() {
        if (!gameActive) return;

        if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= player.speed;
        if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.size) player.y += player.speed;
        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.size) player.x += player.speed;

        const now = Date.now();

        obstacles.forEach(ob => {
            // לוגיקה למכשולים רנדומליים
            if (ob.isRandom) {
                if (now - ob.lastChange > 1200) { // שינוי כיוון כל 1.2 שניות
                    ob.sx = (Math.random() - 0.5) * 15;
                    ob.sy = (Math.random() - 0.5) * 15;
                    ob.lastChange = now;
                }
            }

            if (ob.sy) {
                ob.y += ob.sy;
                if (ob.y + ob.h > canvas.height || ob.y < 0) ob.sy *= -1;
            }
            if (ob.sx) {
                ob.x += ob.sx;
                if (ob.x + ob.w > canvas.width || ob.x < 0) ob.sx *= -1;
            }

            if (ob.pulse !== undefined) {
                ob.pulse += 0.08;
                ob.w = ob.baseSize + Math.sin(ob.pulse) * 60;
                ob.h = ob.baseSize + Math.cos(ob.pulse) * 60;
            }

            // בדיקת התנגשות
            if (player.x < ob.x + ob.w && player.x + player.size > ob.x &&
                player.y < ob.y + ob.h && player.y + player.size > ob.y) {
                player.x = 30; player.y = 30; // איפוס
            }
        });

        if (player.x < goal.x + goal.size && player.x + player.size > goal.x &&
            player.y < goal.y + goal.size && player.y + player.size > goal.y) {
            handleWin();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // מטרה
        ctx.shadowBlur = 35; ctx.shadowColor = '#facc15';
        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        ctx.arc(goal.x + 22, goal.y + 22, 22, 0, Math.PI*2);
        ctx.fill();

        // לייזרים
        obstacles.forEach(ob => {
            ctx.shadowBlur = ob.isRandom ? 25 : 15;
            ctx.shadowColor = ob.isRandom ? '#ff00ff' : '#ff1111'; // לייזר רנדומלי בצבע סגול
            ctx.fillStyle = ob.isRandom ? '#ff00ff' : '#ff1111';
            ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
        });

        // שחקן
        ctx.shadowBlur = 20; ctx.shadowColor = '#00ff41';
        ctx.fillStyle = '#00ff41';
        ctx.fillRect(player.x, player.y, player.size, player.size);
        
        ctx.shadowBlur = 0;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loop();
        } else {
            window.location.href = '../index.html';
        }
    });
</script>
</body>
</html>
