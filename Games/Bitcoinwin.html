<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BITCOIN BREACH | PCS365</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; color: white; font-family: 'Assistant', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { 
            border: 4px solid #1e293b; 
            background: url('https://res.cloudinary.com/dxygefiai/image/upload/v1777130914/%D7%91%D7%99%D7%98%D7%A7%D7%95%D7%95%D7%99%D7%9F_rm4xa9.png') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 50px rgba(0,0,0,0.8) inset;
        }
        .neon-text { text-shadow: 0 0 15px #3b82f6; }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

<div id="game-container">
    <div class="mb-4 text-center">
        <h1 id="status-text" class="text-4xl font-black italic tracking-tighter neon-text text-blue-500 uppercase">The Bitcoin Breach</h1>
        <p class="text-slate-400 text-sm">השתמש בחיצים | אל תיגע בלייזר האדום | הגע למטבע</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
    // שימוש באותה שיטת התקשרות שעובדת לך ב-Data Digger
    import { auth, db } from '../firebase-config.js'; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 500;

    let gameActive = true;
    let currentUser = null;

    const player = { x: 40, y: 40, size: 18, speed: 5 };
    const goal = { x: 720, y: 420, size: 40 };
    
    // לייזרים נעים
    const obstacles = [
        { x: 200, y: 0, w: 10, h: 300, sy: 4 },
        { x: 380, y: 200, w: 10, h: 300, sy: -4 },
        { x: 550, y: 0, w: 10, h: 350, sy: 6 },
        { x: 0, y: 250, w: 400, h: 10, sx: 3 }
    ];

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // פונקציית הניצחון שביקשת
    async function handleWin() {
        if (!gameActive) return;
        gameActive = false;
        
        document.getElementById('status-text').innerText = "הפריצה הצליחה!";
        
        if (currentUser) {
            try {
                const docRef = doc(db, "players", currentUser.uid);
                await updateDoc(docRef, {
                    currentQuestStatus: 'completed',
                    coins: increment(50)
                });
                alert("המשימה הושלמה! חוזר למפקדה...");
                window.location.href = '../dashboard.html';
            } catch (e) {
                console.error("Update error:", e);
                window.location.href = '../dashboard.html';
            }
        } else {
            alert("ניצחת! (במצב אורח הנתונים לא נשמרים)");
            location.reload();
        }
    }

    function update() {
        if (!gameActive) return;

        if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= player.speed;
        if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.size) player.y += player.speed;
        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.size) player.x += player.speed;

        obstacles.forEach(ob => {
            if (ob.sy) {
                ob.y += ob.sy;
                if (ob.y + ob.h > canvas.height || ob.y < 0) ob.sy *= -1;
            }
            if (ob.sx) {
                ob.x += ob.sx;
                if (ob.x + ob.w > canvas.width || ob.x < 0) ob.sx *= -1;
            }

            // התנגשות בלייזר (פסילה)
            if (player.x < ob.x + ob.w && player.x + player.size > ob.x &&
                player.y < ob.y + ob.h && player.y + player.size > ob.y) {
                player.x = 40; player.y = 40;
            }
        });

        // בדיקת הגעה ליעד
        if (player.x < goal.x + goal.size && player.x + player.size > goal.x &&
            player.y < goal.y + goal.size && player.y + player.size > goal.y) {
            handleWin();
        }
    }

    function draw() {
        // רקע שקוף למחצה ליצירת אפקט תנועה
        ctx.fillStyle = 'rgba(2, 6, 23, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ציור המטרה (ביטקוין זוהר)
        ctx.shadowBlur = 30; ctx.shadowColor = '#facc15';
        ctx.fillStyle = '#facc15';
        ctx.beginPath();
        ctx.arc(goal.x + 20, goal.y + 20, 20, 0, Math.PI*2);
        ctx.fill();

        // ציור לייזרים
        ctx.shadowBlur = 20; ctx.shadowColor = '#ef4444';
        ctx.fillStyle = '#ef4444';
        obstacles.forEach(ob => ctx.fillRect(ob.x, ob.y, ob.w, ob.h));

        // ציור שחקן (ריבוע כחול ניאון)
        ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6';
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(player.x, player.y, player.size, player.size);
        
        ctx.shadowBlur = 0;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loop(); // מתחילים את המשחק רק כשיש משתמש
        } else {
            window.location.href = '../index.html';
        }
    });
</script>
</body>
</html>
