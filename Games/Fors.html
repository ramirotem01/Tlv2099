<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Neon Memory Rush</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin:0; overflow:hidden; background:#020617; color:white; }
    canvas { display:block; margin:auto; }
    .neon { text-shadow:0 0 10px #0ff,0 0 20px #0ff; }

    #overlay {
      position:absolute;
      inset:0;
      display:none;
      background:rgba(0,0,0,0.85);
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:10;
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center h-screen">

<h1 class="text-4xl neon mb-2">🧠 Neon Memory Rush</h1>
<p class="text-sm mb-2">זכור את הסדר → אסוף נכון → מהר!</p>

<div id="overlay" class="flex">
  <h2 class="text-5xl neon text-green-400 mb-4">🎉 ניצחת!</h2>
  <p>+50 מטבעות נוספו</p>
</div>

<canvas id="gameCanvas" width="700" height="450"></canvas>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameActive = true;
let winTriggered = false;
let currentUser = null;
let loopStarted = false;

const player = { x:50, y:50, size:15, speed:4 };

// סמלים (targets)
const symbols = [];
const sequence = [];
let currentIndex = 0;

// יצירת 5 סמלים
for(let i=0;i<5;i++){
  const s = {
    x:100 + i*110,
    y:200,
    size:25,
    id:i,
    collected:false
  };
  symbols.push(s);
  sequence.push(i);
}

// ערבוב סדר (memory challenge)
sequence.sort(()=>Math.random()-0.5);

let showSequence = true;
let showTimer = 120; // פריימים להצגת רצף

// מכשולים עדינים (לא לייזר)
const obstacles = [
  {x:200,y:0,w:20,h:200,dy:2},
  {x:400,y:250,w:20,h:200,dy:-2}
];

const keys = {};
window.addEventListener("keydown",e=>keys[e.code]=true);
window.addEventListener("keyup",e=>keys[e.code]=false);

function resetPlayer(){
  player.x=50; player.y=50;
  currentIndex=0;
  symbols.forEach(s=>s.collected=false);
}

function collision(a,b){
  return a.x<a.x+a.size &&
         a.x+a.size>b.x &&
         a.y<b.y+b.size &&
         a.y+a.size>b.y;
}

async function handleWin(){
  if(winTriggered) return;
  winTriggered = true;
  gameActive = false;

  document.getElementById("overlay").style.display="flex";

  try{
    const ref = doc(db,"players",currentUser.uid);
    await updateDoc(ref,{
      currentQuestStatus:"completed",
      coins: increment(50)
    });
    console.log("WIN saved");
  }catch(e){
    console.error("DB error:",e);
  }

  setTimeout(()=>{
    window.location.href="../dashboard.html";
  },2500);
}

function update(){
  if(!gameActive) return;

  if(keys["ArrowUp"]||keys["KeyW"]) player.y-=player.speed;
  if(keys["ArrowDown"]||keys["KeyS"]) player.y+=player.speed;
  if(keys["ArrowLeft"]||keys["KeyA"]) player.x-=player.speed;
  if(keys["ArrowRight"]||keys["KeyD"]) player.x+=player.speed;

  obstacles.forEach(o=>{
    o.y+=o.dy;
    if(o.y<0 || o.y+o.h>canvas.height) o.dy*=-1;

    if(player.x<o.x+o.w && player.x+player.size>o.x &&
       player.y<o.y+o.h && player.y+player.size>o.y){
      resetPlayer();
    }
  });

  // הצגת רצף
  if(showSequence){
    showTimer--;
    if(showTimer<=0) showSequence=false;
    return;
  }

  // בדיקת איסוף נכון
  symbols.forEach(s=>{
    if(!s.collected &&
       player.x < s.x+s.size &&
       player.x+player.size > s.x &&
       player.y < s.y+s.size &&
       player.y+player.size > s.y){

        if(s.id === sequence[currentIndex]){
          s.collected = true;
          currentIndex++;

          if(currentIndex === sequence.length){
            handleWin();
          }
        } else {
          // טעות → ריסט
          resetPlayer();
        }
    }
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // סמלים
  symbols.forEach(s=>{
    ctx.shadowBlur=15;
    ctx.shadowColor = s.collected ? "#555" : "#0ff";
    ctx.fillStyle = s.collected ? "#555" : "#0ff";
    ctx.fillRect(s.x,s.y,s.size,s.size);

    // הצגת סדר בהתחלה
    if(showSequence){
      ctx.fillStyle="#fff";
      ctx.fillText(sequence.indexOf(s.id)+1, s.x+5, s.y+18);
    }
  });

  // מכשולים
  ctx.fillStyle="#f00";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x,o.y,o.w,o.h);
  });

  // שחקן
  ctx.shadowBlur=20;
  ctx.shadowColor="#0f0";
  ctx.fillStyle="#0f0";
  ctx.fillRect(player.x,player.y,player.size,player.size);

  ctx.shadowBlur=0;
}

function loop(){
  if(!gameActive) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

onAuthStateChanged(auth,user=>{
  if(!user){
    window.location.href="../index.html";
    return;
  }

  currentUser=user;

  if(!loopStarted){
    loopStarted=true;
    loop();
  }
});
</script>

</body>
</html>
