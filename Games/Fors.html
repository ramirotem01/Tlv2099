<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Neon Reflex Runner</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #050510, #000000);
    }

    canvas {
      display: block;
      margin: auto;
      background: transparent;
    }

    .neon {
      text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #0ff;
    }

    .glow-box {
      box-shadow:
        0 0 10px #0ff,
        0 0 20px #0ff,
        inset 0 0 10px #0ff;
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center h-screen text-white">

  <h1 class="text-4xl mb-4 neon">⚡ Neon Reflex Runner ⚡</h1>

  <canvas id="gameCanvas" width="600" height="400" class="glow-box"></canvas>

  <p class="mt-3 neon">השתמש בחצים כדי לנוע ולהגיע ליעד הירוק</p>

  <!-- הודעת ניצחון -->
  <div id="winMessage" class="hidden absolute text-3xl neon">
    🎉 ניצחת! +50 מטבעות 🎉
  </div>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { auth, db } from "../firebase-config.js";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let gameStarted = false;
    let hasWon = false;
    let loopId;

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "../index.html";
        return;
      }

      if (gameStarted) return;
      gameStarted = true;

      const player = { x: 50, y: 50, size: 15, speed: 3 };
      const goal = { x: 550, y: 350, size: 20 };

      const obstacles = [];
      for (let i = 0; i < 5; i++) {
        obstacles.push({
          x: Math.random() * 550,
          y: Math.random() * 350,
          size: 20,
          dx: (Math.random() * 2 + 1),
          dy: (Math.random() * 2 + 1)
        });
      }

      const keys = {};

      document.addEventListener("keydown", e => keys[e.key] = true);
      document.addEventListener("keyup", e => keys[e.key] = false);

      function resetPlayer() {
        player.x = 50;
        player.y = 50;
      }

      function movePlayer() {
        if (keys["ArrowUp"]) player.y -= player.speed;
        if (keys["ArrowDown"]) player.y += player.speed;
        if (keys["ArrowLeft"]) player.x -= player.speed;
        if (keys["ArrowRight"]) player.x += player.speed;
      }

      function moveObstacles() {
        obstacles.forEach(o => {
          o.x += o.dx;
          o.y += o.dy;

          if (o.x < 0 || o.x > canvas.width - o.size) o.dx *= -1;
          if (o.y < 0 || o.y > canvas.height - o.size) o.dy *= -1;
        });
      }

      function detectCollision(a, b) {
        return (
          a.x < b.x + b.size &&
          a.x + a.size > b.x &&
          a.y < b.y + b.size &&
          a.y + a.size > b.y
        );
      }

      async function handleWin() {
        try {
          console.log("Player WON - updating DB...");

          const playerRef = doc(db, "players", user.uid);

          await updateDoc(playerRef, {
            currentQuestStatus: "completed",
            coins: increment(50)
          });

          console.log("DB updated successfully");

          // הודעה
          document.getElementById("winMessage").classList.remove("hidden");

          // עצירת המשחק
          cancelAnimationFrame(loopId);

          // מעבר אחרי 2 שניות
          setTimeout(() => {
            window.location.href = "../dashboard.html";
          }, 2000);

        } catch (error) {
          console.error("🔥 Firebase Error:", error);
        }
      }

      function update() {
        movePlayer();
        moveObstacles();

        for (let o of obstacles) {
          if (detectCollision(player, o)) {
            resetPlayer();
          }
        }

        if (!hasWon && detectCollision(player, goal)) {
          hasWon = true;
          handleWin();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Player
        ctx.fillStyle = "#0ff";
        ctx.shadowColor = "#0ff";
        ctx.shadowBlur = 15;
        ctx.fillRect(player.x, player.y, player.size, player.size);

        // Goal
        ctx.fillStyle = "#0f0";
        ctx.shadowColor = "#0f0";
        ctx.fillRect(goal.x, goal.y, goal.size, goal.size);

        // Obstacles
        ctx.fillStyle = "#f00";
        ctx.shadowColor = "#f00";

        obstacles.forEach(o => {
          ctx.fillRect(o.x, o.y, o.size, o.size);
        });

        ctx.shadowBlur = 0;
      }

      function gameLoop() {
        update();
        draw();
        loopId = requestAnimationFrame(gameLoop);
      }

      gameLoop();
    });
  </script>

</body>
</html>
