<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Breach - Cyberpunk Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Orbitron', sans-serif;
            color: #0ff;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* רקע ביטקוין חיצוני עם שכבת כהות */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1518546305928-3853bb22b078?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }

        canvas {
            border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff, inset 0 0 10px #0ff;
            background: rgba(0, 20, 20, 0.4);
            cursor: none; /* מסתיר את העכבר כשהוא על המשחק */
        }

        .neon-text {
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h1 class="text-4xl neon-text animate-pulse mb-4">INITIALIZING NEURAL LINK...</h1>
        <p id="auth-status">Checking Authentication...</p>
    </div>

    <div id="game-container">
        <div class="mb-4 w-[800px] flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold neon-text uppercase tracking-widest">Bitcoin Breach</h1>
                <p class="text-cyan-400 text-xs mt-1 opacity-80">PCS365 SECURITY PROTOCOL ACTIVE</p>
            </div>
            <div id="status-display" class="text-sm border border-cyan-500 p-2 px-4 bg-cyan-900/30">
                SYSTEM READY
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div class="mt-6 flex gap-8 text-cyan-500 text-sm italic">
            <span>[ARROWS] TO NAVIGATE</span>
            <span>[GOAL] REACH THE GOLDEN CORE</span>
            <span>[WARNING] AVOID SECURITY BLOCKS</span>
        </div>
    </div>

    <script type="module">
        // ייבוא הקונפיגורציה המקומית שלך
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusDisplay = document.getElementById('status-display');
        
        let currentUser = null;

        // הגדרות משחק
        const PLAYER_SIZE = 22;
        const GOAL_SIZE = 45;
        const OBSTACLE_COUNT = 5;
        
        let player = { x: 40, y: 250, speed: 5 };
        let goal = { x: 720, y: 225 };
        let obstacles = [];
        let gameActive = false;

        // בדיקת חיבור ל-Firebase
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                console.log("User authorized:", user.uid);
                loadingOverlay.style.display = 'none';
                initGame();
                requestAnimationFrame(gameLoop);
            } else {
                console.log("No user found, redirecting...");
                window.location.href = '../index.html';
            }
        });

        // אתחול שלב/משחק
        function initGame() {
            player.x = 40;
            player.y = 250;
            obstacles = [];
            
            // יצירת מכשולים רנדומליים
            for (let i = 0; i < OBSTACLE_COUNT; i++) {
                obstacles.push({
                    x: 180 + (i * 110),
                    y: Math.random() * (canvas.height - 120),
                    width: 25,
                    height: 100 + Math.random() * 150,
                    speedY: (2 + Math.random() * 4) * (Math.random() > 0.5 ? 1 : -1)
                });
            }
            gameActive = true;
            statusDisplay.innerText = "SYSTEM READY";
            statusDisplay.classList.remove('text-red-500');
        }

        // פונקציית ניצחון - עדכון Firestore
        async function handleWin() {
            gameActive = false;
            statusDisplay.innerText = "BREACH SUCCESSFUL - UPLOADING...";
            console.log("Victory! Updating Firestore for UID:", currentUser.uid);
            
            try {
                const playerRef = doc(db, "players", currentUser.uid);
                await updateDoc(playerRef, {
                    currentQuestStatus: 'completed',
                    coins: increment(50)
                });
                
                console.log("DB Update Success");
                statusDisplay.innerText = "DATA SYNCED. REDIRECTING...";
                
                // הפניה לאחר חצי שנייה כדי שהשחקן יראה את הסטטוס
                setTimeout(() => {
                    window.location.href = '../dashboard.html';
                }, 800);

            } catch (error) {
                console.error("Database Error:", error);
                statusDisplay.innerText = "DB ERROR - RETRYING";
                statusDisplay.classList.add('text-red-500');
                gameActive = true; // מאפשר ניסיון חוזר אם נכשל
            }
        }

        // שליטה במקלדת
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            if (!gameActive) return;

            // תנועת שחקן
            if (keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - PLAYER_SIZE) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - PLAYER_SIZE) player.x += player.speed;

            // עדכון מכשולים ובדיקת התנגשות
            obstacles.forEach(obs => {
                obs.y += obs.speedY;
                if (obs.y <= 0 || obs.y + obs.height >= canvas.height) obs.speedY *= -1;

                // לוגיקת התנגשות
                if (player.x < obs.x + obs.width &&
                    player.x + PLAYER_SIZE > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + PLAYER_SIZE > obs.y) {
                    initGame(); // חזרה להתחלה
                }
            });

            // בדיקת הגעה ליעד
            if (player.x < goal.x + GOAL_SIZE &&
                player.x + PLAYER_SIZE > goal.x &&
                player.y < goal.y + GOAL_SIZE &&
                player.y + PLAYER_SIZE > goal.y) {
                handleWin();
            }
        }

        function draw() {
            // ניקוי הקנבס - שומר על הרקע של ה-CSS גלוי
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ציור יעד (מטבע זהוב/ליבה)
            ctx.shadowBlur = 30;
            ctx.shadowColor = "#ffcc00";
            ctx.fillStyle = "#ffcc00";
            ctx.fillRect(goal.x, goal.y, GOAL_SIZE, GOAL_SIZE);
            // טקסט קטן בתוך היעד
            ctx.fillStyle = "#000";
            ctx.font = "bold 10px Orbitron";
            ctx.fillText("CORE", goal.x + 5, goal.y + 25);

            // ציור שחקן (ניאון תכלת)
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#0ff";
            ctx.fillStyle = "#0ff";
            ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);

            // ציור מכשולים (ניאון ירוק Matrix)
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#0f0";
            ctx.fillStyle = "rgba(0, 255, 0, 0.8)";
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                // אפקט קווי מטריקס קטנים בתוך המכשול
                ctx.strokeStyle = "#000";
                ctx.strokeRect(obs.x + 2, obs.y + 2, obs.width - 4, obs.height - 4);
            });
            
            ctx.shadowBlur = 0; // איפוס הצל לפריימים הבאים
        }

        function gameLoop() {
            update();
            draw();
            if (gameActive || !currentUser) { // ממשיך לרוץ כל עוד יש משתמש
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
