<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL BREACH | PCS365</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; color: white; font-family: 'Assistant', sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { 
            border: 4px solid #1e293b; 
            background: url('https://res.cloudinary.com/dxygefiai/image/upload/v1776870001/Gemini_Generated_Image_jbr8f5jbr8f5jbr8_burebz.png') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 50px rgba(0,0,0,0.8) inset;
        }
        .neon-text { text-shadow: 0 0 15px #00f3ff; }
        .neon-border { box-shadow: 0 0 20px #00f3ff, inset 0 0 10px #00f3ff; border: 2px solid #00f3ff; }
    </style>
</head>
<body class="flex flex-col items-center justify-center">

<div id="game-container">
    <div class="mb-4 text-center">
        <h1 id="status-text" class="text-4xl font-black italic tracking-tighter neon-text text-cyan-400 uppercase">Neural Breach v1.0</h1>
        <p id="sub-text" class="text-pink-500 text-sm font-bold animate-pulse">אזהרה: חומת האש פעילה. הגע לליבה הירוקה.</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<script type="module">
    import { auth, db } from '../firebase-config.js'; 
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900;
    canvas.height = 550;

    let gameActive = false;
    let currentUser = null;
    let animationId;

    const player = { x: 30, y: 270, size: 18, speed: 5 };
    const goal = { x: 820, y: 250, size: 50 };
    
    const obstacles = [
        { x: 220, y: 0, w: 15, h: 350, sy: 6 },
        { x: 440, y: 200, w: 15, h: 350, sy: -7 },
        { x: 660, y: 0, w: 15, h: 400, sy: 9 }
    ];

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    async function handleWin() {
        if (!gameActive || !currentUser) return;
        
        gameActive = false;
        cancelAnimationFrame(animationId);
        
        document.getElementById('status-text').innerText = "SYSTEM CRACKED!";
        document.getElementById('status-text').classList.replace('text-cyan-400', 'text-green-400');

        try {
            const docRef = doc(db, "players", currentUser.uid);
            await updateDoc(docRef, {
                currentQuestStatus: 'completed',
                coins: increment(50)
            });
            
            alert("הפריצה הושלמה! הנתונים הועברו למפקדה.");
            window.location.href = '../dashboard.html';
        } catch (e) {
            console.error("Error updating win status:", e);
            // אם יש שגיאה, נדפיס אותה ונעביר בכל זאת כדי לא לתקוע את המשתמש
            window.location.href = '../dashboard.html';
        }
    }

    function update() {
        if (!gameActive) return;

        if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= player.speed;
        if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.size) player.y += player.speed;
        if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
        if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.size) player.x += player.speed;

        obstacles.forEach(ob => {
            ob.y += ob.sy;
            if (ob.y + ob.h > canvas.height || ob.y < 0) ob.sy *= -1;

            if (player.x < ob.x + ob.w && player.x + player.size > ob.x &&
                player.y < ob.y + ob.h && player.y + player.size > ob.y) {
                player.x = 30; player.y = 270; // איפוס במקרה של פגיעה
            }
        });

        if (player.x < goal.x + goal.size && player.x + player.size > goal.x &&
            player.y < goal.y + goal.size && player.y + player.size > goal.y) {
            handleWin();
        }
    }

    function draw() {
        // ClearRect שומר על תמונת הרקע של ה-CSS גלויה
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // יעד (Core)
        ctx.shadowBlur = 30; ctx.shadowColor = '#39ff14';
        ctx.fillStyle = '#39ff14';
        ctx.fillRect(goal.x, goal.y, goal.size, goal.size);

        // מכשולים (Lasers)
        ctx.shadowBlur = 20; ctx.shadowColor = '#ff1111';
        ctx.fillStyle = '#ff1111';
        obstacles.forEach(ob => ctx.fillRect(ob.x, ob.y, ob.w, ob.h));

        // שחקן (Data Packet)
        ctx.shadowBlur = 20; ctx.shadowColor = '#00f3ff';
        ctx.fillStyle = '#00f3ff';
        ctx.fillRect(player.x, player.y, player.size, player.size);
        
        ctx.shadowBlur = 0;
    }

    function loop() {
        if (!gameActive) return;
        update();
        draw();
        animationId = requestAnimationFrame(loop);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            gameActive = true;
            loop();
        } else {
            window.location.href = '../index.html';
        }
    });
</script>
</body>
</html>
