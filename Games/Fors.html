<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Path: Future Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #050505;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.5), inset 0 0 10px rgba(0, 242, 255, 0.2);
            border: 1px solid #00f2ff;
        }

        .neon-text {
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
        }

        canvas {
            display: block;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            cursor: none;
        }

        #ui-overlay {
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="absolute top-8 w-full text-center z-10">
        <h1 class="text-4xl font-bold tracking-widest neon-text mb-2">CYBER-PATH</h1>
        <p class="text-sm text-cyan-400 opacity-80 uppercase tracking-tighter">התחמק מהלייזרים והגע לליבה</p>
    </div>

    <div class="relative p-1 rounded-lg neon-border">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="ui-overlay" class="absolute inset-0 flex flex-col justify-between p-4">
            <div class="flex justify-between items-start">
                <div id="status-msg" class="text-xs bg-black/50 p-2 rounded border border-cyan-900">מערכת: מוכנה</div>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. Imports
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('status-msg');

        // Game Constants
        const PLAYER_SIZE = 20;
        const GOAL_SIZE = 30;
        const OBSTACLE_COUNT = 6;
        
        let gameActive = false;
        let animationId = null;
        let currentUser = null;

        const player = {
            x: 50,
            y: canvas.height / 2,
            targetX: 50,
            targetY: canvas.height / 2,
            speed: 0.15,
            color: '#00f2ff'
        };

        const goal = {
            x: canvas.width - 60,
            y: canvas.height / 2,
            color: '#f0f'
        };

        let obstacles = [];

        // 2. Auth Guard & Initialization
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                console.log("משתמש מחובר:", user.uid);
                if (!gameActive) {
                    initGame();
                }
            } else {
                console.log("אין משתמש מחובר, מעביר לדף כניסה...");
                window.location.href = '../index.html';
            }
        });

        function initGame() {
            gameActive = true;
            statusMsg.innerText = "מערכת: אונליין | משתמש: " + (currentUser.displayName || 'סוכן');
            
            // Create obstacles
            for(let i=0; i < OBSTACLE_COUNT; i++) {
                obstacles.push({
                    x: 150 + (i * 100),
                    y: Math.random() * canvas.height,
                    width: 15,
                    height: 80 + Math.random() * 100,
                    speed: 2 + Math.random() * 4,
                    direction: 1
                });
            }

            // Listen for mouse
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                player.targetX = e.clientX - rect.left;
                player.targetY = e.clientY - rect.top;
            });

            gameLoop();
        }

        // 3. Game Logic & Rendering
        function gameLoop() {
            if (!gameActive) return;

            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            drawGoal();
            updateObstacles();
            checkCollisions();

            animationId = requestAnimationFrame(gameLoop);
        }

        function updatePlayer() {
            // Smooth movement (Lerp)
            player.x += (player.targetX - player.x) * player.speed;
            player.y += (player.targetY - player.y) * player.speed;

            // Draw player with Glow
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - PLAYER_SIZE/2, player.y - PLAYER_SIZE/2, PLAYER_SIZE, PLAYER_SIZE);
            ctx.shadowBlur = 0;
        }

        function drawGoal() {
            ctx.shadowBlur = 20;
            ctx.shadowColor = goal.color;
            ctx.strokeStyle = goal.color;
            ctx.lineWidth = 3;
            ctx.strokeRect(goal.x, goal.y - GOAL_SIZE/2, GOAL_SIZE, GOAL_SIZE);
            
            // Pulsing inner
            const pulse = Math.sin(Date.now() / 200) * 5;
            ctx.fillStyle = goal.color;
            ctx.fillRect(goal.x + 5 - pulse/2, goal.y - GOAL_SIZE/2 + 5 - pulse/2, GOAL_SIZE - 10 + pulse, GOAL_SIZE - 10 + pulse);
            ctx.shadowBlur = 0;
        }

        function updateObstacles() {
            ctx.fillStyle = '#ff003c';
            ctx.shadowColor = '#ff003c';
            ctx.shadowBlur = 10;

            obstacles.forEach(obs => {
                obs.y += obs.speed * obs.direction;
                
                if (obs.y <= 0 || obs.y + obs.height >= canvas.height) {
                    obs.direction *= -1;
                }

                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });
            ctx.shadowBlur = 0;
        }

        function checkCollisions() {
            // Wall/Obstacle Collision
            obstacles.forEach(obs => {
                if (player.x + PLAYER_SIZE/2 > obs.x && 
                    player.x - PLAYER_SIZE/2 < obs.x + obs.width &&
                    player.y + PLAYER_SIZE/2 > obs.y && 
                    player.y - PLAYER_SIZE/2 < obs.y + obs.height) {
                    resetPlayer();
                }
            });

            // Goal Collision
            if (player.x + PLAYER_SIZE/2 > goal.x && 
                player.y > goal.y - GOAL_SIZE/2 && 
                player.y < goal.y + GOAL_SIZE/2) {
                handleWin();
            }
        }

        function resetPlayer() {
            player.x = 50;
            player.y = canvas.height / 2;
            player.targetX = 50;
            player.targetY = canvas.height / 2;
            statusMsg.innerText = "מערכת: זוהתה פגיעה! אתחול מיקום...";
            statusMsg.classList.add('text-red-500');
            setTimeout(() => statusMsg.classList.remove('text-red-500'), 1000);
        }

        // 4. Firebase Sync Logic
        async function handleWin() {
            if (!gameActive) return;
            gameActive = false; // Stop game loop
            cancelAnimationFrame(animationId);

            statusMsg.innerText = "מערכת: יעד הושג! מעדכן נתונים...";
            statusMsg.classList.add('text-green-400');

            try {
                const playerDocRef = doc(db, 'players', currentUser.uid);
                
                await updateDoc(playerDocRef, {
                    currentQuestStatus: 'completed',
                    coins: increment(50)
                });

                console.log("DB Update Success: Player won and earned 50 coins");
                
                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = '../dashboard.html';
                }, 1500);

            } catch (error) {
                console.error("Firebase Error (Write):", error);
                statusMsg.innerText = "שגיאה בסנכרון הנתונים. נסה שוב.";
                gameActive = true;
                gameLoop();
            }
        }
    </script>
</body>
</html>
