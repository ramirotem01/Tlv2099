<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Neon Memory Match</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin:0; background:#020617; color:white; overflow:hidden; }
.neon { text-shadow:0 0 10px #0ff,0 0 20px #0ff; }

#game {
  display:grid;
  grid-template-columns: repeat(4, 100px);
  gap:15px;
}

.card {
  width:100px;
  height:100px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  cursor:pointer;
  font-size:30px;
  border-radius:10px;
  box-shadow:0 0 10px #0ff;
}

.revealed {
  background:#06b6d4;
}

.matched {
  background:#22c55e;
}

#overlay {
  position:absolute;
  inset:0;
  display:none;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body class="flex flex-col items-center justify-center h-screen">

<h1 class="text-4xl neon mb-4">🧠 Memory Match</h1>
<p class="mb-2">מצא את כל הזוגות במהירות!</p>
<p id="timer" class="mb-4 text-yellow-400">⏱ זמן: 60</p>

<div id="game"></div>

<div id="overlay" class="flex">
  <h2 class="text-5xl neon text-green-400 mb-4">🎉 ניצחת!</h2>
  <p>+50 מטבעות נוספו</p>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

let currentUser;
let gameActive = true;
let winTriggered = false;
let loopStarted = false;

const symbols = ["🍕","🚀","🎮","💎","🔥","⚡","🧠","🎯"];
let cards = [...symbols, ...symbols];

// ערבוב
cards.sort(()=>Math.random()-0.5);

const game = document.getElementById("game");

let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;

// יצירת קלפים
cards.forEach((symbol,index)=>{
  const card = document.createElement("div");
  card.className="card";
  card.dataset.symbol = symbol;
  card.dataset.index = index;
  game.appendChild(card);

  card.addEventListener("click", ()=>{
    if(!gameActive || lockBoard || card.classList.contains("revealed")) return;

    card.innerText = symbol;
    card.classList.add("revealed");

    if(!firstCard){
      firstCard = card;
    } else {
      secondCard = card;
      lockBoard = true;

      if(firstCard.dataset.symbol === secondCard.dataset.symbol){
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        matches++;

        resetTurn();

        if(matches === symbols.length){
          handleWin();
        }
      } else {
        setTimeout(()=>{
          firstCard.innerText="";
          secondCard.innerText="";
          firstCard.classList.remove("revealed");
          secondCard.classList.remove("revealed");
          resetTurn();
        },700);
      }
    }
  });
});

function resetTurn(){
  firstCard = null;
  secondCard = null;
  lockBoard = false;
}

// טיימר (זריזות)
let time = 60;
const timerEl = document.getElementById("timer");

const timerInterval = setInterval(()=>{
  if(!gameActive) return;

  time--;
  timerEl.innerText = "⏱ זמן: " + time;

  if(time <= 0){
    location.reload();
  }
},1000);

// 🔥 Firebase win
async function handleWin(){
  if(winTriggered) return;
  winTriggered = true;
  gameActive = false;

  clearInterval(timerInterval);

  document.getElementById("overlay").style.display="flex";

  try{
    const ref = doc(db,"players",currentUser.uid);
    await updateDoc(ref,{
      currentQuestStatus:"completed",
      coins: increment(50)
    });

    console.log("WIN saved");

  }catch(e){
    console.error("DB error:",e);
  }

  setTimeout(()=>{
    window.location.href="../dashboard.html";
  },2500);
}

// 🔐 Auth
onAuthStateChanged(auth,user=>{
  if(!user){
    window.location.href="../index.html";
    return;
  }

  currentUser = user;

  if(!loopStarted){
    loopStarted = true;
  }
});
</script>

</body>
</html>
