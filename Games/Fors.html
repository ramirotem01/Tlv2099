<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Neon Reflex Runner</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at center, #050510, #000000);
    }

    canvas {
      display: block;
      margin: auto;
    }

    .neon {
      text-shadow: 0 0 5px #0ff, 0 0 15px #0ff, 0 0 30px #0ff;
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center h-screen text-white">

  <h1 class="text-4xl mb-4 neon">⚡ Neon Reflex Runner ⚡</h1>

  <canvas id="gameCanvas" width="600" height="400"></canvas>

  <div id="winMessage" class="hidden absolute text-4xl neon">
    🎉 ניצחת! +50 מטבעות 🎉
  </div>

  <script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { auth, db } from "../firebase-config.js";

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let loopId;
    let gameActive = true; // 🔒 שליטה מלאה על המשחק

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "../index.html";
        return;
      }

      const player = { x: 50, y: 50, size: 15, speed: 3 };
      const goal = { x: 550, y: 350, size: 20 };

      const obstacles = Array.from({ length: 5 }, () => ({
        x: Math.random() * 550,
        y: Math.random() * 350,
        size: 20,
        dx: Math.random() * 2 + 1,
        dy: Math.random() * 2 + 1
      }));

      const keys = {};

      document.addEventListener("keydown", e => keys[e.key] = true);
      document.addEventListener("keyup", e => keys[e.key] = false);

      function resetPlayer() {
        player.x = 50;
        player.y = 50;
      }

      function detectCollision(a, b) {
        return (
          a.x < b.x + b.size &&
          a.x + a.size > b.x &&
          a.y < b.y + b.size &&
          a.y + a.size > b.y
        );
      }

      async function handleWin() {
        if (!gameActive) return; // 🔒 חסימה נוספת
        gameActive = false;

        // עצירה מיידית
        cancelAnimationFrame(loopId);

        // הצגת הודעה מיד
        document.getElementById("winMessage").classList.remove("hidden");

        try {
          console.log("Updating DB...");

          const ref = doc(db, "players", user.uid);

          await updateDoc(ref, {
            currentQuestStatus: "completed",
            coins: increment(50)
          });

          console.log("SUCCESS: coins +50");

        } catch (e) {
          console.error("🔥 Firebase error:", e);
        }

        // מעבר אחרי 2 שניות
        setTimeout(() => {
          window.location.href = "../dashboard.html";
        }, 2000);
      }

      function update() {
        if (!gameActive) return;

        if (keys["ArrowUp"]) player.y -= player.speed;
        if (keys["ArrowDown"]) player.y += player.speed;
        if (keys["ArrowLeft"]) player.x -= player.speed;
        if (keys["ArrowRight"]) player.x += player.speed;

        obstacles.forEach(o => {
          o.x += o.dx;
          o.y += o.dy;

          if (o.x < 0 || o.x > 580) o.dx *= -1;
          if (o.y < 0 || o.y > 380) o.dy *= -1;

          if (detectCollision(player, o)) {
            resetPlayer();
          }
        });

        if (detectCollision(player, goal)) {
          handleWin();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0ff";
        ctx.shadowColor = "#0ff";
        ctx.shadowBlur = 15;
        ctx.fillRect(player.x, player.y, player.size, player.size);

        ctx.fillStyle = "#0f0";
        ctx.shadowColor = "#0f0";
        ctx.fillRect(goal.x, goal.y, goal.size, goal.size);

        ctx.fillStyle = "#f00";
        ctx.shadowColor = "#f00";

        obstacles.forEach(o => {
          ctx.fillRect(o.x, o.y, o.size, o.size);
        });

        ctx.shadowBlur = 0;
      }

      function loop() {
        update();
        draw();
        loopId = requestAnimationFrame(loop);
      }

      loop();
    });
  </script>

</body>
</html>
