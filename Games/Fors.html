<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Quest - PCS365</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d12;
            color: #00f2ff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            border: 2px solid #00f2ff;
            border-radius: 12px;
            background: #050505;
        }

        canvas {
            display: block;
            background: radial-gradient(circle, #16213e 0%, #0d0d12 100%);
        }

        .neon-glow {
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
        }

        .status-panel {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .ui-box {
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff;
            padding: 5px 15px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="mb-8 text-center">
        <h1 class="text-5xl font-bold neon-glow uppercase tracking-tighter">Neon Protocol</h1>
        <p class="text-cyan-400 opacity-70 mt-2">משימת איסוף מטבעות - הגע ליעד הסגול</p>
    </div>

    <div id="game-container">
        <div class="status-panel">
            <div id="user-display" class="ui-box text-sm">סוכן: טוען...</div>
            <div id="quest-status" class="ui-box text-sm text-yellow-400">סטטוס: בתנועה</div>
        </div>
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <div class="mt-6 flex space-x-6 space-x-reverse text-xs text-cyan-700 uppercase tracking-widest">
        <span>[חיצים לתנועה]</span>
        <span>[הימנע ממגע באדום]</span>
        <span>[גרסה 1.0.4]</span>
    </div>

    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const userDisplay = document.getElementById('user-display');

        let currentUser = null;
        let gameRunning = false;

        // Player Config
        const player = {
            x: 50,
            y: 250,
            size: 22,
            speed: 6,
            color: '#00f2ff'
        };

        // Goal Config
        const goal = {
            x: 820,
            y: 225,
            size: 40,
            color: '#bd00ff'
        };

        // Obstacles
        let obstacles = [];
        const OBSTACLE_COUNT = 10;

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Security Check & Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                userDisplay.innerText = `סוכן: ${user.email.split('@')[0]}`;
                console.log("משתמש מחובר בהצלחה:", user.uid);
                setupGame();
                gameRunning = true;
                requestAnimationFrame(gameLoop);
            } else {
                console.warn("אין משתמש מחובר, מעביר לדף כניסה...");
                window.location.href = '../index.html';
            }
        });

        function setupGame() {
            player.x = 50;
            player.y = canvas.height / 2;
            
            obstacles = [];
            for (let i = 0; i < OBSTACLE_COUNT; i++) {
                obstacles.push({
                    x: 200 + (i * 60),
                    y: Math.random() * (canvas.height - 100),
                    width: 15 + Math.random() * 25,
                    height: 60 + Math.random() * 120,
                    speedY: (2 + Math.random() * 4) * (Math.random() > 0.5 ? 1 : -1),
                    glow: Math.floor(Math.random() * 20) + 10
                });
            }
        }

        async function handleWin() {
            if (!gameRunning) return;
            gameRunning = false;
            
            console.log("ניצחון זוהה! מעדכן נתונים ב-Firestore...");
            
            try {
                const playerRef = doc(db, "players", currentUser.uid);
                await updateDoc(playerRef, {
                    currentQuestStatus: 'completed',
                    coins: increment(50)
                });
                console.log("ה-DB עודכן בהצלחה: +50 מטבעות");
                window.location.href = '../dashboard.html';
            } catch (error) {
                console.error("שגיאה קריטית בכתיבה ל-Firestore:", error);
                alert("שגיאת מערכת בעדכון המשימה. בדוק את הקונסול.");
                gameRunning = true; // החזרת השליטה במקרה של שגיאה
            }
        }

        function update() {
            if (!gameRunning) return;

            // Move Player
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

            // Screen Bounds
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            // Move Obstacles
            obstacles.forEach(obs => {
                obs.y += obs.speedY;
                if (obs.y < 0 || obs.y + obs.height > canvas.height) {
                    obs.speedY *= -1;
                }

                // Collision Detection
                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.size > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.size > obs.y
                ) {
                    console.log("התנגשות! חזרה לנקודת ההתחלה.");
                    setupGame();
                }
            });

            // Check Win
            if (
                player.x < goal.x + goal.size &&
                player.x + player.size > goal.x &&
                player.y < goal.y + goal.size &&
                player.y + player.size > goal.y
            ) {
                handleWin();
            }
        }

        function draw() {
            // Background Clean
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Goal (Purple Neon)
            ctx.shadowBlur = 25;
            ctx.shadowColor = goal.color;
            ctx.fillStyle = goal.color;
            ctx.fillRect(goal.x, goal.y, goal.size, goal.size);

            // Draw Obstacles (Red Neon)
            obstacles.forEach(obs => {
                ctx.shadowBlur = obs.glow;
                ctx.shadowColor = '#ff003c';
                ctx.fillStyle = '#ff003c';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Draw Player (Cyan Neon)
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Grid Effect Overlay
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>
</html>
