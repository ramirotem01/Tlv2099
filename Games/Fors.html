<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Quest: Neural Breach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            background-image: url('https://res.cloudinary.com/dxygefiai/image/upload/v1776870001/Gemini_Generated_Image_jbr8f5jbr8f5jbr8_burebz.png');
            background-size: cover;
            background-position: center;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.2));
        }
        .neon-glow {
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
        }
        .neon-border {
            box-shadow: 0 0 15px #00f3ff, inset 0 0 15px #00f3ff;
            border: 2px solid #00f3ff;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div id="ui-overlay" class="absolute inset-0 flex flex-col justify-between p-8 z-10 pointer-events-none">
        <div class="flex justify-between items-start">
            <h1 class="text-4xl font-bold text-cyan-400 neon-glow tracking-widest uppercase italic">Neural Link: Online</h1>
            <div id="status" class="text-pink-500 font-bold text-xl neon-glow">FIREWALL ACTIVE</div>
        </div>
        <div class="flex justify-center">
            <div class="bg-black/80 p-4 neon-border rounded-lg text-cyan-300 text-center pointer-events-auto">
                <p>השתמש ב-WASD או בחיצים כדי להגיע לליבה הירוקה</p>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900;
        canvas.height = 550;

        let gameActive = false;
        let currentUser = null;
        let animationId;

        const player = { x: 50, y: 275, size: 20, speed: 5 };
        const goal = { x: 820, y: 250, size: 50 };

        const obstacles = [
            { x: 250, y: 0, w: 20, h: 350, sy: 6 },
            { x: 450, y: 200, w: 20, h: 350, sy: -8 },
            { x: 650, y: 0, w: 20, h: 400, sy: 10 }
        ];

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        async function handleWin() {
            if (!gameActive || !currentUser) return;
            
            // עצירה מיידית של המנוע (כמו ב-Data Digger)
            gameActive = false;
            cancelAnimationFrame(animationId);

            try {
                const playerRef = doc(db, "players", currentUser.uid);
                
                // עדכון הנתונים
                await updateDoc(playerRef, {
                    currentQuestStatus: 'completed',
                    coins: increment(50)
                });

                // Alert עוצר את הדף ומבטיח שהבקשה נשלחה
                alert("ACCESS GRANTED: נתונים חולצו בהצלחה!");
                window.location.href = '../dashboard.html';

            } catch (error) {
                console.error("Critical Update Error:", error);
                window.location.href = '../dashboard.html';
            }
        }

        function update() {
            if (!gameActive) return;

            // תנועת שחקן
            if ((keys['ArrowUp'] || keys['KeyW']) && player.y > 0) player.y -= player.speed;
            if ((keys['ArrowDown'] || keys['KeyS']) && player.y < canvas.height - player.size) player.y += player.speed;
            if ((keys['ArrowLeft'] || keys['KeyA']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['KeyD']) && player.x < canvas.width - player.size) player.x += player.speed;

            // עדכון מכשולים ובדיקת התנגשות
            obstacles.forEach(ob => {
                ob.y += ob.sy;
                if (ob.y + ob.h > canvas.height || ob.y < 0) ob.sy *= -1;

                if (player.x < ob.x + ob.w && player.x + player.size > ob.x &&
                    player.y < ob.y + ob.h && player.y + player.size > ob.y) {
                    player.x = 50; player.y = 275; // איפוס
                }
            });

            // בדיקת ניצחון
            if (player.x < goal.x + goal.size && player.x + player.size > goal.x &&
                player.y < goal.y + goal.size && player.y + player.size > goal.y) {
                handleWin();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // יעד (Neon Green)
            ctx.shadowBlur = 35; ctx.shadowColor = '#39ff14';
            ctx.fillStyle = '#39ff14';
            ctx.fillRect(goal.x, goal.y, goal.size, goal.size);

            // מכשולים (Neon Red)
            ctx.shadowBlur = 25; ctx.shadowColor = '#ff003c';
            ctx.fillStyle = '#ff003c';
            obstacles.forEach(ob => ctx.fillRect(ob.x, ob.y, ob.w, ob.h));

            // שחקן (Neon Blue)
            ctx.shadowBlur = 20; ctx.shadowColor = '#00f3ff';
            ctx.fillStyle = '#00f3ff';
            ctx.fillRect(player.x, player.y, player.size, player.size);

            ctx.shadowBlur = 0;
        }

        function loop() {
            if (!gameActive) return;
            update();
            draw();
            animationId = requestAnimationFrame(loop);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                gameActive = true;
                loop();
            } else {
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
