<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Neon Overdrive - Pro Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    body { margin:0; overflow:hidden; background:#020617; color:white; font-family: 'Orbitron', sans-serif; }
    canvas { display:block; margin:auto; border-left: 4px solid #0ff; border-right: 4px solid #0ff; background: #010409; }
    .neon-text { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
    #overlay {
        position:absolute; inset:0; display:none; background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(15px); justify-content:center; align-items:center;
        flex-direction:column; z-index: 100;
    }
</style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

<div id="hud" class="fixed top-5 w-[500px] flex justify-between items-center pointer-events-none z-50">
    <div class="bg-black/80 p-3 border border-cyan-500 rounded-lg shadow-[0_0_15px_rgba(0,255,255,0.3)]">
        <div class="text-[10px] text-cyan-400 uppercase tracking-widest">Progress</div>
        <div id="coin-score" class="text-3xl font-black text-white italic">0 / 50</div>
    </div>
    <div class="bg-black/80 p-3 border border-red-500 rounded-lg text-right shadow-[0_0_15px_rgba(255,0,0,0.3)]">
        <div class="text-[10px] text-red-400 uppercase tracking-widest">System Status</div>
        <div id="status-text" class="text-xs font-bold text-white uppercase italic">High Velocity</div>
    </div>
</div>

<div class="relative">
    <canvas id="gameCanvas" width="500" height="700"></canvas>
    <div id="overlay">
        <h2 class="text-6xl font-black text-green-400 mb-2 italic">MISSION COMPLETE</h2>
        <p class="text-white opacity-70 mb-6 uppercase tracking-widest text-center">Data Synced with PCS365<br>Returning to Dashboard...</p>
        <div class="px-8 py-3 border-2 border-green-500 text-green-500 font-bold text-2xl animate-pulse">+50 COINS</div>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"; // Note: Updated import paths if needed for your environment

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const carSVG = `data:image/svg+xml;base64,${btoa(`
<svg width="60" height="100" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="5" width="40" height="90" rx="8" fill="#00f3ff" />
    <rect x="15" y="15" width="30" height="20" rx="2" fill="#000" fill-opacity="0.5" />
    <rect x="12" y="75" width="8" height="15" fill="#ff0000" />
    <rect x="40" y="75" width="8" height="15" fill="#ff0000" />
    <rect x="12" y="5" width="10" height="5" fill="#fff" />
    <rect x="38" y="5" width="10" height="5" fill="#fff" />
    <path d="M10 30 L5 40 L5 70 L10 80" fill="none" stroke="#00f3ff" stroke-width="2" />
</svg>`)}`;

const enemySVG = `data:image/svg+xml;base64,${btoa(`
<svg width="60" height="100" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="5" width="40" height="90" rx="8" fill="#f87171" />
    <rect x="15" y="20" width="30" height="25" rx="2" fill="#1e1b4b" />
    <circle cx="15" cy="10" r="4" fill="#facc15" />
    <circle cx="45" cy="10" r="4" fill="#facc15" />
</svg>`)}`;

const carImg = new Image(); carImg.src = carSVG;
const enemyImg = new Image(); enemyImg.src = enemySVG;

let gameActive = true;
let coinsCollected = 0;
let speed = 11; // מהירות התחלתית גבוהה יותר
let currentUser = null;
let carX = 225;
let targetX = 225;

const obstacles = [];
const coins = [];
const roadLines = [];
for(let i=0; i<15; i++) roadLines.push({ y: i * 50 });

function resetGame() {
    coinsCollected = 0;
    speed = 11;
    obstacles.length = 0;
    coins.length = 0;
    document.getElementById("coin-score").innerText = `0 / 50`;
    document.getElementById("status-text").innerText = "SYSTEM REBOOT...";
    setTimeout(() => { document.getElementById("status-text").innerText = "High Velocity"; }, 800);
}

async function handleWin() {
    if(!gameActive) return;
    gameActive = false;
    document.getElementById("overlay").style.display = "flex";
    if (currentUser) {
        try {
            const ref = doc(db, "players", currentUser.uid);
            await updateDoc(ref, { 
                coins: increment(50),
                currentQuestStatus: "completed"
            });
            setTimeout(() => window.location.href = "../dashboard.html", 3000);
        } catch(e) { console.error(e); }
    }
}

window.addEventListener("keydown", e => {
    if(e.code === "ArrowLeft" && targetX > 100) targetX -= 165;
    if(e.code === "ArrowRight" && targetX < 300) targetX += 165;
});

function update() {
    if(!gameActive) return;

    speed += 0.003; // האצה מהירה יותר
    carX += (targetX - carX) * 0.25;

    roadLines.forEach(l => {
        l.y += speed;
        if(l.y > canvas.height) l.y = -50;
    });

    // לוגיקה למניעת חסימה של 3 נתיבים
    if(Math.random() < 0.04) {
        const activeLanes = new Set();
        obstacles.forEach(o => {
            if(o.y < 150) { // בודק מכשולים קרובים מאוד למעלה
                activeLanes.add(Math.floor((o.x - 60) / 165));
            }
        });

        if(activeLanes.size < 2) { // יוצר מכשול רק אם יש פחות מ-2 נתיבים חסומים באותו גובה
            const lane = Math.floor(Math.random() * 3);
            if(!activeLanes.has(lane)) {
                obstacles.push({ x: lane * 165 + 60, y: -100, w: 50, h: 90 });
            }
        }
    }

    if(Math.random() < 0.03) {
        const lane = Math.floor(Math.random() * 3);
        coins.push({ x: lane * 165 + 85, y: -50, r: 14 });
    }

    obstacles.forEach((obs, i) => {
        obs.y += speed;
        // Collision Detection
        if(carX < obs.x + obs.w && carX + 50 > obs.x && 580 < obs.y + obs.h && 580 + 90 > obs.y) {
            resetGame();
        }
        if(obs.y > canvas.height) obstacles.splice(i, 1);
    });

    coins.forEach((c, i) => {
        c.y += speed;
        const dist = Math.hypot(carX + 25 - c.x, 580 + 45 - c.y);
        if(dist < 45) {
            coins.splice(i, 1);
            coinsCollected++;
            document.getElementById("coin-score").innerText = `${coinsCollected} / 50`;
            if(coinsCollected >= 50) handleWin();
        }
        if(c.y > canvas.height) coins.splice(i, 1);
    });
}

function draw() {
    ctx.fillStyle = "#010409";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // כביש נאון
    ctx.shadowBlur = 15; ctx.shadowColor = "#0ff";
    ctx.fillStyle = "#0ff";
    roadLines.forEach(l => {
        ctx.fillRect(165, l.y, 2, 25);
        ctx.fillRect(330, l.y, 2, 25);
    });

    // שחקן
    ctx.shadowBlur = 25; ctx.shadowColor = "#00f3ff";
    ctx.drawImage(carImg, carX, 580, 50, 90);

    // מכשולים
    obstacles.forEach(obs => {
        ctx.shadowBlur = 20; ctx.shadowColor = "#f87171";
        ctx.drawImage(enemyImg, obs.x, obs.y, obs.w, obs.h);
    });

    // מטבעות נאון מוזהבות
    coins.forEach(c => {
        ctx.shadowBlur = 20; ctx.shadowColor = "#fbbf24";
        ctx.fillStyle = "#fbbf24";
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
    });
    ctx.shadowBlur = 0;
}

function loop() {
    update(); draw();
    if(gameActive) requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user => {
    if(!user) return;
    currentUser = user;
    loop();
});
</script>
</body>
</html>
