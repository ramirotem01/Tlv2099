<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>PCS365 - Mission Control</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    body { margin:0; overflow:hidden; background:#020617; color:white; font-family: 'Orbitron', sans-serif; }
    canvas { display:block; margin:auto; border-left: 4px solid #0ff; border-right: 4px solid #0ff; background: #010409; }
    #hud {
        position:absolute; top:20px; left:50%; transform:translateX(-50%);
        width:500px; display:flex; justify-content:space-between; pointer-events:none; z-index:50;
    }
    #overlay {
        position:absolute; inset:0; display:none; background: rgba(2, 6, 23, 0.98);
        backdrop-filter: blur(20px); justify-content:center; align-items:center;
        flex-direction:column; z-index: 100;
    }
</style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

<div id="hud">
    <div class="bg-black/80 p-4 border border-cyan-500 rounded-xl shadow-[0_0_20px_rgba(0,255,255,0.2)]">
        <div class="text-[10px] text-cyan-400 uppercase tracking-tighter text-center">מטבעות</div>
        <div id="coin-score" class="text-4xl font-black text-white italic">0 / 50</div>
    </div>
    <div class="bg-black/80 p-4 border border-red-500 rounded-xl text-right shadow-[0_0_20px_rgba(239,68,68,0.2)]">
        <div class="text-[10px] text-red-400 uppercase tracking-tighter">סטטוס</div>
        <div id="status-text" class="text-sm font-bold text-white uppercase italic">משימה פעילה</div>
    </div>
</div>

<div class="relative">
    <canvas id="gameCanvas" width="500" height="700"></canvas>
    <div id="overlay" class="text-center p-8">
        <h2 class="text-6xl font-black text-green-400 mb-2 italic">המשימה הושלמה!</h2>
        <p class="text-3xl text-white font-bold mb-6">קיבלת 50 מטבעות</p>
        <div class="text-cyan-400 animate-pulse tracking-widest uppercase">עובר לחמ"ל...</div>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const carSVG = `data:image/svg+xml;base64,${btoa(`
<svg width="60" height="100" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="5" width="40" height="90" rx="10" fill="#00f3ff" />
    <rect x="15" y="15" width="30" height="25" rx="4" fill="#000" fill-opacity="0.7" />
</svg>`)}`;

const enemySVG = `data:image/svg+xml;base64,${btoa(`
<svg width="60" height="100" viewBox="0 0 60 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="5" width="40" height="90" rx="10" fill="#f43f5e" />
    <rect x="15" y="20" width="30" height="30" rx="4" fill="#1e1b4b" />
</svg>`)}`;

const carImg = new Image(); carImg.src = carSVG;
const enemyImg = new Image(); enemyImg.src = enemySVG;

let gameActive = true;
let coinsCollected = 0;
const FIXED_SPEED = 15; 
let currentUser = null;
let carX = 225;
let targetX = 225;

const obstacles = [];
const coins = [];
const roadLines = [];
for(let i=0; i<20; i++) roadLines.push({ y: i * 40 });

function instantReset() {
    coinsCollected = 0;
    obstacles.length = 0;
    coins.length = 0;
    document.getElementById("coin-score").innerText = `0 / 50`;
}

async function handleWin() {
    if(!gameActive) return;
    gameActive = false;
    document.getElementById("overlay").style.display = "flex";
    
    if (currentUser) {
        try {
            const ref = doc(db, "players", currentUser.uid);
            await updateDoc(ref, { coins: increment(50), currentQuestStatus: "completed" });
        } catch(e) { console.error(e); }
    }
    // מעבר מהיר לחמ"ל תוך שנייה אחת
    setTimeout(() => window.location.href = "../dashboard.html", 1000);
}

window.addEventListener("keydown", e => {
    if(e.code === "ArrowLeft" && targetX > 100) targetX -= 165;
    if(e.code === "ArrowRight" && targetX < 300) targetX += 165;
});

function update() {
    if(!gameActive) return;

    carX += (targetX - carX) * 0.45;

    roadLines.forEach(l => {
        l.y += FIXED_SPEED;
        if(l.y > canvas.height) l.y = -40;
    });

    // הוספת קצת יותר מכוניות - מקסימום 2 על המסך בו זמנית
    if(obstacles.length < 2 && Math.random() < 0.04) { 
        const lane = Math.floor(Math.random() * 3);
        // מוודא שהמכונית החדשה לא מופיעה בדיוק מעל הקיימת
        const tooClose = obstacles.some(o => o.y < 200);
        if(!tooClose) {
            obstacles.push({ x: lane * 165 + 60, y: -150, w: 50, h: 90 });
        }
    }

    if(Math.random() < 0.1) {
        const lane = Math.floor(Math.random() * 3);
        coins.push({ x: lane * 165 + 85, y: -50, r: 16 });
    }

    for(let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.y += FIXED_SPEED;
        if(carX < obs.x + obs.w && carX + 50 > obs.x && 580 < obs.y + obs.h && 580 + 90 > obs.y) {
            instantReset();
            return;
        }
        if(obs.y > canvas.height) obstacles.splice(i, 1);
    }

    for(let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i];
        c.y += FIXED_SPEED;
        const dist = Math.hypot(carX + 25 - c.x, 580 + 45 - c.y);
        if(dist < 50) {
            coins.splice(i, 1);
            coinsCollected++;
            document.getElementById("coin-score").innerText = `${coinsCollected} / 50`;
            if(coinsCollected >= 50) handleWin();
        } else if(c.y > canvas.height) {
            coins.splice(i, 1);
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.shadowBlur = 15; ctx.shadowColor = "#0ff";
    ctx.fillStyle = "#0ff";
    roadLines.forEach(l => {
        ctx.fillRect(165, l.y, 3, 20);
        ctx.fillRect(330, l.y, 3, 20);
    });

    ctx.shadowBlur = 30; ctx.shadowColor = "#00f3ff";
    ctx.drawImage(carImg, carX, 580, 50, 90);

    obstacles.forEach(obs => {
        ctx.shadowBlur = 25; ctx.shadowColor = "#f43f5e";
        ctx.drawImage(enemyImg, obs.x, obs.y, obs.w, obs.h);
    });

    coins.forEach(c => {
        ctx.shadowBlur = 20; ctx.shadowColor = "#fbbf24";
        ctx.fillStyle = "#fbbf24";
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

onAuthStateChanged(auth, user => {
    currentUser = user;
    loop();
});
</script>
</body>
</html>
