<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Neon Overdrive - PCS365 Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
    body { margin:0; overflow:hidden; background:#020617; color:white; font-family: 'Orbitron', sans-serif; }
    canvas { display:block; margin:auto; border-left: 4px solid #3b82f6; border-right: 4px solid #3b82f6; background: linear-gradient(to bottom, #020617, #0f172a); }
    .neon-text { text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
    #overlay {
        position:absolute; inset:0; display:none; background: rgba(2, 6, 23, 0.9);
        backdrop-filter: blur(10px); justify-content:center; align-items:center;
        flex-direction:column; z-index: 100;
    }
</style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

<div id="hud" class="fixed top-5 w-[500px] flex justify-between items-center pointer-events-none z-50">
    <div class="bg-black/60 p-3 border border-cyan-500/30 rounded-lg">
        <div class="text-[10px] text-cyan-400 uppercase tracking-widest">Velocity</div>
        <div id="speed-meter" class="text-2xl font-black text-white italic">0 KM/H</div>
    </div>
    <div class="bg-black/60 p-3 border border-yellow-500/30 rounded-lg text-right">
        <div class="text-[10px] text-yellow-400 uppercase tracking-widest">Wallet</div>
        <div id="coin-score" class="text-2xl font-black text-white">0</div>
    </div>
</div>

<h1 class="text-2xl font-black neon-text mb-2 italic tracking-tighter uppercase">Neon Overdrive</h1>

<div class="relative">
    <canvas id="gameCanvas" width="500" height="700"></canvas>
    <div id="overlay">
        <h2 id="end-title" class="text-5xl font-black text-red-500 mb-2 italic uppercase">Crashed</h2>
        <p id="end-stats" class="text-white opacity-70 mb-6 uppercase tracking-widest text-center"></p>
        <div class="px-6 py-2 border border-yellow-500 text-yellow-500 font-bold animate-pulse" id="coin-reward"></div>
        <button onclick="location.reload()" class="mt-8 px-10 py-3 bg-cyan-600 hover:bg-cyan-400 text-white font-bold rounded-full transition-all">RE-ENTRY</button>
    </div>
</div>

<script type="module">
import { auth, db } from "../firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// משתני משחק
let gameActive = true;
let score = 0;
let coinsCollected = 0;
let speed = 7;
let currentUser = null;
let initialCoins = 0;

const car = {
    x: 225, y: 580, w: 50, h: 90,
    color: "#00f3ff",
    targetX: 225
};

const obstacles = [];
const coins = [];
const roadLines = [];

// יצירת קווי כביש שזזים
for(let i=0; i<10; i++) roadLines.push({ y: i * 80 });

function createObstacle() {
    const lane = Math.floor(Math.random() * 3);
    obstacles.push({
        x: lane * 160 + 50,
        y: -100,
        w: 55, h: 100,
        color: "#f87171"
    });
}

function createCoin() {
    const lane = Math.floor(Math.random() * 3);
    coins.push({
        x: lane * 160 + 75,
        y: -50,
        radius: 12,
        collected: false
    });
}

// שליטה
window.addEventListener("keydown", e => {
    if(e.code === "ArrowLeft" && car.targetX > 100) car.targetX -= 165;
    if(e.code === "ArrowRight" && car.targetX < 300) car.targetX += 165;
});

// סנכרון עם DB (בדומה ל-PCS365)
async function syncData(earned) {
    if(!currentUser) return;
    try {
        const ref = doc(db, "players", currentUser.uid);
        await updateDoc(ref, { 
            coins: increment(earned),
            lastGameScore: score 
        });
    } catch(e) { console.error("DB Sync Error:", e); }
}

function update() {
    if(!gameActive) return;

    score++;
    speed += 0.001; // קושי עולה
    
    // תנועת מכונית חלקה
    car.x += (car.targetX - car.x) * 0.15;

    // הזזת כביש
    roadLines.forEach(l => {
        l.y += speed;
        if(l.y > canvas.height) l.y = -80;
    });

    // ניהול מכשולים
    if(score % 60 === 0) createObstacle();
    if(score % 100 === 0) createCoin();

    obstacles.forEach((obs, index) => {
        obs.y += speed;
        // Collision Detection
        if(car.x < obs.x + obs.w && car.x + car.w > obs.x &&
           car.y < obs.y + obs.h && car.y + car.h > obs.y) {
            endGame();
        }
        if(obs.y > canvas.height) obstacles.splice(index, 1);
    });

    // ניהול מטבעות
    coins.forEach((c, index) => {
        c.y += speed;
        const dist = Math.hypot(car.x + car.w/2 - c.x, car.y + car.h/2 - c.y);
        if(dist < 40 && !c.collected) {
            c.collected = true;
            coinsCollected += 5;
            document.getElementById("coin-score").innerText = initialCoins + coinsCollected;
        }
        if(c.y > canvas.height) coins.splice(index, 1);
    });

    document.getElementById("speed-meter").innerText = `${Math.floor(speed * 20)} KM/H`;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ציור קווי כביש נאון
    ctx.strokeStyle = "#1e293b";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(165, 0); ctx.lineTo(165, canvas.height);
    ctx.moveTo(335, 0); ctx.lineTo(335, canvas.height);
    ctx.stroke();

    ctx.fillStyle = "#3b82f6";
    roadLines.forEach(l => {
        ctx.shadowBlur = 10; ctx.shadowColor = "#3b82f6";
        ctx.fillRect(160, l.y, 10, 40);
        ctx.fillRect(330, l.y, 10, 40);
    });

    // ציור המכונית (Neon Style)
    ctx.shadowBlur = 20; ctx.shadowColor = car.color;
    ctx.fillStyle = car.color;
    // גוף המכונית
    ctx.fillRect(car.x, car.y, car.w, car.h);
    // פנסי נאון
    ctx.fillStyle = "#fff";
    ctx.fillRect(car.x + 5, car.y + 5, 10, 15);
    ctx.fillRect(car.x + 35, car.y + 5, 10, 15);

    // ציור מכשולים
    obstacles.forEach(obs => {
        ctx.shadowBlur = 15; ctx.shadowColor = obs.color;
        ctx.fillStyle = obs.color;
        ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    });

    // ציור מטבעות
    coins.forEach(c => {
        if(!c.collected) {
            ctx.shadowBlur = 15; ctx.shadowColor = "#eab308";
            ctx.fillStyle = "#eab308";
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
            ctx.fill();
        }
    });
    ctx.shadowBlur = 0;
}

function endGame() {
    gameActive = false;
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("end-stats").innerText = `DISTANCE: ${Math.floor(score/10)}m`;
    document.getElementById("coin-reward").innerText = `+${coinsCollected} COINS SYNCHRONIZED`;
    syncData(coinsCollected);
}

function loop() {
    update();
    draw();
    if(gameActive) requestAnimationFrame(loop);
}

onAuthStateChanged(auth, async user => {
    if(!user) return;
    currentUser = user;
    
    // משיכת כסף ראשונית מה-DB (בדיוק כמו ב-PCS365)
    const snap = await getDoc(doc(db, "players", user.uid));
    if(snap.exists()) {
        initialCoins = snap.data().coins || 0;
        document.getElementById("coin-score").innerText = initialCoins;
    }
    
    loop();
});
</script>
</body>
</html>
