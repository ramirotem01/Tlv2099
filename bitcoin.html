<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>המסע אל הביטקויין | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                        url('https://res.cloudinary.com/dxygefiai/image/upload/v1777130914/%D7%91%D7%99%D7%98%D7%A7%D7%95%D7%95%D7%99%D7%9F_rm4xa9.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-border { border: 1px solid rgba(234, 179, 8, 0.4); box-shadow: 0 0 30px rgba(234, 179, 8, 0.1); }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #451a03; font-weight: 900; transition: all 0.3s; }
        .btn-gold:disabled { background: #1e293b !important; color: #475569 !important; cursor: not-allowed; opacity: 0.8; transform: scale(1) !important; box-shadow: none !important; border-color: transparent !important; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* התאמה למובייל - גובה גמיש */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .main-container { height: auto; padding-bottom: 40px; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-6xl main-container flex flex-col gap-6">
        <header class="flex justify-between items-center bg-slate-950/60 p-5 rounded-3xl border border-slate-800">
            <div>
                <h1 class="text-3xl md:text-4xl font-black italic text-yellow-500 tracking-tighter uppercase leading-none">BITCOIN QUEST</h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-[0.3em] uppercase">המסע אל השלל הדיגיטלי</p>
            </div>
            <a href="dashboard.html" class="glass p-3 px-6 rounded-xl text-[10px] font-black border border-blue-500/30 text-blue-400 hover:bg-blue-500/10 transition-all uppercase">
                חזרה לחמ"ל
            </a>
        </header>

        <main class="flex flex-col md:flex-row gap-6 items-stretch">
            <div class="glass rounded-[2.5rem] p-8 md:p-12 text-center neon-border flex-1 flex flex-col justify-center items-center">
                <div class="text-7xl md:text-8xl mb-6 drop-shadow-[0_0_20px_rgba(234,179,8,0.5)]">₿</div>
                <h2 class="text-2xl md:text-3xl font-black mb-3 italic uppercase tracking-tighter">סריקת שטח זמינה</h2>
                <p class="text-slate-400 text-sm mb-10 leading-relaxed max-w-xs mx-auto font-medium">
                    צא אל השממה הדיגיטלית. אתה עשוי למצוא עושר רב, אך היזהר - המערכת לא יציבה.
                </p>
                <div class="w-full max-w-sm space-y-4">
                    <button id="start-quest" class="btn-gold w-full py-5 rounded-2xl text-xl shadow-xl uppercase italic tracking-tighter hover:scale-[1.02] active:scale-95" disabled>
                        טוען מערכות...
                    </button>
                    <p id="cooldown-timer" class="text-red-500 font-black text-sm h-6 italic tracking-widest uppercase"></p>
                </div>
            </div>

            <div id="result-area" class="hidden glass rounded-[2.5rem] p-8 md:p-12 flex-1 flex flex-col justify-center border border-slate-800 fade-in">
                <div class="mb-8 border-r-4 border-yellow-500 pr-5">
                    <span class="text-[10px] font-black text-yellow-500 uppercase tracking-widest block mb-2 italic">LOG_ENTRY // SUMMARY</span>
                    <p id="story-text" class="text-lg md:text-xl font-medium text-slate-100 italic leading-relaxed"></p>
                </div>
                <div id="loot-display" class="flex items-center gap-5 p-6 bg-slate-950/80 rounded-[2rem] border border-yellow-500/30 shadow-inner">
                    <span id="loot-icon" class="text-5xl md:text-6xl"></span>
                    <div>
                        <h4 id="loot-title" class="text-xl md:text-2xl font-black text-white italic uppercase leading-none mb-1"></h4>
                        <p id="loot-desc" class="text-base md:text-lg text-yellow-500 font-bold italic"></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, increment, arrayUnion, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { adventureStories } from './story.js';

        let player = null;
        let cooldownInterval = null;
        const btn = document.getElementById('start-quest');
        const timerText = document.getElementById('cooldown-timer');
        const COOLDOWN_TIME = 300; // 5 דקות

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            const docRef = doc(db, "players", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                player = docSnap.data();
                checkCooldown();
            }
        });

        function checkCooldown() {
            if (!player) return;
            
            const lastQuest = player.lastQuestTime ? (player.lastQuestTime.toMillis ? player.lastQuestTime.toMillis() : player.lastQuestTime) : 0;
            const now = Date.now();
            const diffSeconds = (now - lastQuest) / 1000;
            
            if (diffSeconds < COOLDOWN_TIME) {
                startTimer(Math.floor(COOLDOWN_TIME - diffSeconds));
            } else {
                enableButton();
            }
        }

        function enableButton() {
            btn.disabled = false;
            btn.innerText = "צא לסריקה";
            timerText.innerText = "";
        }

        function startTimer(seconds) {
            btn.disabled = true;
            let remaining = seconds;
            
            if (cooldownInterval) clearInterval(cooldownInterval);
            
            const updateTimerUI = () => {
                if (remaining <= 0) {
                    clearInterval(cooldownInterval);
                    enableButton();
                    return;
                }
                const m = Math.floor(remaining / 60);
                const s = Math.floor(remaining % 60);
                timerText.innerText = `מערכות בטעינה: ${m}:${s < 10 ? '0' : ''}${s}`;
                btn.innerText = "ממתין לסנכרון...";
                remaining--;
            };
            
            updateTimerUI();
            cooldownInterval = setInterval(updateTimerUI, 1000);
        }

        btn.onclick = async () => {
            if (!player || btn.disabled) return;
            
            // הגנה מפני לחיצה כפולה
            btn.disabled = true;
            btn.innerText = "מעבד נתונים...";

            const rand = Math.random() * 100;
            const story = adventureStories[Math.floor(Math.random() * adventureStories.length)];
            const playerRef = doc(db, "players", auth.currentUser.uid);
            let result = {};

            try {
                // 1. קביעת שלל
                if (rand <= 90) { // זהב (90%)
                    const bonus = Math.floor(Math.random() * (player.level || 1));
                    const gold = ((player.level || 1) + bonus) * (Math.floor(Math.random() * 3) + 2);
                    await updateDoc(playerRef, { coins: increment(gold), lastQuestTime: serverTimestamp() });
                    result = { title: 'זהב טהור', icon: '💰', desc: `מצאת ${gold} מטבעות.` };
                } 
                else if (rand <= 94) { // קרב (4%)
                    localStorage.setItem('currentBattle', JSON.stringify({ name: "סוכן חסום", level: player.level + 1, reward: player.level * 15 }));
                    window.location.href = 'combat.html';
                    return;
                }
                else if (rand <= 98) { // שיקוי (4%)
                    const p = ['health_small', 'health_large'][Math.floor(Math.random() * 2)];
                    await updateDoc(playerRef, { potions: arrayUnion(p), lastQuestTime: serverTimestamp() });
                    result = { title: 'אספקה טקטית', icon: '🧪', desc: `מצאת שיקוי ${p === 'health_small' ? 'קטן' : 'גדול'}.` };
                }
                else { // נשק נדיר (2%)
                    const w = 'thermal_blade';
                    await updateDoc(playerRef, { inventory: arrayUnion(w), lastQuestTime: serverTimestamp() });
                    result = { title: 'טכנולוגיה אבודה', icon: '⚔️', desc: `מצאת נשק: ${w}.` };
                }

                // 2. עדכון UI
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('story-text').innerText = story.text;
                document.getElementById('loot-title').innerText = result.title;
                document.getElementById('loot-desc').innerText = result.desc;
                document.getElementById('loot-icon').innerText = result.icon;

                // 3. יצירת נוטיפיקציה
                await addDoc(collection(db, "notifications"), {
                    targetUserId: auth.currentUser.uid,
                    title: result.title,
                    message: `בוצע סריקה: ${result.desc}`,
                    type: 'QUEST',
                    isRead: false,
                    createdAt: serverTimestamp()
                });

                // 4. התחלת טיימר מחדש
                startTimer(COOLDOWN_TIME);

            } catch (e) {
                console.error("Quest error:", e);
                enableButton();
            }
        };
    </script>
</body>
</html>
