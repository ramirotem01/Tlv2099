<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המעבדה | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .potion-card { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .potion-card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.5); }
        .potion-glow { filter: drop-shadow(0 0 10px currentColor); }
        .shelf { border-bottom: 4px solid #1e293b; box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5); }
        .locked { filter: grayscale(1) opacity(0.5); cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter text-blue-400 uppercase">Alchemy Lab</h1>
                <p class="text-slate-500 text-xs font-bold tracking-widest">מעבדת השיקויים של המחתרת</p>
            </div>
            <div class="flex gap-4 items-center">
                <div class="glass px-4 py-2 rounded-xl border border-yellow-500/20">
                    <span class="text-yellow-400 font-black" id="user-coins">0</span> 🪙
                </div>
                <a href="dashboard.html" class="glass p-3 px-6 rounded-2xl font-bold text-xs hover:bg-slate-800 transition-all border border-blue-500/20">חזרה לחמ"ל</a>
            </div>
        </header>

        <div class="glass p-4 rounded-2xl mb-8 border-dashed border-slate-700">
            <h2 class="text-xs font-black uppercase text-slate-500 mb-4 tracking-widest text-center">התרמיל שלך (מקסימום 2 שיקויים)</h2>
            <div id="my-potions" class="flex justify-center gap-4">
                <p class="text-slate-600 text-xs italic">בודק מלאי בתרמיל...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="shop-shelf"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // מזהים מעודכנים שמתאימים לדשבורד (speed במקום spd)
        const POTIONS_DATA = [
            { id: 'health_large', name: 'משקה חיים גדול', desc: 'מעלה 50% חיים', price: 1000, minLvl: 5, color: '#22c55e', icon: '🧪', type: 'hp', value: 50 },
            { id: 'health_small', name: 'משקה חיים קטן', desc: 'מעלה 25% חיים', price: 200, minLvl: 1, color: '#4ade80', icon: '🧪', type: 'hp', value: 25 },
            { id: 'atk_small', name: 'משקה כוח קטן', desc: '+10% נזק בקרב', price: 200, minLvl: 1, color: '#ef4444', icon: '🍷', type: 'atk', value: 10 },
            { id: 'atk_large', name: 'משקה כוח גדול', desc: '+30% נזק בקרב', price: 700, minLvl: 5, color: '#b91c1c', icon: '🍷', type: 'atk', value: 30 },
            { id: 'def_small', name: 'משקה ספיגה קטן', desc: '+10% הגנה', price: 200, minLvl: 1, color: '#3b82f6', icon: '🍶', type: 'def', value: 10 },
            { id: 'def_large', name: 'משקה ספיגה גדול', desc: '+30% הגנה', price: 700, minLvl: 5, color: '#1d4ed8', icon: '🍶', type: 'def', value: 30 },
            { id: 'speed_small', name: 'משקה זריזות קטן', desc: '+15% סיכוי התחמקות', price: 300, minLvl: 2, color: '#f59e0b', icon: '⚡', type: 'spd', value: 15 },
            { id: 'speed_large', name: 'משקה זריזות גדול', desc: '+35% סיכוי התחמקות', price: 850, minLvl: 6, color: '#fbbf24', icon: '⚡', type: 'spd', value: 35 }
        ];

        let currentUserData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loadPlayerData(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadPlayerData(uid) {
            const docSnap = await getDoc(doc(db, "players", uid));
            if (docSnap.exists()) {
                currentUserData = docSnap.data();
                renderShop();
                renderInventory();
            }
        }

        function renderShop() {
            const shelf = document.getElementById('shop-shelf');
            const userLvl = currentUserData.level || 1;
            const userCoins = currentUserData.coins || 0;

            shelf.innerHTML = POTIONS_DATA.map(p => {
                const isLocked = userLvl < p.minLvl;
                return `
                    <div class="glass p-6 rounded-[2rem] potion-card shelf flex flex-col items-center ${isLocked ? 'locked' : ''}">
                        <div class="text-5xl mb-4 potion-glow" style="color: ${p.color}">${p.icon}</div>
                        <h3 class="font-bold text-lg">${p.name}</h3>
                        <p class="text-[10px] text-slate-400 mb-4 text-center">${p.desc}</p>
                        <div class="mt-auto w-full">
                            <div class="flex justify-between text-[10px] mb-2 font-bold uppercase">
                                <span>רמה ${p.minLvl}</span>
                                <span class="text-yellow-500">${p.price} 🪙</span>
                            </div>
                            <button onclick="buyPotion('${p.id}')" 
                                class="w-full py-2 bg-blue-600 rounded-xl font-black text-xs hover:bg-blue-500 transition-all ${isLocked ? 'hidden' : ''}">
                                רכישה
                            </button>
                            ${isLocked ? `<div class="text-center text-red-500 text-[10px] font-bold">נעול לרמה שלך</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('user-coins').innerText = userCoins.toLocaleString();
        }

        function renderInventory() {
            const container = document.getElementById('my-potions');
            const inventory = currentUserData.potions || [];

            if (inventory.length === 0) {
                container.innerHTML = `<p class="text-slate-600 text-xs italic">התרמיל ריק</p>`;
                return;
            }

            container.innerHTML = inventory.map((pId, index) => {
                const p = POTIONS_DATA.find(x => x.id === pId);
                if (!p) return '';
                return `
                    <div class="glass p-3 rounded-xl border border-slate-700 flex items-center gap-3">
                        <span class="text-xl">${p.icon}</span>
                        <div>
                            <div class="text-[10px] font-bold">${p.name}</div>
                            <button onclick="sellPotion('${p.id}', ${index})" class="text-[8px] text-red-400 font-bold hover:underline">מכירה (${p.price / 2} 🪙)</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.buyPotion = async (pId) => {
            const p = POTIONS_DATA.find(x => x.id === pId);
            const myPotions = currentUserData.potions || [];

            if (myPotions.length >= 2) {
                alert("התרמיל מלא! עליך למכור שיקוי כדי לפנות מקום.");
                return;
            }
            if (currentUserData.coins < p.price) {
                alert("אין לך מספיק זהב!");
                return;
            }

            try {
                const userRef = doc(db, "players", auth.currentUser.uid);
                await updateDoc(userRef, {
                    coins: currentUserData.coins - p.price,
                    potions: arrayUnion(pId)
                });
                alert(`רכשת ${p.name}!`);
                loadPlayerData(auth.currentUser.uid);
            } catch (e) {
                console.error(e);
            }
        };

        window.sellPotion = async (pId, index) => {
            const p = POTIONS_DATA.find(x => x.id === pId);
            const sellPrice = p.price / 2;

            if (!confirm(`למכור את ${p.name} תמורת ${sellPrice} זהב?`)) return;

            try {
                const userRef = doc(db, "players", auth.currentUser.uid);
                const currentPotions = [...currentUserData.potions];
                currentPotions.splice(index, 1);

                await updateDoc(userRef, {
                    coins: currentUserData.coins + sellPrice,
                    potions: currentPotions
                });
                loadPlayerData(auth.currentUser.uid);
            } catch (e) {
                console.error(e);
            }
        };

    </script>
</body>
</html>
