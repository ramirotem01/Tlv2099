<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היכל התהילה | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        /* עיצוב הטבלה */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: right; padding: 12px 20px; color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
        td { padding: 12px 20px; }
        tr.rank-row { transition: all 0.2s ease; }
        tr.rank-row:hover { transform: scale(1.01); }
        tr.rank-row td { background: rgba(15, 23, 42, 0.7); border-top: 1px solid rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.03); }
        tr.rank-row td:first-child { border-right: 1px solid rgba(255,255,255,0.03); border-radius: 0 1.5rem 1.5rem 0; }
        tr.rank-row td:last-child { border-left: 1px solid rgba(255,255,255,0.03); border-radius: 1.5rem 0 0 1.5rem; }

        .hero-thumb {
            width: 45px; height: 45px; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        .gold-glow { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter neon-text uppercase leading-none">Winner Wall</h1>
                <p class="text-blue-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-1">דירוג סוכנים פעילים</p>
            </div>
            <a href="dashboard.html" class="glass p-3 px-6 rounded-2xl font-bold text-xs hover:bg-slate-800 transition-all flex items-center gap-2 border border-blue-500/20">
                <span>חזרה לחמ"ל</span> 🛰️
            </a>
        </header>

        <div class="glass rounded-[2.5rem] overflow-hidden p-4 md:p-8 border border-slate-800/50">
            <table id="leaderboard-table">
                <thead>
                    <tr>
                        <th class="w-16">דירוג</th>
                        <th>סוכן</th>
                        <th class="text-center">דמות</th>
                        <th class="text-left">רמה</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    </tbody>
            </table>

            <div id="loading" class="text-center py-20">
                <div class="animate-spin text-2xl mb-4 inline-block">🌀</div>
                <p class="text-slate-500 text-xs font-bold tracking-widest animate-pulse">מתחבר למסד הנתונים...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        async function loadLeaderboard() {
            const body = document.getElementById('leaderboard-body');
            const loading = document.getElementById('loading');

            try {
                const q = query(
                    collection(db, "players"),
                    orderBy("level", "desc"),
                    orderBy("xp", "desc"),
                    limit(20)
                );

                const querySnapshot = await getDocs(q);
                loading.classList.add('hidden');
                body.innerHTML = '';

                let rank = 1;
                querySnapshot.forEach((docSnap) => {
                    const player = docSnap.data();
                    const displayName = player.username || "Unknown Hunter";
                    const heroImg = player.heroImage || "https://via.placeholder.com/100?text=Agent"; // תמונת גיבוי
                    
                    const isTop1 = rank === 1;

                    const row = document.createElement('tr');
                    row.className = "rank-row";
                    
                    row.innerHTML = `
                        <td class="font-black text-center ${isTop1 ? 'text-yellow-400 text-xl' : 'text-slate-500'}">
                            ${rank <= 3 ? ['🥇', '🥈', '🥉'][rank-1] : rank}
                        </td>
                        <td>
                            <div class="font-bold text-white tracking-tight">${displayName}</div>
                            <div class="text-[9px] text-slate-500 uppercase font-mono tracking-tighter">ID: ${docSnap.id.substring(0, 8)}</div>
                        </td>
                        <td class="flex justify-center">
                            <img src="${heroImg}" alt="Hero" class="hero-thumb ${isTop1 ? 'gold-glow' : ''}">
                        </td>
                        <td class="text-left">
                            <div class="text-blue-400 font-black text-xl italic leading-none">${player.level || 1}</div>
                            <div class="text-[8px] text-slate-600 font-bold uppercase tracking-widest mt-1">LVL</div>
                        </td>
                    `;
                    
                    body.appendChild(row);
                    rank++;
                });

            } catch (err) {
                console.error("Error:", err);
                loading.innerHTML = `<p class="text-red-500 text-xs font-bold uppercase">שגיאת רשת: לא ניתן לשלוף דירוגים</p>`;
            }
        }

        loadLeaderboard();
    </script>
</body>
</html>
