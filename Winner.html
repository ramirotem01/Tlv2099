<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>היכל התהילה | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .rank-card { transition: all 0.3s ease; }
        .rank-card:hover { transform: scale(1.02); background: rgba(30, 41, 59, 0.9); }
        .top-1 { border: 1px solid rgba(234, 179, 8, 0.5); box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter neon-text uppercase">היכל התהילה</h1>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">דירוג ציידים גלובלי | TLV2099</p>
            </div>
            <a href="dashboard.html" class="glass p-3 px-6 rounded-2xl font-bold text-xs hover:bg-slate-800 transition-all flex items-center gap-2 border border-blue-500/20">
                <span>חזרה לחמ"ל</span> 🛰️
            </a>
        </header>

        <div id="leaderboard-container" class="space-y-4">
            <div id="loading" class="text-center py-20">
                <div class="animate-spin text-3xl mb-4 inline-block">🌀</div>
                <p class="text-slate-500 font-bold tracking-widest animate-pulse">מושך נתוני סוכנים...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        async function loadLeaderboard() {
            const container = document.getElementById('leaderboard-container');
            const loading = document.getElementById('loading');

            try {
                // שליפת טופ 20 שחקנים לפי רמה ואז לפי XP
                const q = query(
                    collection(db, "players"),
                    orderBy("level", "desc"),
                    orderBy("xp", "desc"),
                    limit(20)
                );

                const querySnapshot = await getDocs(q);
                loading.classList.add('hidden');
                container.innerHTML = '';

                let rank = 1;
                querySnapshot.forEach((docSnap) => {
                    const player = docSnap.data();
                    // שימוש בשדה username כפי שביקשת
                    const displayName = player.username || "Unknown Hunter";
                    const isTop1 = rank === 1;

                    const card = document.createElement('div');
                    card.className = `glass p-4 rounded-2xl rank-card flex items-center justify-between border border-slate-800 ${isTop1 ? 'top-1' : ''}`;
                    
                    card.innerHTML = `
                        <div class="flex items-center gap-5">
                            <div class="w-10 h-10 flex items-center justify-center font-black text-xl ${isTop1 ? 'text-yellow-400' : 'text-slate-500'}">
                                ${rank <= 3 ? ['🥇', '🥈', '🥉'][rank-1] : '#' + rank}
                            </div>
                            <div>
                                <div class="font-bold text-lg ${isTop1 ? 'text-yellow-100' : 'text-white'}">${displayName}</div>
                                <div class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">רמת סוכן: ${player.level || 1}</div>
                            </div>
                        </div>
                        <div class="text-left">
                            <div class="text-blue-400 font-mono font-bold">${player.coins || 0} 🪙</div>
                            <div class="text-[9px] text-slate-600 uppercase font-black italic">זוזים שנצברו</div>
                        </div>
                    `;
                    
                    container.appendChild(card);
                    rank++;
                });

            } catch (err) {
                console.error("Error loading leaderboard:", err);
                loading.innerHTML = `<p class="text-red-500">שגיאה בסריקת רשת הסוכנים</p>`;
            }
        }

        // הפעלה ראשונית
        loadLeaderboard();
    </script>
</body>
</html>
