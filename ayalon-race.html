<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נתיבי איילון | טעינת סינפסות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; height: 100%; 
            background: #020617; font-family: 'Assistant', sans-serif;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('https://res.cloudinary.com/dxygefiai/image/upload/v1777200152/Gemini_Generated_Image_zg6xdizg6xdizg6x_xahmo1.png') no-repeat center center;
            background-size: cover;
        }
        canvas { display: block; }
        .ui-overlay {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 0; right: 0;
            display: flex; justify-content: space-between; padding: 0 20px;
            pointer-events: none; z-index: 10;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 10px 15px; border-radius: 15px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .energy-bar-bg { width: 120px; height: 6px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); }
        #energy-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); transition: width 0.3s; box-shadow: 0 0 10px #22c55e; }
        
        #start-screen {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(8px);
        }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.7); }
        .btn-start {
            background: rgba(59, 130, 246, 0.1); color: white; padding: 15px 40px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; border: 2px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transition: all 0.2s ease-in-out;
        }
        .btn-start:hover { background: #3b82f6; box-shadow: 0 0 30px #3b82f6; transform: scale(1.05); }
        
        /* הוראות נייד */
        .mobile-hint {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.3); font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen">
            <h1 class="text-6xl font-black text-white italic mb-4 text-center neon-text tracking-tighter">TLV<span id="logo-year" class="text-blue-400">2099</span></h1>
            <p id="game-subtitle" class="text-xl font-bold text-white mb-6 text-center neon-text uppercase tracking-widest">איילון: פרוטוקול סינכרון</p>
            <div class="max-w-xs text-center mb-8">
                <p id="game-desc" class="text-slate-400 text-sm leading-relaxed">
                    סוכן, האנרגיה שלך בשפל. רכב על ה<span class="text-blue-400 font-bold">סייבר-בייק</span>. <br>
                    אסוף <span class="text-cyan-400 font-bold">גבישי דאטה</span> (+2%) והתחמק מ<span class="text-red-500 font-bold">מחסומי שיבוש</span>.
                </p>
            </div>
            <button id="start-btn" class="btn-start text-xs">התחבר למערכת</button>
        </div>

        <div class="ui-overlay">
            <div class="glass-panel">
                <div id="energy-label" class="text-[9px] text-blue-400 font-bold uppercase tracking-widest italic">BIO-ENERGY</div>
                <div class="text-2xl font-black italic text-white neon-text"><span id="energy-val">0</span>%</div>
                <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            </div>
            <div class="glass-panel text-right">
                <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest italic">מרחק סינכרון</div>
                <div id="distance-val" class="text-2xl font-black italic text-white neon-text">0<span class="text-xs">m</span></div>
            </div>
        </div>

        <div class="mobile-hint md:hidden">גע בצדדי המסך כדי לנווט</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let playerEnergy = 0;
        let distance = 0;
        let userDocRef = null;
        let items = [];
        let speed = 7;
        let isArachnid = false;
        const lanes = [];

        const player = { lane: 1, targetX: 0, currentX: 0, y: 0, radius: 25 };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userDocRef = doc(db, "players", user.uid);
                const snap = await getDoc(userDocRef);
                if (snap.exists()) {
                    const data = snap.data();
                    playerEnergy = data.energy || 0;
                    isArachnid = (data.level >= 5);
                    
                    if (isArachnid) applyArachnidTheme();
                    updateUI();
                }
            } else { window.location.href = 'index.html'; }
        });

        function applyArachnidTheme() {
            document.getElementById('start-screen').style.borderColor = "#a855f7";
            document.getElementById('logo-year').className = "text-purple-500";
            const subtitle = document.getElementById('game-subtitle');
            subtitle.innerText = "🧬 מבצע: ארכניד-סינפס";
            subtitle.style.color = "#c084fc";
            subtitle.style.textShadow = "0 0 15px #a855f7";
            
            document.getElementById('energy-label').innerText = "ARACHNID-LINK";
            document.getElementById('energy-label').className = "text-[9px] text-purple-400 font-bold uppercase tracking-widest italic";
            
            const fill = document.getElementById('energy-fill');
            fill.style.background = "linear-gradient(90deg, #a855f7, #d8b4fe)";
            fill.style.boxShadow = "0 0 10px #a855f7";
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            lanes[0] = canvas.width * 0.22;
            lanes[1] = canvas.width * 0.5;
            lanes[2] = canvas.width * 0.78;
            player.currentX = lanes[1];
            player.targetX = lanes[1];
            player.y = canvas.height - 150;
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            if (playerEnergy >= 100) {
                alert("מערכות טעונות במלואן. צא למשימה!");
                window.location.href = 'dashboard.html';
                return;
            }
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            initCanvas();
            animate();
        });

        // ניווט מקלדת - תומך בעברית ואנגלית
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            const leftKeys = ['ArrowLeft', 'a', 'A', 'ש'];
            const rightKeys = ['ArrowRight', 'd', 'D', 'ג'];
            
            if (leftKeys.includes(e.key) && player.lane > 0) player.lane--;
            if (rightKeys.includes(e.key) && player.lane < 2) player.lane++;
        });

        // ניווט טאץ'
        window.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            const touchX = e.touches[0].clientX;
            if (touchX < canvas.width / 2 && player.lane > 0) player.lane--;
            else if (touchX > canvas.width / 2 && player.lane < 2) player.lane++;
        });

        function spawnItem() {
            const spawnRate = isArachnid ? 0.05 : 0.035;
            if (Math.random() < spawnRate) {
                const isObstacle = Math.random() < 0.4;
                items.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -100,
                    type: isObstacle ? 'obstacle' : 'energy',
                    pulseTime: 0
                });
            }
        }

        function updateUI() {
            document.getElementById('energy-val').innerText = Math.floor(playerEnergy);
            document.getElementById('energy-fill').style.width = playerEnergy + "%";
            document.getElementById('distance-val').innerHTML = `${Math.floor(distance)}<span class="text-xs">m</span>`;
        }

        function drawPlayer(x, y) {
            ctx.save();
            ctx.translate(x, y);

            const glowColor = isArachnid ? "#a855f7" : "#3b82f6";
            const strokeColor = isArachnid ? "#d8b4fe" : "#60a5fa";

            ctx.shadowBlur = 20;
            ctx.shadowColor = glowColor;
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.font = "40px serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🏍️", 0, 0);

            ctx.restore();
        }

        function drawEnergyCrystal(x, y) {
            ctx.save();
            ctx.translate(x, y);
            const crystalColor = isArachnid ? "rgba(168, 85, 247, 0.8)" : "rgba(34, 211, 238, 0.8)";
            ctx.shadowBlur = 15;
            ctx.shadowColor = crystalColor;
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.moveTo(0, -12); ctx.lineTo(8, 0); ctx.lineTo(0, 12); ctx.lineTo(-8, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        function drawObstacle(x, y, pulseTime) {
            ctx.save();
            ctx.translate(x, y);
            const alpha = 0.6 + Math.sin(pulseTime * 12) * 0.3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `rgba(239, 68, 68, ${alpha})`;
            ctx.fillStyle = `rgba(239, 68, 68, ${alpha})`;
            ctx.fillRect(-30, -5, 60, 10);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1;
            ctx.strokeRect(-30, -5, 60, 10);
            ctx.restore();
        }

        async function endGame(reason) {
            gameActive = false;
            const finalEnergy = Math.min(100, Math.floor(playerEnergy));
            
            if (userDocRef) {
                try {
                    await updateDoc(userDocRef, { 
                        energy: finalEnergy, 
                        lastHpUpdate: serverTimestamp() 
                    });
                } catch (e) { console.error(e); }
            }

            if (reason === 'crash') {
                alert("התנגשות! הסינכרון נקטע.");
            } else {
                alert("טעינה הושלמה ב-100%!");
            }
            window.location.href = 'dashboard.html';
        }

        function animate() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const speedMult = isArachnid ? 1.3 : 1;
            distance += speed * 0.05;
            speed += 0.001;

            player.targetX = lanes[player.lane];
            player.currentX += (player.targetX - player.currentX) * 0.15;

            drawPlayer(player.currentX, player.y);
            spawnItem();
            
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += speed * speedMult;
                item.pulseTime += 0.02;
                const x = lanes[item.lane];

                if (item.type === 'energy') drawEnergyCrystal(x, item.y);
                else drawObstacle(x, item.y, item.pulseTime);

                const dx = Math.abs(x - player.currentX);
                const dy = Math.abs(item.y - player.y);
                
                if (dx < 40 && dy < 40) {
                    if (item.type === 'energy') {
                        playerEnergy = Math.min(100, playerEnergy + 2);
                        items.splice(i, 1);
                        updateUI();
                        if (playerEnergy >= 100) { endGame('full'); return; }
                    } else {
                        endGame('crash'); return;
                    }
                }
                if (item.y > canvas.height + 50) items.splice(i, 1);
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
