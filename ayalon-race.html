<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נתיבי איילון | טעינת סינפסות</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; height: 100%; 
            background: #020617; font-family: 'Assistant', sans-serif;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: url('https://res.cloudinary.com/dxygefiai/image/upload/v1777200152/Gemini_Generated_Image_zg6xdizg6xdizg6x_xahmo1.png') no-repeat center center;
            background-size: cover;
        }
        canvas { display: block; }
        .ui-overlay {
            position: absolute; top: 20px; left: 0; right: 0;
            display: flex; justify-content: space-between; padding: 0 20px;
            pointer-events: none; z-index: 10;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 10px 20px; border-radius: 15px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }
        .energy-bar-bg { width: 150px; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); }
        #energy-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); transition: width 0.3s; box-shadow: 0 0 10px #22c55e; }
        
        #start-screen {
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(4px);
        }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.7); }
        .btn-start {
            background: rgba(59, 130, 246, 0.1); color: white; padding: 15px 40px; border-radius: 50px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; border: 2px solid #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transition: all 0.2s ease-in-out;
        }
        .btn-start:hover { background: #3b82f6; box-shadow: 0 0 30px #3b82f6; transform: scale(1.05); }
        
        #quest-progress-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 250px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-screen">
            <h1 class="text-5xl font-black text-white italic mb-4 text-center neon-text tracking-tighter">TLV<span class="text-blue-400">2099</span></h1>
            <p class="text-2xl font-bold text-white mb-6 text-center neon-text">נתיבי איילון: סינכרון אנרגיה</p>
            <p id="quest-brief" class="text-yellow-400 font-bold mb-4 hidden">🎯 משימה פעילה: צבור מרחק לבונוס ענק!</p>
            <p class="text-slate-400 mb-8 text-center px-10 max-w-lg leading-relaxed">סוכן, המערכות שלך בשפל. רכב על ה<span class="text-blue-400 font-bold">סייבר-בייק</span> בנתיבים המוצפים. אסוף <span class="text-cyan-400 font-bold">קריסטלי דאטה</span> כדי להיטען (+2% HP), והתחמק מ<span class="text-red-500 font-bold">שדות השיבוש</span> האדומים.</p>
            <button id="start-btn" class="btn-start uppercase text-xs">אשר התחברות לסימולציה</button>
        </div>

        <div class="ui-overlay">
            <div class="glass-panel">
                <div class="text-[9px] text-blue-400 font-bold uppercase tracking-widest italic">סטטוס ביו-סוללה</div>
                <div class="text-3xl font-black italic text-white neon-text"><span id="energy-val">0</span>%</div>
                <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            </div>
            
            <div id="quest-progress-panel" class="glass-panel hidden">
                <div class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest italic">התקדמות משימה</div>
                <div id="quest-meters" class="text-xl font-black text-white italic">0 / 0</div>
            </div>

            <div class="glass-panel text-right">
                <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest italic">מרחק סינכרון</div>
                <div id="distance-val" class="text-3xl font-black italic text-white neon-text">0<span class="text-xs">m</span></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, increment, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let playerEnergy = 0;
        let distance = 0;
        let userDocRef = null;
        let items = [];
        let speed = 8;
        const lanes = [];
        let playerData = null;

        const player = { lane: 1, targetX: 0, currentX: 0, y: 0, radius: 25 };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userDocRef = doc(db, "players", user.uid);
                const snap = await getDoc(userDocRef);
                if (snap.exists()) {
                    playerData = snap.data();
                    playerEnergy = playerData.energy || 0;
                    updateUI();
                    checkActiveQuest();
                }
            } else { window.location.href = 'index.html'; }
        });

        function checkActiveQuest() {
            if (playerData.activeQuest && playerData.activeQuest.type === 3 && playerData.activeQuest.status === 'open') {
                document.getElementById('quest-brief').classList.remove('hidden');
                document.getElementById('quest-progress-panel').classList.remove('hidden');
                document.getElementById('quest-meters').innerText = `${Math.floor(playerData.activeQuest.current)} / ${playerData.activeQuest.target}m`;
            }
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            lanes[0] = canvas.width * 0.22;
            lanes[1] = canvas.width * 0.5;
            lanes[2] = canvas.width * 0.78;
            player.currentX = lanes[1];
            player.targetX = lanes[1];
            player.y = canvas.height - 150;
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            if (playerEnergy >= 100) {
                alert("המערכות שלך טעונות לחלוטין (100%). אין צורך בסינכרון.");
                window.location.href = 'dashboard.html';
                return;
            }
            document.getElementById('start-screen').style.display = 'none';
            gameActive = true;
            initCanvas();
            animate();
        });

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ש') && player.lane > 0) player.lane--;
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'ג') && player.lane < 2) player.lane++;
        });

        window.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            const touchX = e.touches[0].clientX;
            if (touchX < canvas.width / 2 && player.lane > 0) player.lane--;
            else if (touchX > canvas.width / 2 && player.lane < 2) player.lane++;
        });

        function spawnItem() {
            if (Math.random() < 0.035) {
                const isObstacle = Math.random() < 0.45;
                items.push({
                    lane: Math.floor(Math.random() * 3),
                    y: -100,
                    type: isObstacle ? 'obstacle' : 'energy',
                    pulseTime: 0
                });
            }
        }

        function updateUI() {
            document.getElementById('energy-val').innerText = Math.floor(playerEnergy);
            document.getElementById('energy-fill').style.width = playerEnergy + "%";
            document.getElementById('distance-val').innerHTML = `${Math.floor(distance)}<span class="text-xs">m</span>`;
            
            // עדכון UI של משימה תוך כדי תנועה
            if (playerData && playerData.activeQuest && playerData.activeQuest.type === 3 && playerData.activeQuest.status === 'open') {
                const totalProgress = (playerData.activeQuest.current || 0) + distance;
                document.getElementById('quest-meters').innerText = `${Math.floor(totalProgress)} / ${playerData.activeQuest.target}m`;
            }
        }

        function drawPlayer(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#ef4444";
            ctx.strokeStyle = "#f87171";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius + 5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.font = "40px serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🏍️", 0, 0);
            ctx.restore();
        }

        function drawEnergyCrystal(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(34, 211, 238, 0.8)";
            ctx.fillStyle = "rgba(34, 211, 238, 0.4)";
            ctx.beginPath();
            ctx.moveTo(0, -15); ctx.lineTo(10, 0); ctx.lineTo(0, 15); ctx.lineTo(-10, 0);
            ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 5; ctx.shadowColor = "#fff"; ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(5, 0); ctx.lineTo(0, 8); ctx.lineTo(-5, 0);
            ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        function drawObstacle(x, y, pulseTime) {
            ctx.save();
            ctx.translate(x, y);
            const alpha = 0.5 + Math.sin(pulseTime * 10) * 0.2;
            ctx.shadowBlur = 25;
            ctx.shadowColor = `rgba(239, 68, 68, ${alpha + 0.2})`;
            const gradient = ctx.createLinearGradient(-30, 0, 30, 0);
            gradient.addColorStop(0, "rgba(239, 68, 68, 0)");
            gradient.addColorStop(0.5, `rgba(239, 68, 68, ${alpha})`);
            gradient.addColorStop(1, "rgba(239, 68, 68, 0)");
            ctx.fillStyle = gradient;
            ctx.fillRect(-35, -5, 70, 10);
            ctx.strokeStyle = `rgba(252, 165, 165, ${alpha + 0.3})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(-35, -5, 70, 10);
            ctx.restore();
        }

        async function endGame(reason) {
            gameActive = false;
            const finalEnergy = Math.min(100, Math.floor(playerEnergy));
            const earnedDistance = Math.floor(distance);
            
            let updates = { 
                energy: finalEnergy, 
                lastHpUpdate: serverTimestamp() 
            };

            let questBonusMsg = "";

            // לוגיקה של משימה 3 (איילון)
            if (playerData.activeQuest && playerData.activeQuest.type === 3 && playerData.activeQuest.status === 'open') {
                let newTotalProgress = (playerData.activeQuest.current || 0) + earnedDistance;
                
                if (newTotalProgress >= playerData.activeQuest.target) {
                    // משימה הושלמה!
                    updates['activeQuest.status'] = 'completed';
                    updates['activeQuest.current'] = newTotalProgress;
                    const rewardCoins = (earnedDistance / 10) * 2; // פי 2 מהפרס הרגיל
                    updates.coins = increment(rewardCoins);
                    questBonusMsg = `והשלמת את המשימה! זכית בבונוס מוגדל של ${Math.floor(rewardCoins)} זוזים.`;
                } else {
                    updates['activeQuest.current'] = newTotalProgress;
                    updates.coins = increment(earnedDistance / 10);
                }
            } else {
                updates.coins = increment(earnedDistance / 10);
            }

            if (userDocRef) {
                try {
                    await updateDoc(userDocRef, updates);
                    
                    // שליחת הודעת סיכום
                    await addDoc(collection(db, "notifications"), {
                        targetUserId: auth.currentUser.uid,
                        title: "סיכום סינכרון איילון",
                        message: `עברת ${earnedDistance} מטרים. ${questBonusMsg}`,
                        type: 'GAME_RESULT',
                        isRead: false,
                        createdAt: serverTimestamp()
                    });

                } catch (e) { console.error("Error updating game data:", e); }
            }

            if (reason === 'crash') {
                alert(`פקסלציה! פגעת בשדה שיבוש. עברת ${earnedDistance} מטרים.`);
            } else {
                alert(`המשימה הסתיימה! הסינכרון הושלם בהצלחה. ${questBonusMsg}`);
            }
            window.location.href = 'dashboard.html';
        }

        function animate() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            distance += speed * 0.05;
            speed += 0.001;

            player.targetX = lanes[player.lane];
            player.currentX += (player.targetX - player.currentX) * 0.18;

            drawPlayer(player.currentX, player.y);

            spawnItem();
            
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += speed;
                item.pulseTime += 0.016;
                const x = lanes[item.lane];

                if (item.type === 'energy') drawEnergyCrystal(x, item.y);
                else drawObstacle(x, item.y, item.pulseTime);

                const dx = Math.abs(x - player.currentX);
                const dy = Math.abs(item.y - player.y);
                
                let collided = false;
                if (item.type === 'energy') {
                    if (dx < 35 && dy < 35) collided = true;
                } else {
                    if (dx < 45 && dy < 30) collided = true;
                }

                if (collided) {
                    if (item.type === 'energy') {
                        playerEnergy = Math.min(100, playerEnergy + 2);
                        items.splice(i, 1);
                        updateUI();
                        if (playerEnergy >= 100) { endGame('full'); return; }
                    } else {
                        endGame('crash'); return;
                    }
                }

                if (item.y > canvas.height + 50) items.splice(i, 1);
            }

            updateUI();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
