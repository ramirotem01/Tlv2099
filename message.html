<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז הודעות | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .msg-card { transition: all 0.3s ease; border-right: 4px solid transparent; }
        .msg-unread { border-right-color: #3b82f6; background: rgba(30, 41, 59, 0.8); }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter neon-text uppercase">In-Box</h1>
                <p id="debug-status" class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">מערכת מוצפנת: ממתין לזיהוי...</p>
            </div>
            <a href="dashboard.html" class="glass p-3 px-6 rounded-2xl font-bold text-xs hover:bg-slate-800 transition-all border border-blue-500/20">חזרה</a>
        </header>

        <div id="messages-container" class="space-y-4">
            <div id="loading" class="text-center py-20">
                <div class="animate-spin text-3xl mb-4 inline-block">🌀</div>
                <p class="text-slate-500 font-bold tracking-widest">סורק תדרים...</p>
            </div>
        </div>

        <div id="no-messages" class="hidden text-center py-20 glass rounded-[2rem] border-dashed border-slate-700">
            <p class="text-slate-500 font-bold uppercase tracking-widest">אין הודעות חדשות</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, query, where, orderBy, getDocs, updateDoc, doc, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        console.log("🚀 Script Started");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("✅ User Authenticated:", user.uid);
                document.getElementById('debug-status').innerText = `מחובר כ: ${user.uid.substring(0,5)}...`;
                loadMessages(user.uid);
            } else {
                console.warn("❌ No User Found - Redirecting");
                window.location.href = 'index.html';
            }
        });

        async function loadMessages(userId) {
            const container = document.getElementById('messages-container');
            const noMsg = document.getElementById('no-messages');
            const loading = document.getElementById('loading');

            try {
                console.log("🔍 Attempting to fetch notifications for:", userId);
                
                // שלב 1: יצירת השאילתה
                // הערה: אם זה נכשל, נסה להסיר זמנית את ה-orderBy כדי לבדוק אם זו בעיית אינדקס
                const notificationsRef = collection(db, "notifications");
                const q = query(
                    notificationsRef,
                    where("targetUserId", "==", userId),
                    orderBy("createdAt", "desc"),
                    limit(20)
                );

                const querySnapshot = await getDocs(q);
                console.log("📊 Snapshot received. Size:", querySnapshot.size);
                
                loading.classList.add('hidden');

                if (querySnapshot.empty) {
                    console.log("❓ Snapshot is empty - no messages found for this user.");
                    noMsg.classList.remove('hidden');
                    container.innerHTML = '';
                    return;
                }

                container.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    const msgId = docSnap.id;
                    console.log("📩 Processing msg:", msgId, msg);

                    const date = msg.createdAt ? new Date(msg.createdAt.toMillis()).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'}) : '--:--';
                    
                    const card = document.createElement('div');
                    card.className = `glass p-5 rounded-2xl msg-card cursor-pointer border border-slate-800 ${!msg.isRead ? 'msg-unread' : 'opacity-80'}`;
                    
                    card.innerHTML = `
                        <div class="flex gap-4 items-start">
                            <div class="text-2xl">${msg.isRead ? '📂' : '✉️'}</div>
                            <div class="flex-1">
                                <div class="flex justify-between mb-1">
                                    <span class="text-[10px] font-black text-blue-400 uppercase">${msg.type || 'SYSTEM'}</span>
                                    <span class="text-[10px] text-slate-500 font-mono">${date}</span>
                                </div>
                                <p class="text-sm font-bold">${msg.text || 'הודעה מוצפנת'}</p>
                            </div>
                        </div>
                    `;

                    card.onclick = () => markAsRead(msgId, card);
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("🔥 CRITICAL ERROR:", err.code, err.message);
                loading.innerHTML = `
                    <div class="bg-red-500/20 p-4 rounded-xl border border-red-500/50 text-right">
                        <p class="text-red-400 font-bold">שגיאת מערכת:</p>
                        <p class="text-[10px] font-mono text-red-300 mt-2">${err.message}</p>
                        <p class="text-[10px] text-slate-400 mt-2">בדוק אם חסר אינדקס ב-Console (F12)</p>
                    </div>
                `;
            }
        }

        async function markAsRead(msgId, element) {
            if (!element.classList.contains('msg-unread')) return; 
            try {
                console.log("📝 Marking as read:", msgId);
                await updateDoc(doc(db, "notifications", msgId), { isRead: true });
                element.classList.remove('msg-unread');
                element.classList.add('opacity-80');
            } catch (err) {
                console.error("❌ Failed to mark as read:", err);
            }
        }
    </script>
</body>
</html>
