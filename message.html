<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז הודעות | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.9), rgba(2, 6, 23, 0.9)), 
                               url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .msg-card { transition: all 0.3s ease; border-right: 4px solid transparent; }
        .msg-unread { border-right-color: #3b82f6; background: rgba(30, 41, 59, 0.8); }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        
        .back-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(30, 41, 59, 0.5));
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            transform: translateX(5px);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter neon-text uppercase">In-Box</h1>
                <p id="debug-status" class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">מערכת מוצפנת: סורק...</p>
            </div>
            <a href="dashboard.html" class="back-btn p-3 px-6 rounded-xl font-black text-[11px] uppercase tracking-tighter flex items-center gap-2">
                <span>חזרה לחמ"ל</span>
                <span class="text-blue-400">◄</span>
            </a>
        </header>

        <div id="messages-container" class="space-y-4">
            <div id="loading" class="text-center py-20">
                <div class="animate-spin text-3xl mb-4 inline-block">🌀</div>
                <p class="text-slate-500 font-bold tracking-widest">סורק תדרים...</p>
            </div>
        </div>

        <div id="no-messages" class="hidden text-center py-20 glass rounded-[2rem] border-dashed border-slate-700">
            <p class="text-slate-500 font-bold uppercase tracking-widest">אין הודעות חדשות</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, query, where, getDocs, updateDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentPlayerLevel = 1;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('debug-status').innerText = `מזהה משתמש: ${user.uid.substring(0,8)}...`;
                
                const playerDoc = await getDoc(doc(db, "players", user.uid));
                if (playerDoc.exists()) {
                    currentPlayerLevel = playerDoc.data().level || 1;
                }

                loadMessages(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadMessages(userId) {
            const container = document.getElementById('messages-container');
            const noMsg = document.getElementById('no-messages');
            const loading = document.getElementById('loading');

            try {
                const notificationsRef = collection(db, "notifications");
                const q = query(notificationsRef, where("targetUserId", "==", userId));

                const querySnapshot = await getDocs(q);
                loading.classList.add('hidden');

                if (querySnapshot.empty) {
                    noMsg.classList.remove('hidden');
                    container.innerHTML = '';
                    return;
                }

                noMsg.classList.add('hidden');
                
                const allMsgs = [];
                querySnapshot.forEach(doc => allMsgs.push({ id: doc.id, ...doc.data() }));
                allMsgs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                container.innerHTML = '';
                allMsgs.forEach((msg) => {
                    let timeDisplay = '--:--';
                    if (msg.createdAt) {
                        const d = msg.createdAt.seconds ? new Date(msg.createdAt.seconds * 1000) : new Date(msg.createdAt);
                        timeDisplay = d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
                    }

                    const displayData = formatMessageBody(msg);

                    const card = document.createElement('div');
                    const isUnread = msg.isRead === false;
                    
                    card.className = `glass p-5 rounded-2xl msg-card cursor-pointer border border-slate-800 ${isUnread ? 'msg-unread' : 'opacity-70'}`;
                    
                    card.innerHTML = `
                        <div class="flex gap-4 items-start">
                            <div class="text-2xl">${isUnread ? displayData.icon : '📂'}</div>
                            <div class="flex-1">
                                <div class="flex justify-between mb-1">
                                    <span class="text-[10px] font-black text-blue-400 uppercase">${msg.type || 'SYSTEM'}</span>
                                    <span class="text-[10px] text-slate-500 font-mono">${timeDisplay}</span>
                                </div>
                                <h3 class="text-sm font-black mb-1 ${isUnread ? 'text-white' : 'text-slate-300'}">${displayData.title}</h3>
                                <p class="text-xs text-slate-400 leading-relaxed">${displayData.body}</p>
                            </div>
                        </div>
                    `;

                    card.onclick = () => markAsRead(msg.id, card);
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("🔥 Error:", err);
                loading.innerHTML = `<p class="text-red-400 font-bold">שגיאה בתקשורת</p>`;
            }
        }

        function formatMessageBody(msg) {
            // חילוץ הטקסט המקורי מהשדה text או message ב-Firestore
            const originalContent = msg.text || msg.message || "";
            
            let title = "הודעה חדשה";
            let body = originalContent || "התקבלה הודעה חדשה במערכת.";
            let icon = '✉️';

            // אם זו הודעת רמה
            if (msg.type === 'LEVEL_UP' || (originalContent && originalContent.includes('רמה'))) {
                icon = '⬆️';
                title = 'בשורות נהדרות!';
                const oldLevel = currentPlayerLevel > 1 ? currentPlayerLevel - 1 : 1;
                // אם יש תוכן מקורי, נציג אותו. אם לא, נציג את הנוסח הקבוע.
                body = originalContent ? originalContent : `הצלחת לעלות שלב מרמה ${oldLevel} לרמה ${currentPlayerLevel}!`;
                
                // הוספת הפירוט המבוקש אם הוא לא קיים בטקסט המקורי
                if (!body.includes('מרמה')) {
                    body = `הצלחת לעלות שלב מרמה ${oldLevel} לרמה ${currentPlayerLevel}! ` + body;
                }
            } 
            // הודעות פרס
            else if (msg.type === 'REWARD' || (originalContent && originalContent.includes('זוזים'))) {
                icon = '💰';
                title = 'תגמול התקבל';
                body = originalContent;
            }
            // הודעות מערכת אחרות
            else {
                title = msg.title || "עדכון מערכת";
                body = originalContent || "אין תוכן להודעה זו.";
            }

            return { title, body, icon };
        }

        async function markAsRead(msgId, element) {
            if (!element.classList.contains('msg-unread')) return;
            try {
                await updateDoc(doc(db, "notifications", msgId), { isRead: true });
                element.classList.remove('msg-unread');
                element.classList.add('opacity-70');
                element.querySelector('.text-2xl').innerText = '📂';
            } catch (err) {
                console.error("❌ Update failed:", err);
            }
        }
    </script>
</body>
</html>
