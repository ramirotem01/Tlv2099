<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז הודעות | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-image: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85)), 
                              url('https://res.cloudinary.com/dxygefiai/image/upload/v1776868529/TLV2099_c7nqzc.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; font-family: 'Assistant', sans-serif; min-height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .msg-card { transition: all 0.3s ease; border-right: 4px solid transparent; }
        .msg-unread { border-right-color: #3b82f6; background: rgba(30, 41, 59, 0.8); }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter neon-text uppercase">Messages</h1>
                <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">תיבת הדואר של הצייד</p>
            </div>
            <a href="dashboard.html" class="glass p-3 px-6 rounded-2xl font-bold text-xs hover:bg-slate-800 transition-all flex items-center gap-2">
                <span>חזרה לחמ"ל</span> 🛰️
            </a>
        </header>

        <div id="messages-container" class="space-y-4">
            <div id="loading" class="text-center py-20">
                <div class="animate-spin text-3xl mb-4">🌀</div>
                <p class="text-slate-500 font-bold">סורק הודעות מוצפנות...</p>
            </div>
            </div>

        <div id="no-messages" class="hidden text-center py-20 glass rounded-[2rem]">
            <p class="text-slate-500 font-bold">אין הודעות חדשות במערכת.</p>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { collection, query, where, orderBy, limit, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadMessages(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        async function loadMessages(userId) {
            const container = document.getElementById('messages-container');
            const noMsg = document.getElementById('no-messages');
            const loading = document.getElementById('loading');

            try {
                // משיכת 10 הודעות אחרונות
                const q = query(
                    collection(db, "notifications"),
                    where("targetUserId", "==", userId),
                    orderBy("createdAt", "desc"),
                    limit(10)
                );

                const querySnapshot = await getDocs(q);
                loading.classList.add('hidden');

                if (querySnapshot.empty) {
                    noMsg.classList.remove('hidden');
                    return;
                }

                container.innerHTML = '';
                querySnapshot.forEach((document) => {
                    const msg = document.data();
                    const msgId = document.id;
                    const date = new Date(msg.createdAt).toLocaleDateString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    
                    const card = document.createElement('div');
                    card.className = `glass p-5 rounded-2xl msg-card cursor-pointer ${!msg.isRead ? 'msg-unread' : ''}`;
                    
                    // אייקון מעטפה לפי מצב קריאה
                    const icon = msg.isRead ? '📂' : '📧';
                    
                    let contentHtml = "";
                    if (msg.type === 'pvp_attack') {
                        const win = msg.result === 'win';
                        contentHtml = `
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-black ${win ? 'text-green-400' : 'text-red-400'} uppercase">${win ? 'ניצחת בהגנה! 🛡️' : 'הפסדת בקרב! 💀'}</span>
                                <span class="text-[10px] text-slate-500 font-mono">${date}</span>
                            </div>
                            <p class="text-sm font-bold mb-2">הצייד <span class="text-blue-400">${msg.attackerName}</span> תקף אותך!</p>
                            <div class="grid grid-cols-2 gap-2 text-[11px] bg-slate-950/40 p-3 rounded-xl border border-slate-800">
                                <div>הנזק שספגת: <span class="text-red-400">${msg.damageReceived}</span></div>
                                <div>הנזק שהחזרת: <span class="text-blue-400">${msg.damageDealt}</span></div>
                                <div class="col-span-2 pt-1 border-t border-slate-800 mt-1">
                                    ${win ? `הרווחת מהקהל: <span class="text-yellow-400">${msg.reward} זוזים</span>` : `איבדת בקרב: <span class="text-red-500">${msg.lostCoins} זוזים</span>`}
                                </div>
                            </div>
                        `;
                    } else if (msg.type === 'level_up') {
                        contentHtml = `
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-black text-yellow-400 uppercase text-shadow-sm">עליית דרגה! ✨</span>
                                <span class="text-[10px] text-slate-500 font-mono">${date}</span>
                            </div>
                            <p class="text-sm font-bold">מזל טוב! הגעת לרמה <span class="text-yellow-400 text-lg">${msg.newLevel}</span>.</p>
                            <p class="text-[10px] text-slate-400">החמ"ל שלח לך בונוס אספקה לתיק.</p>
                        `;
                    }

                    card.innerHTML = `
                        <div class="flex gap-4">
                            <div class="text-2xl pt-1">${icon}</div>
                            <div class="flex-1">${contentHtml}</div>
                        </div>
                    `;

                    card.onclick = () => markAsRead(msgId, card);
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("Error loading messages:", err);
                loading.innerHTML = `<p class="text-red-400">שגיאה בטעינת הודעות. וודא שקיים אינדקס ב-Firestore.</p>`;
            }
        }

        async function markAsRead(msgId, element) {
            try {
                await updateDoc(doc(db, "notifications", msgId), {
                    isRead: true
                });
                element.classList.remove('msg-unread');
                // עדכון האייקון לתיקייה פתוחה
                const iconSpan = element.querySelector('.text-2xl');
                if (iconSpan) iconSpan.innerText = '📂';
            } catch (err) {
                console.error("Error marking as read:", err);
            }
        }
    </script>
</body>
</html>
