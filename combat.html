<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זירת לחימה | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Assistant', sans-serif; overflow: hidden; height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hp-bar { transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        }
        .enemy-glow { filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.4)); }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 md:p-8">

    <div id="enemy-area" class="w-full max-w-lg text-center mt-4">
        <div class="mb-2">
            <h2 id="enemy-name" class="text-3xl font-black italic text-red-500 tracking-widest uppercase">סורק...</h2>
            <div id="enemy-level" class="text-slate-500 text-[10px] font-black tracking-[0.3em]">LEVEL --</div>
        </div>
        
        <div class="relative w-40 h-40 md:w-52 md:h-52 mx-auto mb-6 bg-slate-900/40 rounded-full flex items-center justify-center border border-red-900/20 shadow-2xl overflow-hidden">
            <span id="enemy-icon" class="text-7xl md:text-8xl enemy-glow">👾</span>
        </div>

        <div class="w-full max-w-md mx-auto">
            <div class="w-full bg-slate-950 h-3 rounded-full border border-slate-800 p-0.5 overflow-hidden">
                <div id="enemy-hp-bar" class="hp-bar bg-red-600 h-full rounded-full" style="width: 100%"></div>
            </div>
            <div id="enemy-hp-text" class="text-[10px] mt-1.5 font-bold text-slate-500 uppercase tracking-tighter">--/-- HP</div>
        </div>
    </div>

    <div id="battle-log" class="glass w-full max-w-xl p-5 rounded-[2rem] h-32 overflow-y-auto text-sm border border-slate-800 my-4 font-mono">
        <p class="text-blue-500 font-bold">► מערכת קרב מאותחלת...</p>
    </div>

    <div class="w-full max-w-xl bg-slate-900/50 p-6 rounded-[2.5rem] border border-slate-800">
        <div class="flex justify-between items-end mb-5">
            <div class="flex flex-col gap-1">
                <span id="player-class-name" class="text-[10px] font-black text-blue-500 uppercase tracking-widest italic">טוען לוחם...</span>
                <div class="w-48 bg-slate-950 h-2.5 rounded-full border border-slate-800 p-0.5">
                    <div id="player-hp-bar" class="hp-bar bg-green-500 h-full rounded-full" style="width: 100%"></div>
                </div>
            </div>
            <div class="text-right">
                <span id="player-hp-text" class="text-3xl font-black italic">--</span>
                <span id="player-max-hp-display" class="text-slate-600 text-xs font-bold uppercase italic">/-- %</span>
            </div>
        </div>

        <div id="action-buttons" class="grid grid-cols-2 gap-3"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, increment, serverTimestamp, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const itemDatabase = {
            'basic_attack': { name: 'מכה בסיסית', baseAtk: 15, icon: '👊' },
            'pistol_nemesis': { name: 'ירי נמסיס', baseAtk: 30, icon: '🔫' },
            'katana_thermal': { name: 'להב טרמי', baseAtk: 50, icon: '⚔️' },
            'nano_boost': { name: 'ננו-בוסט', healPower: 40, icon: '💊', type: 'heal' }
        };

        let player = { hp: 100, maxHp: 100, inventory: [], isMyTurn: true, stats: { atkMod: 1, defMod: 1, evaMod: 0.1 }, username: "" };
        let enemy = { id: null, name: "", hp: 0, maxHp: 0, atk: 0, level: 1, reward: 0, isPvP: false };
        let damageStats = { dealt: 0, received: 0 };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            
            const battleData = JSON.parse(localStorage.getItem('currentBattle'));
            if (!battleData) { window.location.href = 'map.html'; return; }

            enemy = {
                id: battleData.opponentId || null,
                name: battleData.name,
                level: battleData.level,
                reward: battleData.reward,
                isPvP: !!battleData.isPvP,
                maxHp: 50 + (battleData.level * 35),
                hp: 50 + (battleData.level * 35),
                atk: 15 + (battleData.level * 6)
            };
            
            document.getElementById('enemy-name').innerText = enemy.name;
            document.getElementById('enemy-level').innerText = `LEVEL ${enemy.level}`;

            if (battleData.img) {
                document.getElementById('enemy-icon').parentElement.innerHTML = `<img src="${battleData.img}" class="w-full h-full object-cover rounded-full border-4 border-red-900/30 enemy-glow">`;
            }

            const docSnap = await getDoc(doc(db, "players", user.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                player.username = data.username;
                player.stats = data.stats || player.stats;
                player.maxHp = 100 + ((data.level || 1) * 15);
                player.hp = (data.energy !== undefined) ? data.energy : player.maxHp;
                player.inventory = data.inventory || [];
                
                renderActions();
                updateUI();
                addLog(`מערכת זיהתה: ${enemy.name}. התחל סריקה טקטית.`, 'text-red-500 font-bold');
            }
        });

        window.handleAction = function(itemId) {
            if (!player.isMyTurn || player.hp <= 0) return;
            const item = itemDatabase[itemId] || itemDatabase['basic_attack'];
            player.isMyTurn = false;

            if (item.type === 'heal') {
                const heal = Math.floor(item.healPower * (player.stats.defMod || 1));
                player.hp = Math.min(player.maxHp, player.hp + heal);
                addLog(`שימוש ב${item.name}: +${heal} HP`, 'text-green-400 font-bold');
            } else {
                const res = calculateDamage(item.baseAtk, player.stats.atkMod, true);
                if (res.val > 0) {
                    enemy.hp -= res.val;
                    damageStats.dealt += res.val;
                    addLog(`התקפת עם ${item.name}: ${res.type === 'CRIT' ? '⚡ ' : ''}${res.val} נזק`, 'text-white font-black italic');
                    triggerShake('enemy-area');
                }
            }

            updateUI();
            if (enemy.hp <= 0) return processVictory();
            setTimeout(enemyTurn, 800);
        }

        function enemyTurn() {
            if (enemy.hp <= 0) return;
            const res = calculateDamage(enemy.atk, 1, false);
            
            if (res.type !== 'MISS') {
                player.hp -= res.val;
                damageStats.received += res.val;
                addLog(`${enemy.name} פגע בך: ${res.val} נזק`, 'text-red-400 font-bold');
                triggerShake('player-hp-bar');
            } else {
                addLog(`זריזות הלוחם! ${enemy.name} פספס!`, 'text-blue-400 font-bold');
            }

            updateUI();
            if (player.hp <= 0) processDefeat();
            else player.isMyTurn = true;
        }

        async function processVictory() {
            addLog(`🏆 ניצחון! נאספו ${enemy.reward} זוזים.`, 'text-yellow-400 font-black italic');
            
            const myUpdates = {
                coins: increment(enemy.reward),
                xp: increment(enemy.level * 2),
                energy: Math.max(0, Math.floor(player.hp)),
                lastHpUpdate: serverTimestamp()
            };

            await updateDoc(doc(db, "players", auth.currentUser.uid), myUpdates);

            if (enemy.isPvP && enemy.id) {
                await updateDoc(doc(db, "players", enemy.id), {
                    energy: 0,
                    coins: increment(-Math.floor(enemy.reward * 0.1)),
                    lastFoughtBy: auth.currentUser.uid
                });

                await addDoc(collection(db, "notifications"), {
                    targetUserId: enemy.id,
                    type: "pvp_attack",
                    attackerName: player.username,
                    result: "loss",
                    damageDealt: damageStats.received,
                    damageReceived: damageStats.dealt,
                    lostCoins: Math.floor(enemy.reward * 0.1),
                    isRead: false,
                    createdAt: Date.now()
                });
            }

            setTimeout(() => window.location.href = 'dashboard.html', 2500);
        }

        async function processDefeat() {
            addLog(`💀 תבוסה... המערכות קרסו.`, 'text-red-600 font-black');
            
            // עדכון UI מיידי
            player.hp = 0;
            updateUI();
            document.getElementById('action-buttons').innerHTML = '<div class="text-red-500 font-bold animate-pulse text-center w-full">המערכת במצב חירום - מתנתק...</div>';

            try {
                // עדכון DB וסימון זמן לתחילת ריפוי (Regen)
                await updateDoc(doc(db, "players", auth.currentUser.uid), { 
                    energy: 0,
                    lastHpUpdate: serverTimestamp() 
                });

                if (enemy.isPvP && enemy.id) {
                    await addDoc(collection(db, "notifications"), {
                        targetUserId: enemy.id,
                        type: "pvp_attack",
                        attackerName: player.username,
                        result: "win",
                        damageDealt: damageStats.received,
                        damageReceived: damageStats.dealt,
                        reward: 50,
                        isRead: false,
                        createdAt: Date.now()
                    });
                    
                    await updateDoc(doc(db, "players", enemy.id), {
                        lastFoughtBy: auth.currentUser.uid
                    });
                }
            } catch (e) { console.error(e); }

            setTimeout(() => window.location.href = 'dashboard.html', 2000);
        }

        function calculateDamage(base, modifier, isPlayerAttacking) {
            const variance = (Math.random() * 0.3) + 0.85;
            let finalDmg = base * (modifier || 1) * variance;
            if (!isPlayerAttacking) {
                if (Math.random() < (player.stats.evaMod || 0.1)) return { val: 0, type: 'MISS' };
                finalDmg /= (player.stats.defMod || 1);
            }
            return { val: Math.floor(finalDmg), type: Math.random() > 0.9 ? 'CRIT' : 'HIT' };
        }

        function renderActions() {
            const container = document.getElementById('action-buttons');
            container.innerHTML = '';
            container.appendChild(createActionBtn('basic_attack'));
            player.inventory.forEach(itemId => {
                if (itemDatabase[itemId]) container.appendChild(createActionBtn(itemId));
            });
        }

        function createActionBtn(itemId) {
            const item = itemDatabase[itemId];
            const btn = document.createElement('button');
            btn.className = "glass p-4 rounded-2xl font-black text-xs hover:bg-slate-800 border border-slate-700 uppercase italic transition-all active:scale-95 flex items-center justify-center gap-2";
            btn.innerHTML = `<span>${item.icon}</span> ${item.name}`;
            btn.onclick = () => handleAction(itemId);
            return btn;
        }

        function updateUI() {
            document.getElementById('enemy-hp-bar').style.width = Math.max(0, (enemy.hp / enemy.maxHp * 100)) + "%";
            document.getElementById('enemy-hp-text').innerText = `${Math.max(0, Math.floor(enemy.hp))}/${enemy.maxHp} HP`;
            document.getElementById('player-hp-bar').style.width = Math.max(0, (player.hp / player.maxHp * 100)) + "%";
            document.getElementById('player-hp-text').innerText = Math.max(0, Math.floor(player.hp));
            document.getElementById('player-max-hp-display').innerText = `/${player.maxHp} HP`;
        }

        function addLog(msg, colorClass) {
            const logBox = document.getElementById('battle-log');
            logBox.innerHTML += `<p class="${colorClass}">► ${msg}</p>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function triggerShake(id) {
            const el = document.getElementById(id);
            if(el) { el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400); }
        }
    </script>
</body>
</html>
