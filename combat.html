<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זירת לחימה | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Assistant', sans-serif; overflow: hidden; height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hp-bar { transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        }
        .enemy-glow { filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.4)); }
        .potion-btn { border-color: rgba(34, 211, 238, 0.3) !important; color: #22d3ee !important; }
        .weapon-btn { border-color: rgba(59, 130, 246, 0.5) !important; background: rgba(59, 130, 246, 0.2) !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        
        .action-btn {
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.1;
            padding: 8px 4px;
        }
        /* אפקט בחירה */
        .action-btn:active { transform: scale(0.95); }
        .disabled-btn { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 md:p-8">

    <div id="enemy-area" class="w-full max-w-lg text-center mt-4">
        <div class="mb-2">
            <h2 id="enemy-name" class="text-3xl font-black italic text-red-500 tracking-widest uppercase">סורק...</h2>
            <div id="enemy-level" class="text-slate-500 text-[10px] font-black tracking-[0.3em]">LEVEL --</div>
        </div>
        
        <div class="relative w-36 h-36 md:w-48 md:h-48 mx-auto mb-4 bg-slate-900/40 rounded-full flex items-center justify-center border border-red-900/20 shadow-2xl overflow-hidden">
            <span id="enemy-icon" class="text-7xl md:text-8xl enemy-glow">👾</span>
        </div>

        <div class="w-full max-w-md mx-auto px-4">
            <div class="w-full bg-slate-950 h-3 rounded-full border border-slate-800 p-0.5 overflow-hidden">
                <div id="enemy-hp-bar" class="hp-bar bg-red-600 h-full rounded-full" style="width: 100%"></div>
            </div>
            <div id="enemy-hp-text" class="text-[10px] mt-1.5 font-bold text-slate-500 uppercase tracking-tighter">--/-- HP</div>
        </div>
    </div>

    <div id="battle-log" class="glass w-full max-w-xl p-5 rounded-[2rem] h-32 overflow-y-auto text-[11px] border border-slate-800 my-2 font-mono">
        <p class="text-blue-500 font-bold italic">► אתחול פרוטוקול לחימה...</p>
    </div>

    <div class="w-full max-w-xl bg-slate-900/50 p-6 rounded-[2.5rem] border border-slate-800 mb-4">
        <div class="flex justify-between items-end mb-4">
            <div class="flex flex-col gap-1">
                <span id="player-class-name" class="text-[10px] font-black text-blue-500 uppercase tracking-widest italic">מצב שחקן</span>
                <div class="w-40 bg-slate-950 h-2.5 rounded-full border border-slate-800 p-0.5">
                    <div id="player-hp-bar" class="hp-bar bg-green-500 h-full rounded-full" style="width: 100%"></div>
                </div>
            </div>
            <div class="text-right leading-none">
                <span id="player-hp-text" class="text-3xl font-black italic">--</span>
                <span class="text-slate-600 text-xs font-bold uppercase italic">% ENERGY</span>
            </div>
        </div>

        <div id="action-buttons" class="grid grid-cols-3 gap-2 overflow-y-auto max-h-48 p-1">
            </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const itemDatabase = {
            'basic_attack': { name: 'מכה בסיסית', baseAtk: 15, icon: '👊' },
            'pistol_nemesis': { name: 'אקדח נמסיס', baseAtk: 30, icon: '🔫' },
            'katana_thermal': { name: 'קטאנה טרמית', baseAtk: 45, icon: '⚔️' },
            'fire_sword': { name: 'חרב גיהנום', baseAtk: 90, icon: '🔥' },
            'health_small': { name: 'שיקוי חיים קטן', heal: 25, icon: '🧪', type: 'potion' },
            'health_large': { name: 'שיקוי חיים גדול', heal: 50, icon: '🧪', type: 'potion' },
            'atk_small': { name: 'שיקוי כוח קטן', buffAtk: 1.15, icon: '🍷', type: 'potion' },
            'atk_large': { name: 'שיקוי כוח גדול', buffAtk: 1.35, icon: '🍷', type: 'potion' },
            'def_small': { name: 'שיקוי מגן קטן', buffDef: 0.85, icon: '🍶', type: 'potion' },
            'def_large': { name: 'שיקוי מגן גדול', buffDef: 0.70, icon: '🍶', type: 'potion' }
        };

        let player = { 
            hp: 100, maxHp: 100, inventory: [], potions: [], equippedWeapon: null, 
            isMyTurn: true, stats: { atkMod: 1, defMod: 1, evaMod: 0.1 } 
        };
        let enemy = { id: null, name: "", hp: 0, maxHp: 0, atk: 0, level: 1, reward: 0, isPvP: false };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            
            const battleData = JSON.parse(localStorage.getItem('currentBattle'));
            if (!battleData) { window.location.href = 'dashboard.html'; return; }

            // הגדרת אויב
            enemy = {
                id: battleData.opponentId || null,
                name: battleData.name,
                level: battleData.level || 1,
                reward: battleData.reward || 0,
                maxHp: 50 + (battleData.level * 35),
                hp: 50 + (battleData.level * 35),
                atk: 15 + (battleData.level * 6),
                isPvP: battleData.isPvP || false
            };
            
            // עדכון UI ראשוני לאויב
            document.getElementById('enemy-name').innerText = enemy.name;
            document.getElementById('enemy-level').innerText = `LEVEL ${enemy.level}`;
            if (battleData.img) {
                document.getElementById('enemy-icon').parentElement.innerHTML = `<img src="${battleData.img}" class="w-full h-full object-cover rounded-full border-4 border-red-900/30 enemy-glow">`;
            }

            // טעינת שחקן
            const docSnap = await getDoc(doc(db, "players", user.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                player.maxHp = 100; // ב-PCS365 זה באחוזים (0-100)
                player.hp = (data.energy !== undefined) ? data.energy : 100;
                player.inventory = data.inventory || [];
                player.potions = data.potions || [];
                player.equippedWeapon = data.equippedWeapon || null;
                
                renderActions();
                updateUI();
                addLog(`מטרה זוהתה: ${enemy.name}.`, 'text-red-500 font-bold');
            }
        });

        window.handleAction = async function(itemId, isPotion = false, potionIndex = -1) {
            if (!player.isMyTurn || player.hp <= 0 || enemy.hp <= 0) return;
            
            const item = itemDatabase[itemId];
            if (!item) return;

            player.isMyTurn = false;
            toggleButtons(false); // נטרול כפתורים בזמן האנימציה

            if (isPotion) {
                if (item.heal) {
                    const healAmount = item.heal;
                    player.hp = Math.min(100, player.hp + healAmount);
                    addLog(`שימוש ב${item.name}: +${healAmount}% אנרגיה`, 'text-cyan-400 font-black');
                }
                if (item.buffAtk) { player.stats.atkMod *= item.buffAtk; addLog(`${item.name}: מערכות נשק התחזקו!`, 'text-orange-400'); }
                if (item.buffDef) { player.stats.defMod *= item.buffDef; addLog(`${item.name}: הגנה שודרגה!`, 'text-blue-400'); }

                player.potions.splice(potionIndex, 1);
                await updateDoc(doc(db, "players", auth.currentUser.uid), { potions: player.potions });
                renderActions();
            } else {
                const res = calculateDamage(item.baseAtk, player.stats.atkMod, true);
                enemy.hp -= res.val;
                addLog(`${item.name}: ${res.val} נזק`, 'text-white font-bold italic');
                triggerShake('enemy-area');
            }

            updateUI();

            if (enemy.hp <= 0) {
                setTimeout(processVictory, 600);
            } else {
                setTimeout(enemyTurn, 1000);
            }
        }

        function enemyTurn() {
            if (enemy.hp <= 0) return;
            
            const res = calculateDamage(enemy.atk, player.stats.defMod, false);
            
            if (res.type !== 'MISS') {
                // המרת נזק האויב לאחוזים (כי האנרגיה של השחקן היא 0-100)
                const damagePercent = Math.max(5, Math.floor(res.val / 2.5)); 
                player.hp -= damagePercent;
                addLog(`${enemy.name}: מתקיף וגורם ל-${damagePercent}% נזק`, 'text-red-400');
                triggerShake('player-hp-bar');
            } else {
                addLog(`התחמקת מהמתקפה!`, 'text-blue-400 font-bold');
            }

            updateUI();

            if (player.hp <= 0) {
                player.hp = 0;
                updateUI();
                setTimeout(processDefeat, 600);
            } else {
                player.isMyTurn = true;
                toggleButtons(true);
            }
        }

        function calculateDamage(base, modifier, isPlayerAttacking) {
            const variance = (Math.random() * 0.2) + 0.9;
            let finalDmg = base * (modifier || 1) * variance;
            
            // בדיקת התחמקות של השחקן בלבד
            if (!isPlayerAttacking && Math.random() < player.stats.evaMod) return { val: 0, type: 'MISS' };
            
            return { val: Math.floor(finalDmg), type: 'HIT' };
        }

        function renderActions() {
            const container = document.getElementById('action-buttons');
            container.innerHTML = '';
            
            // נשק מצויד (או מכה בסיסית)
            if (player.equippedWeapon && itemDatabase[player.equippedWeapon]) {
                container.appendChild(createActionBtn(player.equippedWeapon, false, -1, true));
            } else {
                container.appendChild(createActionBtn('basic_attack', false));
            }

            // שיקויים
            player.potions.forEach((itemId, index) => {
                if (itemDatabase[itemId]) {
                    container.appendChild(createActionBtn(itemId, true, index));
                }
            });
        }

        function createActionBtn(itemId, isPotion, index = -1, isEquipped = false) {
            const item = itemDatabase[itemId];
            const btn = document.createElement('button');
            let extraClass = isPotion ? "potion-btn" : "border-slate-700 text-slate-300";
            if (isEquipped) extraClass = "weapon-btn text-white";
            
            btn.className = `glass action-btn w-full rounded-xl font-bold text-[10px] hover:bg-slate-800 border transition-all ${extraClass}`;
            btn.innerHTML = `
                <span class="text-xl mb-1">${item.icon}</span>
                <span class="w-full px-1">${item.name}</span>
                ${isEquipped ? '<span class="text-[7px] text-blue-400 mt-1 font-black opacity-80">מצויד</span>' : ''}
            `;
            
            btn.onclick = () => handleAction(itemId, isPotion, index);
            return btn;
        }

        function toggleButtons(enabled) {
            const btns = document.querySelectorAll('.action-btn');
            btns.forEach(b => enabled ? b.classList.remove('disabled-btn') : b.classList.add('disabled-btn'));
        }

        function updateUI() {
            // אויב
            const enemyHpPercent = Math.max(0, (enemy.hp / enemy.maxHp * 100));
            document.getElementById('enemy-hp-bar').style.width = enemyHpPercent + "%";
            document.getElementById('enemy-hp-text').innerText = `${Math.max(0, Math.floor(enemy.hp))}/${enemy.maxHp} HP`;
            
            // שחקן
            document.getElementById('player-hp-bar').style.width = Math.max(0, player.hp) + "%";
            document.getElementById('player-hp-text').innerText = Math.max(0, Math.floor(player.hp));
        }

        async function processVictory() {
            addLog(`🏆 המטרה הושמדה! +${enemy.reward} זוזים`, 'text-yellow-400 font-black italic text-sm');
            
            try {
                // עדכון שחקן - ניצחון
                await updateDoc(doc(db, "players", auth.currentUser.uid), {
                    coins: increment(enemy.reward),
                    xp: increment(enemy.level * 5),
                    energy: Math.floor(player.hp),
                    lastHpUpdate: serverTimestamp()
                });

                // אם זה PvP, לעדכן את המפסיד
                if (enemy.isPvP && enemy.id) {
                    await updateDoc(doc(db, "players", enemy.id), {
                        energy: 0,
                        lastAmbushDate: serverTimestamp()
                    });
                }
            } catch (e) { console.error(e); }

            setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        }

        async function processDefeat() {
            addLog(`💀 קריסת מערכות. נסוג מהזירה...`, 'text-red-600 font-black italic text-sm');
            
            try {
                // עדכון שחקן - תבוסה
                await updateDoc(doc(db, "players", auth.currentUser.uid), { 
                    energy: 0, 
                    lastHpUpdate: serverTimestamp() 
                });

                // אם זה PvP, המנצח (האויב) נשאר עם מה שנשאר לו
                if (enemy.isPvP && enemy.id) {
                    const enemyEnergyPercent = Math.max(5, Math.floor((enemy.hp / enemy.maxHp) * 100));
                    await updateDoc(doc(db, "players", enemy.id), {
                        energy: enemyEnergyPercent,
                        lastAmbushDate: serverTimestamp()
                    });
                }
            } catch (e) { console.error(e); }

            setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
        }

        function addLog(msg, colorClass) {
            const logBox = document.getElementById('battle-log');
            logBox.innerHTML += `<p class="${colorClass} mb-1">► ${msg}</p>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function triggerShake(id) {
            const el = document.getElementById(id);
            if(el) { el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400); }
        }
    </script>
</body>
</html>
