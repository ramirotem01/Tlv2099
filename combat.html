<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זירת לחימה | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Assistant', sans-serif; overflow: hidden; height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hp-bar { transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        }
        .enemy-glow { filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.4)); }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 md:p-8">

    <div id="enemy-area" class="w-full max-w-lg text-center mt-4">
        <div class="mb-2">
            <h2 id="enemy-name" class="text-3xl font-black italic text-red-500 tracking-widest uppercase">סורק...</h2>
            <div id="enemy-level" class="text-slate-500 text-[10px] font-black tracking-[0.3em]">LEVEL --</div>
        </div>
        
        <div class="relative w-40 h-40 md:w-52 md:h-52 mx-auto mb-6 bg-slate-900/40 rounded-full flex items-center justify-center border border-red-900/20 shadow-2xl">
            <span id="enemy-icon" class="text-7xl md:text-8xl enemy-glow">👾</span>
        </div>

        <div class="w-full max-w-md mx-auto">
            <div class="w-full bg-slate-950 h-3 rounded-full border border-slate-800 p-0.5 overflow-hidden">
                <div id="enemy-hp-bar" class="hp-bar bg-red-600 h-full rounded-full" style="width: 100%"></div>
            </div>
            <div id="enemy-hp-text" class="text-[10px] mt-1.5 font-bold text-slate-500 uppercase tracking-tighter">--/-- HP</div>
        </div>
    </div>

    <div id="battle-log" class="glass w-full max-w-xl p-5 rounded-[2rem] h-32 overflow-y-auto text-sm border border-slate-800 my-4 font-mono">
        <p class="text-blue-500 font-bold">► מערכת קרב מאותחלת...</p>
    </div>

    <div class="w-full max-w-xl bg-slate-900/50 p-6 rounded-[2.5rem] border border-slate-800">
        <div class="flex justify-between items-end mb-5">
            <div class="flex flex-col gap-1">
                <span id="player-class-name" class="text-[10px] font-black text-blue-500 uppercase tracking-widest italic">טוען לוחם...</span>
                <div class="w-48 bg-slate-950 h-2.5 rounded-full border border-slate-800 p-0.5">
                    <div id="player-hp-bar" class="hp-bar bg-green-500 h-full rounded-full" style="width: 100%"></div>
                </div>
            </div>
            <div class="text-right">
                <span id="player-hp-text" class="text-3xl font-black italic">--</span>
                <span id="player-max-hp-display" class="text-slate-600 text-xs font-bold uppercase italic">/-- %</span>
            </div>
        </div>

        <div id="action-buttons" class="grid grid-cols-2 gap-3">
            </div>
    </div>

   <script type="module">
    // ... Imports הקיימים שלך ...
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ... משתני player ו-enemy הקיימים ...

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'index.html'; return; }
        
        const battleData = JSON.parse(localStorage.getItem('currentBattle'));
        if (!battleData) { window.location.href = 'map.html'; return; }

        // הגדרת אויב מהנתונים שהגיעו מהמפה (וה-DB)
        enemy.name = battleData.name;
        enemy.level = battleData.level;
        enemy.reward = battleData.reward;
        enemy.maxHp = 50 + (enemy.level * 35);
        enemy.hp = enemy.maxHp;
        enemy.atk = 15 + (enemy.level * 6);
        
        document.getElementById('enemy-name').innerText = enemy.name;
        document.getElementById('enemy-level').innerText = `LEVEL ${enemy.level}`;

        // הזרקת התמונה מה-DB במקום האייקון
        const enemyIcon = document.getElementById('enemy-icon');
        if (battleData.img) {
            // הפיכת הדיב שמכיל את האייקון למכולה של תמונה
            enemyIcon.parentElement.innerHTML = `
                <img src="${battleData.img}" 
                     class="w-full h-full object-cover rounded-full border-4 border-red-900/30 enemy-glow"
                     alt="${enemy.name}">
            `;
        }

        // שליפת נתוני לוחם מה-DB
        const docSnap = await getDoc(doc(db, "players", user.uid));
        if (docSnap.exists()) {
            const data = docSnap.data();
            if(data.stats) player.stats = data.stats;
            if(data.heroName) document.getElementById('player-class-name').innerText = data.heroName;

            const pLevel = data.level || 1;
            player.maxHp = 100 + (pLevel * 15);
            player.hp = (data.energy !== undefined) ? data.energy : player.maxHp;
            player.inventory = data.inventory || [];
            
            renderActions();
            updateUI();
            addLog(`מערכת זיהתה: ${enemy.name}. התחל סריקה טקטית.`, 'text-red-500 font-bold');
        }
    });

    // ... שאר הפונקציות (calculateDamage, enemyTurn וכו') ללא שינוי ...
</script>
</body>
</html>
