<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זירת לחימה | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            color: white; font-family: 'Assistant', sans-serif; overflow: hidden; height: 100vh;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .hp-bar { transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shake { animation: shake 0.4s both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
        }
        .enemy-glow { filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.4)); }
    </style>
</head>
<body class="flex flex-col items-center justify-between p-4 md:p-8">

    <div id="enemy-area" class="w-full max-w-lg text-center mt-4">
        <div class="mb-2">
            <h2 id="enemy-name" class="text-3xl font-black italic text-red-500 tracking-widest uppercase">סורק...</h2>
            <div id="enemy-level" class="text-slate-500 text-[10px] font-black tracking-[0.3em]">LEVEL --</div>
        </div>
        
        <div class="relative w-48 h-48 md:w-60 md:h-60 mx-auto mb-6 bg-slate-900/40 rounded-full flex items-center justify-center border border-red-900/20 shadow-2xl">
            <span id="enemy-icon" class="text-7xl md:text-8xl enemy-glow">👾</span>
        </div>

        <div class="w-full max-w-md mx-auto">
            <div class="w-full bg-slate-950 h-3 rounded-full border border-slate-800 p-0.5 overflow-hidden">
                <div id="enemy-hp-bar" class="hp-bar bg-red-600 h-full rounded-full" style="width: 100%"></div>
            </div>
            <div id="enemy-hp-text" class="text-[10px] mt-1.5 font-bold text-slate-500 uppercase tracking-tighter">--/-- HP</div>
        </div>
    </div>

    <div id="battle-log" class="glass w-full max-w-xl p-5 rounded-[2rem] h-32 overflow-y-auto text-sm border border-slate-800 my-4 font-mono">
        <p class="text-blue-500 font-bold">► ממתין לאישור כניסה למרחב האווירי...</p>
    </div>

    <div class="w-full max-w-xl bg-slate-900/50 p-6 rounded-[2.5rem] border border-slate-800">
        <div class="flex justify-between items-end mb-5">
            <div class="flex flex-col gap-1">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">Vitals / Energy</span>
                <div class="w-48 bg-slate-950 h-2.5 rounded-full border border-slate-800 p-0.5">
                    <div id="player-hp-bar" class="hp-bar bg-green-500 h-full rounded-full" style="width: 100%"></div>
                </div>
            </div>
            <div class="text-right">
                <span id="player-hp-text" class="text-3xl font-black italic">--</span>
                <span id="player-max-hp-display" class="text-slate-600 text-xs font-bold uppercase italic">/-- %</span>
            </div>
        </div>

        <div id="action-buttons" class="grid grid-cols-2 gap-3">
            </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const itemDatabase = {
            'pistol_nemesis': { name: 'ירי נמסיס', baseAtk: 25, icon: '🔫' },
            'katana_thermal': { name: 'להב טרמי', baseAtk: 45, icon: '⚔️' },
            'nano_boost': { name: 'ננו-בוסט', healPower: 40, icon: '💊', type: 'heal' }
        };

        let player = { hp: 100, maxHp: 100, inventory: [], isMyTurn: true };
        let enemy = { name: "", hp: 0, maxHp: 0, atk: 0, level: 1, reward: 0 };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            
            const battleData = JSON.parse(localStorage.getItem('currentBattle'));
            if (!battleData) { window.location.href = 'map.html'; return; }

            // הגדרת אויב מהמפה
            enemy.name = battleData.name;
            enemy.level = battleData.level;
            enemy.reward = battleData.reward;
            enemy.maxHp = 50 + (enemy.level * 30);
            enemy.hp = enemy.maxHp;
            enemy.atk = 10 + (enemy.level * 5);
            
            document.getElementById('enemy-name').innerText = enemy.name;
            document.getElementById('enemy-level').innerText = `LEVEL ${enemy.level}`;
            addLog(`קרב התחיל! איתור: ${enemy.name}`, 'text-red-500 font-bold');

            // משיכת נתוני שחקן וסנכרון אנרגיה
            const docSnap = await getDoc(doc(db, "players", user.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // עדכון Max HP לפי רמה
                const pLevel = data.level || 1;
                player.maxHp = 100 + (pLevel * 10);
                
                // טעינת אנרגיה נוכחית מה-DB
                player.hp = (data.energy !== undefined) ? data.energy : player.maxHp;
                player.inventory = data.inventory || [];
                
                renderActions();
                updateUI();
                addLog(`סוכן זוהה. סטטוס מערכות: ${player.hp}%`, 'text-blue-400');
            }
        });

        function calculateRoll(baseValue) {
            const variance = (Math.random() * 0.4) + 0.8; 
            let result = Math.floor(baseValue * variance);
            const roll = Math.random();
            if (roll < 0.10) return { val: 0, type: 'MISS' };
            if (roll > 0.90) return { val: result * 2, type: 'CRIT' };
            return { val: result, type: 'HIT' };
        }

        window.handleAction = function(itemId) {
            if (!player.isMyTurn) return;
            const item = itemDatabase[itemId];
            player.isMyTurn = false;

            if (item.type === 'heal') {
                const heal = Math.floor(item.healPower * 0.8);
                player.hp = Math.min(player.maxHp, player.hp + heal);
                addLog(`ריפוי: +${heal} %`, 'text-green-400 font-bold');
            } else {
                const roll = calculateRoll(item.baseAtk);
                if (roll.type === 'MISS') addLog(`פספסת!`, 'text-slate-500');
                else {
                    enemy.hp -= roll.val;
                    addLog(`${roll.type === 'CRIT' ? '⚡ ' : ''}פגעת ב-${roll.val}`, 'text-white font-black italic');
                    triggerShake('enemy-area');
                }
            }

            updateUI();
            if (enemy.hp <= 0) return processVictory();
            setTimeout(enemyTurn, 1000);
        }

        function enemyTurn() {
            const roll = calculateRoll(enemy.atk);
            if (roll.type === 'MISS') addLog(`${enemy.name} פספס!`, 'text-blue-400 italic');
            else {
                player.hp -= roll.val;
                addLog(`${enemy.name} פגע בך: ${roll.val} %`, 'text-red-400 font-bold');
                triggerShake('player-hp-bar');
            }
            updateUI();
            if (player.hp <= 0) {
                // שמירת מצב תבוסה (0 אנרגיה)
                updateDoc(doc(db, "players", auth.currentUser.uid), { energy: 0, lastHpUpdate: serverTimestamp() });
                alert("המערכות קרסו! חזרה לבסיס לתיקונים.");
                window.location.href = 'dashboard.html';
            } else player.isMyTurn = true;
        }

        function processVictory() {
            const xpGained = enemy.level; 
            addLog(`🏆 ניצחון! נאספו ${enemy.reward} זוזים ו-${xpGained} XP.`, 'text-yellow-400 font-black italic uppercase tracking-tighter');
            
            const playerRef = doc(db, "players", auth.currentUser.uid);
            
            updateDoc(playerRef, {
                coins: increment(enemy.reward),
                xp: increment(xpGained),
                energy: Math.max(0, Math.floor(player.hp)),
                lastHpUpdate: serverTimestamp()
            }).then(() => {
                setTimeout(() => window.location.href = 'dashboard.html', 3000);
            });
        }

        function updateUI() {
            // אויב
            document.getElementById('enemy-hp-bar').style.width = (enemy.hp / enemy.maxHp * 100) + "%";
            document.getElementById('enemy-hp-text').innerText = `${Math.max(0, Math.floor(enemy.hp))}/${enemy.maxHp} HP`;
            
            // שחקן
            document.getElementById('player-hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
            document.getElementById('player-hp-text').innerText = Math.max(0, Math.floor(player.hp));
            document.getElementById('player-max-hp-display').innerText = `/${player.maxHp} %`;
        }

        function addLog(msg, colorClass) {
            const logBox = document.getElementById('battle-log');
            logBox.innerHTML += `<p class="${colorClass}">► ${msg}</p>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function triggerShake(id) {
            const el = document.getElementById(id);
            if(el) {
                el.classList.add('shake');
                setTimeout(() => el.classList.remove('shake'), 400);
            }
        }

        function renderActions() {
            const container = document.getElementById('action-buttons');
            container.innerHTML = '';
            player.inventory.forEach(itemId => {
                const item = itemDatabase[itemId];
                if (item) {
                    const btn = document.createElement('button');
                    btn.className = "glass p-4 rounded-2xl font-black text-xs hover:bg-slate-800 border border-slate-700 uppercase italic transition-all active:scale-95";
                    btn.innerHTML = `<span>${item.icon}</span> ${item.name}`;
                    btn.onclick = () => handleAction(itemId);
                    container.appendChild(btn);
                }
            });
        }
    </script>
</body>
</html>
