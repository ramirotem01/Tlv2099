<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפה טקטית | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Assistant', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        #map-container {
            width: 100vw;
            height: 100vh;
            /* הקישור למפה הטקטית שלך */
            background-image: linear-gradient(rgba(2, 6, 23, 0.3), rgba(2, 6, 23, 0.3)), 
                              url('https://res.cloudinary.com/dxygefiai/image/upload/v1776869436/Gemini_Generated_Image_pgbq64pgbq64pgbq_uizmv7.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* הנקודות על המפה - Nodes */
        .node {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px #3b82f6, 0 0 40px #3b82f6;
            animation: pulse 2s infinite;
            border: 3px solid white;
            transition: transform 0.2s;
        }
        
        .node:hover { transform: scale(1.3); }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px #3b82f6; }
            50% { transform: scale(1.2); box-shadow: 0 0 25px #3b82f6; }
            100% { transform: scale(1); box-shadow: 0 0 10px #3b82f6; }
        }

        .neon-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>

    <div id="map-container">
        <div class="absolute top-8 right-8 z-10">
            <a href="dashboard.html" class="glass p-4 px-8 rounded-full font-extrabold text-sm hover:bg-blue-600 transition-all border border-blue-500/30 shadow-lg shadow-blue-900/20">
                🛰️ חזרה לחמ"ל
            </a>
        </div>

        <div class="absolute bottom-8 left-8 z-10 glass p-4 rounded-2xl text-[10px] text-blue-400 font-mono leading-relaxed opacity-70">
            SYSTEM: ACTIVE<br>
            SCANNING SECTOR: TLV_CENTRAL<br>
            ANOMALIES DETECTED: 3<br>
            GPS: 32.0853° N, 34.7818° E
        </div>

        <div class="node" style="top: 25%; left: 30%;" onclick="openMission('נמל תל אביב', 'דרקון ביוב מוטנטי', '50 זוזים', '3')"></div>
        
        <div class="node" style="top: 55%; left: 45%;" onclick="openMission('דיזינגוף סנטר', 'רוח רפאים חשמלית', '120 זוזים', '5')"></div>
        
        <div class="node" style="top: 40%; left: 65%;" onclick="openMission('מגדלי עזריאלי', 'סייבר-עכביש רעיל', '250 זוזים', '8')"></div>

        <div id="mission-modal" class="hidden absolute inset-0 bg-black/70 flex items-center justify-center p-6 z-20 backdrop-blur-sm">
            <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] text-center shadow-2xl border-blue-500/40 border-2">
                <div class="w-16 h-1 w-24 bg-blue-600 mx-auto mb-6 rounded-full shadow-lg shadow-blue-500"></div>
                
                <h2 id="m-location" class="text-[10px] uppercase text-blue-400 font-bold tracking-[0.3em] mb-2">מיקום</h2>
                <h3 id="m-target" class="text-4xl font-black mb-4 italic neon-text text-white">שם המפלצת</h3>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-950/50 p-3 rounded-2xl">
                        <div class="text-[8px] text-slate-500 uppercase font-bold">פרס</div>
                        <div id="m-reward" class="text-white font-bold">0</div>
                    </div>
                    <div class="bg-slate-950/50 p-3 rounded-2xl">
                        <div class="text-[8px] text-slate-500 uppercase font-bold">דרגת קושי</div>
                        <div id="m-difficulty" class="text-blue-500 font-bold">0</div>
                    </div>
                </div>

                <p class="text-slate-400 text-sm mb-8">הפעולה תצרוך 15% מהאנרגיה שלך. האם לצאת לחיסול?</p>
                
                <div class="flex gap-4">
                    <button onclick="closeMission()" class="flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold transition-all">ביטול</button>
                    <button onclick="startHunt()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black shadow-lg shadow-blue-900/40 active:scale-95 transition-all">
                        חסל ⚔️
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openMission(location, target, reward, diff) {
            document.getElementById('m-location').innerText = location;
            document.getElementById('m-target').innerText = target;
            document.getElementById('m-reward').innerText = reward;
            document.getElementById('m-difficulty').innerText = "LVL " + diff;
            document.getElementById('mission-modal').classList.remove('hidden');
        }

        function closeMission() {
            document.getElementById('mission-modal').classList.add('hidden');
        }

        function startHunt() {
            // כאן נחבר בעתיד את המערכת שתוריד אנרגיה ב-Firebase ותעביר לדף הקרב
            alert("מתחבר לרשת... הציד מתחיל!");
            closeMission();
        }
    </script>
</body>
</html>
