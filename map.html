<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפה טקטית | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Assistant', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* סגנון המפה */
        #map-container {
            width: 100vw;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&q=80&w=2000'); /* כאן נשים את המפה שייצרנו */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* הנקודות על המפה */
        .node {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px #3b82f6, 0 0 30px #3b82f6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div class="absolute top-6 right-6 z-10">
            <a href="dashboard.html" class="glass p-3 px-6 rounded-full font-bold text-sm hover:bg-blue-600 transition-all">חזרה לחמ"ל 🛰️</a>
        </div>

        <div class="node" style="top: 40%; left: 30%;" onclick="openMission('נמל תל אביב', 'דרקון ביוב רמה 3', 50)"></div>
        <div class="node" style="top: 60%; left: 55%;" onclick="openMission('דיזינגוף סנטר', 'רוח רפאים חשמלית', 30)"></div>
        <div class="node" style="top: 25%; left: 70%;" onclick="openMission('פארק הירקון', 'להקת זאבי ניאון', 80)"></div>

        <div id="mission-modal" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center p-6 z-20">
            <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] text-center shadow-2xl border-blue-500/50">
                <h2 id="m-location" class="text-xs uppercase text-blue-400 font-bold tracking-widest mb-2">מיקום</h2>
                <h3 id="m-target" class="text-3xl font-black mb-4 italic">שם המפלצת</h3>
                <p class="text-slate-400 text-sm mb-6">האם אתה מוכן להתחיל בציד? הפעולה תעלה 10 יחידות אנרגיה.</p>
                
                <div class="flex gap-3">
                    <button onclick="closeMission()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-bold">ביטול</button>
                    <button onclick="startHunt()" class="flex-1 bg-blue-600 p-4 rounded-2xl font-bold shadow-lg shadow-blue-900/40">צא לדרך! ⚔️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openMission(location, target, chance) {
            document.getElementById('m-location').innerText = location;
            document.getElementById('m-target').innerText = target;
            document.getElementById('mission-modal').classList.remove('hidden');
        }

        function closeMission() {
            document.getElementById('mission-modal').classList.add('hidden');
        }

        function startHunt() {
            alert("הציד מתחיל! (כאן נחבר את לוגיקת הקרב בהמשך)");
            closeMission();
        }
    </script>
</body>
</html>
