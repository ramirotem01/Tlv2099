<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפה טקטית | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Assistant', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #map-container {
            width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(2, 6, 23, 0.4), rgba(2, 6, 23, 0.4)), 
                              url('https://res.cloudinary.com/dxygefiai/image/upload/v1776869436/Gemini_Generated_Image_pgbq64pgbq64pgbq_uizmv7.png');
            background-size: cover; background-position: center; position: relative;
        }
        .node {
            position: absolute; width: 32px; height: 32px; background: #3b82f6; border-radius: 50%;
            cursor: pointer; box-shadow: 0 0 20px #3b82f6; animation: pulse 2s infinite;
            border: 3px solid white; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; z-index: 5;
        }
        .node:hover { transform: scale(1.4); box-shadow: 0 0 40px #3b82f6; z-index: 10; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px #3b82f6; }
            50% { transform: scale(1.15); box-shadow: 0 0 30px #3b82f6; }
            100% { transform: scale(1); box-shadow: 0 0 10px #3b82f6; }
        }
        .neon-text { text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .hidden { display: none !important; }
        .scale-in { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="map-container">
        <div class="absolute top-8 right-8 z-10">
            <a href="dashboard.html" class="glass p-4 px-8 rounded-full font-extrabold text-xs hover:bg-blue-600 transition-all border border-blue-500/30 shadow-lg">
                🛰️ חזרה לחמ"ל
            </a>
        </div>

        <div id="nodes-layer"></div>

        <div id="mission-modal" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center p-6 z-30 backdrop-blur-md">
            <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] text-center shadow-2xl border-blue-500/40 border-2 scale-in">
                <div id="m-image-container" class="w-32 h-32 mx-auto mb-4 rounded-full border-2 border-blue-500/30 overflow-hidden bg-slate-900 flex items-center justify-center">
                    <span class="text-blue-500 animate-spin">🌀</span>
                </div>
                
                <h2 id="m-location" class="text-[10px] uppercase text-blue-400 font-bold tracking-[0.3em] mb-2 font-mono">מזהה מיקום...</h2>
                <h3 id="m-target" class="text-3xl font-black mb-4 italic neon-text text-white tracking-tighter">טוען נתונים...</h3>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                        <div class="text-[8px] text-slate-500 uppercase font-bold mb-1">בונוס</div>
                        <div id="m-reward" class="text-white font-black text-lg">--</div>
                    </div>
                    <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800">
                        <div class="text-[8px] text-slate-500 uppercase font-bold mb-1">רמה</div>
                        <div id="m-difficulty" class="text-blue-500 font-black text-lg">--</div>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button onclick="closeMission()" class="flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold transition-all text-xs">ביטול</button>
                    <button id="start-hunt-btn" onclick="startHunt()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black shadow-lg transition-all uppercase tracking-tighter">
                        יציאה לקרב ⚔️
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;
        let activeMissions = [];
        let selectedMissionIndex = null;
        let currentMonsterData = null;

        const LOCATIONS = ["נמל תל אביב", "דיזינגוף סנטר", "מגדלי עזריאלי", "שוק הכרמל", "פלורנטין", "כיכר המדינה"];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const playerRef = doc(db, "players", user.uid);
                const snap = await getDoc(playerRef);
                if (snap.exists()) {
                    activeMissions = snap.data().activeMissions || [];
                    if (activeMissions.length < 3) {
                        generateNewMissions(snap.data().level || 1);
                        await updateDoc(playerRef, { activeMissions: activeMissions });
                    }
                    renderNodes();
                }
            } else { window.location.href = 'index.html'; }
        });

        function generateNewMissions(playerLevel) {
            while (activeMissions.length < 3) {
                const diff = playerLevel + (Math.floor(Math.random() * 3));
                activeMissions.push({
                    location: LOCATIONS[Math.floor(Math.random() * LOCATIONS.length)],
                    difficulty: Math.max(1, diff),
                    reward: 50 + (diff * 20),
                    top: (Math.floor(Math.random() * 60) + 20) + "%",
                    left: (Math.floor(Math.random() * 70) + 15) + "%"
                });
            }
        }

        function renderNodes() {
            const container = document.getElementById('nodes-layer');
            container.innerHTML = '';
            activeMissions.forEach((m, index) => {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.top = m.top; node.style.left = m.left;
                node.innerHTML = `<span class="text-[10px] font-black">!</span>`;
                node.onclick = () => openMission(index);
                container.appendChild(node);
            });
        }

       window.openMission = async function(index) {
    selectedMissionIndex = index;
    const m = activeMissions[index];
    const modal = document.getElementById('mission-modal');
    modal.classList.remove('hidden');

    document.getElementById('m-target').innerText = "סורק...";
    document.getElementById('m-image-container').innerHTML = '<span class="text-blue-500 animate-spin">🌀</span>';

    try {
        // שלב א': הבאת כל המפלצות הרגילות (לא בוסים)
        const q = query(collection(db, "monsters"), where("isBoss", "==", false));
        const snap = await getDocs(q);
        const monsters = [];
        
        snap.forEach(d => {
            const data = d.data();
            // שלב ב': סינון לפי רמה בתוך הקוד (כך שגם אם אין התאמה מדויקת, תהיה הגרלה)
            // נבדוק שהמפלצת מתאימה לטווח הרמות שלה
            if (m.difficulty >= (data.minLevel || 0) && m.difficulty <= (data.maxLevel || 99)) {
                monsters.push(data);
            }
        });

        // שלב ג': הגרלה - אם לא נמצאה התאמה לרמה, ניקח מפלצת רנדומלית מכל הרשימה
        if (monsters.length > 0) {
            currentMonsterData = monsters[Math.floor(Math.random() * monsters.length)];
        } else {
            // אם אין מפלצות בטווח הרמה, ניקח מפלצת כלשהי מה-DB כדי לא להיתקע עם בוט אבטחה
            const allMonsters = [];
            snap.forEach(d => allMonsters.push(d.data()));
            currentMonsterData = allMonsters.length > 0 ? 
                allMonsters[Math.floor(Math.random() * allMonsters.length)] : 
                { name: "בוט אבטחה", img: "https://via.placeholder.com/150?text=Security+Bot" };
        }

        // עדכון UI
        document.getElementById('m-location').innerText = m.location;
        document.getElementById('m-target').innerText = currentMonsterData.name;
        document.getElementById('m-reward').innerText = m.reward + " זוזים";
        document.getElementById('m-difficulty').innerText = "LVL " + m.difficulty;
        document.getElementById('m-image-container').innerHTML = `<img src="${currentMonsterData.img}" class="w-full h-full object-cover">`;

    } catch (e) {
        console.error("Error fetching monster:", e);
        document.getElementById('m-target').innerText = "שגיאת תקשורת";
    }
}
        window.closeMission = () => document.getElementById('mission-modal').classList.add('hidden');

        window.startHunt = async function() {
            if (selectedMissionIndex === null || !currentMonsterData) return;
            const mission = activeMissions[selectedMissionIndex];

            // שמירה ל-LocalStorage עבור דף הקרב
            localStorage.setItem('currentBattle', JSON.stringify({
                name: currentMonsterData.name,
                img: currentMonsterData.img,
                level: mission.difficulty,
                reward: mission.reward,
                location: mission.location
            }));

            // הסרת המשימה מה-DB
            activeMissions.splice(selectedMissionIndex, 1);
            await updateDoc(doc(db, "players", currentUser.uid), { activeMissions: activeMissions });
            window.location.href = 'combat.html';
        }
    </script>
</body>
</html>
