<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפה טקטית | TLV2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'Assistant', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        #map-container {
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(rgba(2, 6, 23, 0.3), rgba(2, 6, 23, 0.3)), 
                              url('https://res.cloudinary.com/dxygefiai/image/upload/v1776869436/Gemini_Generated_Image_pgbq64pgbq64pgbq_uizmv7.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .node {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px #3b82f6;
            animation: pulse 2s infinite;
            border: 3px solid white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        
        .node:hover { transform: scale(1.4); box-shadow: 0 0 40px #3b82f6; z-index: 10; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px #3b82f6; }
            50% { transform: scale(1.1); box-shadow: 0 0 25px #3b82f6; }
            100% { transform: scale(1); box-shadow: 0 0 10px #3b82f6; }
        }

        .neon-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map-container">
        <div class="absolute top-8 right-8 z-10">
            <a href="dashboard.html" class="glass p-4 px-8 rounded-full font-extrabold text-sm hover:bg-blue-600 transition-all border border-blue-500/30 shadow-lg shadow-blue-900/20">
                🛰️ חזרה לחמ"ל
            </a>
        </div>

        <div class="absolute bottom-8 left-8 z-10 glass p-4 rounded-2xl text-[10px] text-blue-400 font-mono leading-relaxed opacity-70">
            SYSTEM: ACTIVE<br>
            SCANNING SECTOR: TLV_CENTRAL<br>
            ANOMALIES DETECTED: <span id="anomaly-count">0</span><br>
            GPS: 32.0853° N, 34.7818° E
        </div>

        <div id="nodes-layer"></div>

        <div id="mission-modal" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center p-6 z-30 backdrop-blur-sm">
            <div class="glass max-w-sm w-full p-8 rounded-[2.5rem] text-center shadow-2xl border-blue-500/40 border-2 scale-in">
                <div class="w-16 h-1 w-24 bg-blue-600 mx-auto mb-6 rounded-full shadow-lg shadow-blue-500"></div>
                
                <h2 id="m-location" class="text-[10px] uppercase text-blue-400 font-bold tracking-[0.3em] mb-2 font-mono italic">מזהה מיקום...</h2>
                <h3 id="m-target" class="text-4xl font-black mb-4 italic neon-text text-white tracking-tighter">טוען יעד</h3>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-slate-950/50 p-3 rounded-2xl border border-slate-800">
                        <div class="text-[8px] text-slate-500 uppercase font-bold mb-1">תגמול משוער</div>
                        <div id="m-reward" class="text-white font-black">--</div>
                    </div>
                    <div class="bg-slate-950/50 p-3 rounded-2xl border border-slate-800">
                        <div class="text-[8px] text-slate-500 uppercase font-bold mb-1">רמת איום</div>
                        <div id="m-difficulty" class="text-blue-500 font-black">--</div>
                    </div>
                </div>

                <p class="text-slate-400 text-xs mb-8 leading-relaxed">שיבוש זוהה במערכות העירוניות. חתימת האנרגיה תואמת לישות עוינת. האם לצאת לחיסול?</p>
                
                <div class="flex gap-4">
                    <button onclick="closeMission()" class="flex-1 bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold transition-all text-xs">ביטול</button>
                    <button onclick="startHunt()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black shadow-lg shadow-blue-900/40 active:scale-95 transition-all">
                        חסל ⚔️
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let currentUser = null;
        let activeMissions = [];
        let selectedMissionIndex = null;

        const MONSTERS = ["בוט אבטחה משובש", "מוטאנט ביבים", "צייד רשת", "רחפן קרב", "וירוס פיזי"];
        const LOCATIONS = ["נמל תל אביב", "דיזינגוף סנטר", "מגדלי עזריאלי", "שוק הכרמל", "פלורנטין", "כיכר המדינה"];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const playerRef = doc(db, "players", user.uid);
                const snap = await getDoc(playerRef);
                
                if (snap.exists()) {
                    const data = snap.data();
                    activeMissions = data.activeMissions || [];
                    
                    // אם חסרות משימות (פחות מ-3), נשלים אותן
                    if (activeMissions.length < 3) {
                        generateMissions(data.level || 1);
                        await updateDoc(playerRef, { activeMissions: activeMissions });
                    }
                    
                    renderNodes();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        function generateMissions(playerLevel) {
            while (activeMissions.length < 3) {
                const diff = playerLevel + (Math.floor(Math.random() * 3) - 1);
                const mission = {
                    location: LOCATIONS[Math.floor(Math.random() * LOCATIONS.length)],
                    target: MONSTERS[Math.floor(Math.random() * MONSTERS.length)],
                    difficulty: Math.max(1, diff),
                    reward: 50 + (diff * 20) + Math.floor(Math.random() * 30),
                    // הגרלת מיקום על המפה (באחוזים)
                    top: Math.floor(Math.random() * 60) + 20 + "%",
                    left: Math.floor(Math.random() * 70) + 15 + "%"
                };
                activeMissions.push(mission);
            }
        }

        function renderNodes() {
            const container = document.getElementById('nodes-layer');
            container.innerHTML = '';
            document.getElementById('anomaly-count').innerText = activeMissions.length;

            activeMissions.forEach((m, index) => {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.top = m.top;
                node.style.left = m.left;
                node.innerHTML = `<span class="text-[10px] font-black">!</span>`;
                node.onclick = () => openMission(index);
                container.appendChild(node);
            });
        }

        window.openMission = function(index) {
            selectedMissionIndex = index;
            const m = activeMissions[index];
            document.getElementById('m-location').innerText = m.location;
            document.getElementById('m-target').innerText = m.target;
            document.getElementById('m-reward').innerText = m.reward + " זוזים";
            document.getElementById('m-difficulty').innerText = "LVL " + m.difficulty;
            document.getElementById('mission-modal').classList.remove('hidden');
        }

        window.closeMission = function() {
            document.getElementById('mission-modal').classList.add('hidden');
        }

        window.startHunt = async function() {
            // שמירת המשימה הנבחרת ב-LocalStorage כדי שדף הקרב ידע מול מי נלחמים
            const mission = activeMissions[selectedMissionIndex];
            localStorage.setItem('currentBattle', JSON.stringify(mission));
            
            // הסרת המשימה מהרשימה ב-Firebase (כי היא בביצוע)
            activeMissions.splice(selectedMissionIndex, 1);
            const playerRef = doc(db, "players", currentUser.uid);
            await updateDoc(playerRef, { activeMissions: activeMissions });

            window.location.href = 'combat.html';
        }
    </script>
</body>
</html>
